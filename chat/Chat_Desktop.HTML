// Gera 3 alternativas falsas de um array, evitando o valor correto
function pickFakeAlts(pool, correct, count = 3) {
  const filtered = pool.filter(v => v.toLowerCase() !== correct.toLowerCase());
  const shuffled = filtered.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count);
}

// Monta 4 alternativas (1 certa + 3 erradas) embaralhadas; retorna [opts, correctIndex]
function buildAlternatives(pool, correct) {
  const fakes = pickFakeAlts(pool, correct, 3);
  const all = [...fakes, correct].sort(() => Math.random() - 0.5);
  const correctIdx = all.findIndex(v => v.toLowerCase() === correct.toLowerCase());
  return [all, correctIdx];
}

const MIN_QUIZ_INTERVAL = 120; // TRAVA: mínimo absoluto de 2 minutos — não remova

const QuizBotWindow = ({ lang, onClose, quizBotActive, setQuizBotActive, askNextQuestion, quizInterval, setQuizInterval, quizIntervalInput, setQuizIntervalInput, quizDiscipline, setQuizDiscipline, serverQuizBotActive, notifyServer, quizJitterTimerRef, broadcastToggle, sendQuizHandoff, quizServerOwnerId, globalQuizOwner, setGlobalQuizOwner, quizMasterIdRef, peerId }) => {
  const langName = getLangName(lang);
  return (
    <FloatingWindow
      title='🤖 Quiz Bot K10'
      onClose={onClose}
      initialPosition={{ x: Math.max(20, window.innerWidth / 2 - 175), y: Math.max(20, window.innerHeight / 2 - 260) }}
      initialSize={{ width: 350, height: 520 }}
    >
      <div style={{ padding: '20px', textAlign: 'center', height: '100%', overflowY: 'auto', display: 'flex', flexDirection: 'column', justifyContent: 'flex-start' }}>
        <p style={{ marginBottom: '8px', color: 'var(--text-muted)', fontSize: '13px' }}>
          The bot sends questions in <strong>Portuguese</strong>. Each user's K10 chat auto-translates to their own selected language.
        </p>
        <div style={{ background: '#f0fdf4', border: '1px solid #bbf7d0', borderRadius: '8px', padding: '10px', marginBottom: '14px', fontSize: '11px', color: '#166534', textAlign: 'left' }}>
          <strong>🚀 Rede P2P Inteligente:</strong> Este sistema é colaborativo. Ao ativar o bot, você se torna parte de uma rede onde usuários já conectados transmitem as perguntas para os novos.
          <div style={{ marginTop: '5px', fontWeight: 'bold' }}>
            ✅ Capacidade Ilimitada: Quanto mais pessoas usam, mais forte a rede fica!
          </div>
        </div>

        <div style={{ background: '#eff6ff', border: '1px solid #bfdbfe', borderRadius: '8px', padding: '8px 12px', marginBottom: '14px', fontSize: '12px', color: '#1d4ed8' }}>
          🌐 Your language: <strong>{langName}</strong>
          {lang === 'pt'
            ? ' — questions arrive in Portuguese (original).'
            : ' — questions will be auto-translated to your language.'}
          <div style={{ marginTop: '4px', color: '#64748b', fontSize: '11px' }}>
            💡 Auto-detected from your browser. Change it with the 🌐 dropdown in the header.
          </div>
        </div>
        
        <div style={{ marginBottom: '10px', textAlign: 'left' }}>
          <label style={{ fontSize: '12px', color: 'var(--text-muted)' }}>Discipline</label>
          <select value={quizDiscipline} onChange={e => setQuizDiscipline(e.target.value)} style={{ width: '100%', padding: '8px', borderRadius: '4px', background: 'var(--bg)', border: '1px solid var(--border)', color: 'var(--text)', marginTop: '4px' }} disabled={quizBotActive}>
            <option value="all">📚 All Disciplines</option>
            {QUIZ_SUBJECTS.map(sub => (
              <option key={sub.id} value={sub.id}>{sub.emoji} {sub.name}</option>
            ))}
          </select>
        </div>
        <div style={{ marginBottom: '20px', textAlign: 'left' }}>
          <label style={{ fontSize: '12px', color: 'var(--text-muted)' }}>Time per question (seconds)</label>
          <input 
            type="number" 
            value={quizIntervalInput} 
            onChange={e => setQuizIntervalInput(Number(e.target.value))} 
            onBlur={() => {
              const val = Math.max(MIN_QUIZ_INTERVAL, quizIntervalInput);
              setQuizIntervalInput(val);
              setQuizInterval(val);
            }}
            min="120" 
            style={{ width: '100%', padding: '8px', borderRadius: '4px', background: 'var(--bg)', border: '1px solid var(--border)', color: 'var(--text)', marginTop: '4px' }} 
            disabled={quizBotActive} 
          />
        </div>

        <div style={{ marginBottom: '20px' }}>
          <span style={{ display: 'inline-block', padding: '8px 16px', borderRadius: '20px', background: quizBotActive ? '#10b98120' : '#ef444420', color: quizBotActive ? '#10b981' : '#ef4444', fontWeight: 'bold' }}>
            {quizBotActive ? '🟢 Active' : '🔴 Inactive'}
          </span>
        </div>

        <div style={{ display: 'flex', gap: '10px', justifyContent: 'center', marginTop: 'auto' }}>
          {(() => {
            const peerP2POwner = quizBotActive && globalQuizOwner && globalQuizOwner !== peerId && quizMasterIdRef.current !== peerId;
            const isLockedByServer = serverQuizBotActive && quizServerOwnerId !== peerId;
            const isLocked = peerP2POwner || isLockedByServer;
            const iAmOwner = (quizBotActive && (globalQuizOwner === peerId || quizMasterIdRef.current === peerId)) || (serverQuizBotActive && quizServerOwnerId === peerId);

            return (
          <button 
            className="primary-btn" 
            onClick={() => {
              const newActive = !quizBotActive;
              let handoffSent = false;
              if (!newActive && sendQuizHandoff) {
                try { sendQuizHandoff(); handoffSent = true; } catch(e) { console.warn('Quiz handoff failed', e); }
              }
              setGlobalQuizOwner(newActive ? peerId : null);
              setQuizBotActive(newActive);
              if (newActive) {
                notifyServer('quiz-bot-start');
              } else if (!handoffSent) {
                notifyServer('quiz-bot-stop');
              }
              if (broadcastToggle) broadcastToggle(newActive);
              if (newActive) {
                const initialJitterMs = 1000 + Math.floor(Math.random() * 2000);
                if (quizJitterTimerRef.current) clearTimeout(quizJitterTimerRef.current);
                quizJitterTimerRef.current = setTimeout(askNextQuestion, initialJitterMs);
              } else {
                if (quizJitterTimerRef.current) clearTimeout(quizJitterTimerRef.current);
              }
            }}
            disabled={isLocked}
            style={{ background: iAmOwner ? '#ef4444' : isLocked ? '#94a3b8' : '#10b981', width: '100%', cursor: isLocked ? 'not-allowed' : 'pointer' }}
          >
            {iAmOwner ? 'Stop Bot' : isLocked ? '🔒 Bot em uso por outro usuário' : 'Start Bot'}
          </button>
            );
          })()}
        </div>
      </div>
    </FloatingWindow>
  );
};

// Embaralha array in-place (Fisher-Yates)
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Retira o próximo lugar da fila; quando vazia, reembaralha tudo de novo
function nextWorldPlace() {
  if (worldQuizQueueRef.current.length === 0) {
    // Cria nova fila com todos os índices embaralhados + seed de tempo para variar sempre
    const indices = WORLD_PLACES.map((_, i) => i);
    shuffleArray(indices);
    // Garante que o primeiro da nova fila ≠ último lugar jogado (evita repetição na virada)
    if (worldQuizPlaceRef.current) {
      const lastIdx = WORLD_PLACES.indexOf(worldQuizPlaceRef.current);
      if (indices[0] === lastIdx && indices.length > 1) {
        [indices[0], indices[1]] = [indices[1], indices[0]];
      }
    }
    worldQuizQueueRef.current = indices;
  }
  const idx = worldQuizQueueRef.current.shift();
  return WORLD_PLACES[idx];
}

// QUIZ HANDOFF: quando o usuário desliga o bot, transfere o estado
// (disciplina, intervalo, IDs já usados, hits em buffer) para o servidor
// continuar a transmissão exatamente de onde parou.
// IMPORTANTE: segue o mesmo padrão do programa — só URL + ID das imagens
// (nada de binário). O servidor reusa fetchWorldImage com os mesmos IDs
// no Set de já-usados pra não repetir.
// ─────────────────────────────────────────────────────────────────────
const sendQuizHandoff = () => {
  if (!centralServerId) return;
  const conn = connectionsRef.current.find(c => c.peer === centralServerId && c.open);
  if (!conn) return;

  // Snapshot dos hits do Pixabay já buscados mas ainda não usados (por query)
  // _worldImgCache é módulo-level, então acessamos por window
  const bufferedHits = {};
  try {
    if (typeof _worldImgCache === 'object' && _worldImgCache) {
      for (const q in _worldImgCache) {
        if (Array.isArray(_worldImgCache[q]) && _worldImgCache[q].length > 0) {
          bufferedHits[q] = _worldImgCache[q].slice(0); // shallow copy
        }
      }
    }
  } catch(e) {}

  const handoff = {
    type: 'quiz-handoff',
    quizDiscipline: quizDisciplineRef.current,
    quizInterval: safeQuizInterval(),
    usedImageIds: Array.from(worldQuizUsedImagesRef.current || []),
    bufferedHits,                                  // hits Pixabay (URL+ID, sem binário)
    lastPlaceQuery: worldQuizPlaceRef.current ? worldQuizPlaceRef.current.query : null,
    lastQuizTime: lastQuizTimeRef.current,        // Sincroniza cooldown global
    senderName: userNameRef.current || 'Quiz Master', // FIX BUG-3: ref evita stale closure
  };
  try { conn.send(handoff); } catch(e) {} // handoff enviado ao servidor
};

const sendBotMessage = (text) => {
  const timestamp = new Date();
  const timeStr = timestamp.toLocaleTimeString('en-US');
  const msgId = Date.now() + Math.random().toString(36).substring(2);
  const target = selectedContactRef.current;

  // Wire format must match normal messages: type:'message', id, ttl
  const wireMsg = {
    type: 'message',
    id: msgId,
    ttl: 15,
    text: text,
    senderName: '🤖 Quiz Bot',
    direct: false,
    time: timeStr
  };

  // Local display object
  const localMsg = {
    type: 'text',
    text: text,
    sender: 'you',
    senderName: '🤖 Quiz Bot',
    time: timeStr,
    timestamp: timestamp.getTime()
  };

  if (target) {
    // Conectado a um servidor: envia SÓ para o servidor, ele faz o relay para todos
    const conn = connectionsRef.current.find(c => c.peer === target && c.open);
    if (conn) try { conn.send(wireMsg); } catch(e) { console.error('Quiz bot send error', e); }
    setMessages(prev => [...prev, { ...localMsg, recipient: target }].slice(-500));
  } else {
    // Modo geral (sem servidor): broadcast direto para todos os peers
    connectionsRef.current.forEach(c => { if (c.open) try { c.send(wireMsg); } catch(e) {} });
    setMessages(prev => [...prev, { ...localMsg, recipient: 'general' }].slice(-500));
  }
};

const sendQuizQuestion = (quizData) => {
  const timestamp = new Date();
  const now = timestamp.getTime();
  lastQuizTimeRef.current = now; // Atualiza cooldown local
  const timeStr = timestamp.toLocaleTimeString('en-US');
  const msgId = Date.now() + Math.random().toString(36).substring(2);
  const target = selectedContactRef.current;

  // IMPORTANTE: usa type:'message' para que o servidor faça relay automaticamente
  // O campo quizPayload embute os dados estruturados do quiz
  const wireMsg = {
    type: 'message',
    id: msgId,
    ttl: 15,
    senderName: '🤖 Quiz Bot',
    direct: false,
    time: timeStr,
    timestamp: timestamp.getTime(),
    text: '__QUIZ__',          // texto sentinela — clientes antigos ignoram, clientes novos detectam
    quizPayload: quizData      // dados completos do quiz
  };

  const localMsg = {
    type: 'quiz-question',
    sender: 'you',
    senderName: '🤖 Quiz Bot',
    time: timeStr,
    timestamp: timestamp.getTime(),
    recipient: target || 'general',
    quizVotes: {},
    quizRevealed: false,
    ...quizData
  };

  if (target) {
    const conn = connectionsRef.current.find(c => c.peer === target && c.open);
    if (conn) try { conn.send(wireMsg); } catch(e) { console.error('Quiz send error', e); }
    setMessages(prev => [...prev, localMsg].slice(-500));
  } else {
    connectionsRef.current.forEach(c => { if (c.open) try { c.send(wireMsg); } catch(e) {} });
    setMessages(prev => [...prev, localMsg].slice(-500));
  }
  
  // Envia para os inscritos do World Quiz, independentemente de estar em um servidor ou não
  if (quizData.quizStage) {
    worldQuizSubscribersRef.current.forEach(subId => {
      const subConn = connectionsRef.current.find(c => c.peer === subId && c.open);
      if (subConn) try { subConn.send(wireMsg); } catch(e) {}
    });
  }
};

const sendQuizReveal = (quizId) => {
  const timestamp = new Date();
  const timeStr = timestamp.toLocaleTimeString('en-US');
  const msgId = Date.now() + Math.random().toString(36).substring(2);
  const target = selectedContactRef.current;

  const q = currentQuizQuestionRef.current;
  const refVotes = q ? (q.votes || {}) : {};

  setMessages(prev => {
    const quizMsg = prev.find(m => m.quizId === quizId);
    const stateVotes = quizMsg ? (quizMsg.quizVotes || {}) : {};
    const mergedVotes = { ...stateVotes, ...refVotes };

    // IMPORTANTE: usa type:'message' para relay pelo servidor
    const wireMsg = {
      type: 'message',
      id: msgId,
      ttl: 15,
      senderName: '🤖 Quiz Bot',
      direct: false,
      time: timeStr,
      text: '__QUIZ_REVEAL__',
      quizRevealPayload: { quizId, votes: mergedVotes }
    };

    if (target) {
      const conn = connectionsRef.current.find(c => c.peer === target && c.open);
      if (conn) try { conn.send(wireMsg); } catch(e) {}
    } else {
      connectionsRef.current.forEach(c => { if (c.open) try { c.send(wireMsg); } catch(e) {} });
    }
    
    if (q && q.quizStage) {
      worldQuizSubscribersRef.current.forEach(subId => {
        const subConn = connectionsRef.current.find(c => c.peer === subId && c.open);
        if (subConn) try { subConn.send(wireMsg); } catch(e) {}
      });
    }

    return prev.map(m =>
      m.quizId === quizId ? { ...m, quizRevealed: true, quizVotes: mergedVotes } : m
    );
  });
};

const askWorldQuestion = async () => {
  if (quizTimerRef.current) clearTimeout(quizTimerRef.current);
  worldQuizStageRef.current = 0;

  // Pega próximo lugar da fila embaralhada (nunca repete antes de ver todos os 35)
  const place = nextWorldPlace();
  worldQuizPlaceRef.current = place;
  worldQuizImageRef.current = null;

  // Busca imagem na Pixabay com suporte a buffer
  const hit = await fetchWorldImage(place.query, worldQuizUsedImagesRef.current, (hits) => {
    // Replica o buffer para toda a conexões (Takeover Support)
    const syncMsg = { type: 'quiz-buffer-sync', query: place.query, hits };
    connectionsRef.current.forEach(c => { if(c.open) try{c.send(syncMsg);}catch(e){} });
  });

  const imgUrl = hit ? hit.largeImageURL || hit.webformatURL : null;
  const imgId = hit ? hit.id : null;
  worldQuizImageRef.current = imgUrl;

  // ── ETAPA 1: Qual o PAÍS? ──
  const [countryOpts, countryCorrectIdx] = buildAlternatives(ALL_COUNTRIES, place.country);
  const quizId1 = 'quiz-world1-' + Date.now() + '-' + Math.random().toString(36).substring(2);
  worldQuizId1Ref.current = quizId1;
  worldQuizStageRef.current = 1;

  const quizData1 = {
    quizId:      quizId1,
    quizQuestion:'🌍 Em qual PAÍS fica este lugar famoso?',
    quizOptions: countryOpts,
    quizCorrect: countryCorrectIdx,
    quizSubject: '📸 Lugares do Mundo',
    quizStage:   1,
    quizImage:   imgUrl || undefined,
    quizImageId: imgId || undefined,
    nonce: Math.random().toString(36).substring(2, 10),
  };

  currentQuizQuestionRef.current = { ...quizData1, quizId: quizId1, votes: {} };
  sendQuizQuestion(quizData1);

  // Após 2 min: revela etapa 1, depois 5s lança etapa 2
  quizTimerRef.current = setTimeout(() => {
    if (!quizBotActiveRef.current) return;
    sendQuizReveal(quizId1);
    currentQuizQuestionRef.current = null;
    worldQuizStageRef.current = 0;

    setTimeout(() => {
      if (!quizBotActiveRef.current) return;

      // ── ETAPA 2: Qual o ESTADO/CIDADE? ── (mesma imagem, sem nova chamada API)
      const statePool = place.statePool || ALL_COUNTRIES; // fallback seguro
      const [stateOpts, stateCorrectIdx] = buildAlternatives(statePool, place.state);
      const quizId2 = 'quiz-world2-' + Date.now() + '-' + Math.random().toString(36).substring(2);
      worldQuizId2Ref.current = quizId2;
      worldQuizStageRef.current = 2;

      const quizData2 = {
        quizId:      quizId2,
        quizQuestion:'🗺️ Em qual ESTADO ou CIDADE fica este lugar?',
        quizOptions: stateOpts,
        quizCorrect: stateCorrectIdx,
        quizSubject: '📸 Lugares do Mundo',
        quizStage:   2,
        quizImage:   worldQuizImageRef.current || undefined,  // mesma imagem — zero chamadas extras
        nonce: Math.random().toString(36).substring(2, 10),
      };

      currentQuizQuestionRef.current = { ...quizData2, quizId: quizId2, votes: {} };
      sendQuizQuestion(quizData2);

      // Após mais 2 min: revela etapa 2, depois 10s próxima rodada
      quizTimerRef.current = setTimeout(() => {
        if (!quizBotActiveRef.current) return;
        sendQuizReveal(quizId2);
        currentQuizQuestionRef.current = null;
        worldQuizStageRef.current = 0;

        setTimeout(() => {
          if (quizBotActiveRef.current) askNextQuestion();
        }, 10000); // 10s de respiro entre rodadas
      }, safeQuizInterval() * 1000); // etapa 2 — mesmo tempo do quiz normal

    }, 5000); // 5s entre etapa 1 e etapa 2
  }, safeQuizInterval() * 1000); // etapa 1 — mesmo tempo do quiz normal
};

// ── VIGILÂNCIA P2P: denuncia violação de intervalo para toda a rede ─────────
const broadcastQuizViolation = (violatorId, violatorName, elapsedSec) => {

    violatorName: violatorName || violatorId,

    detectedBy: peerId,

    timestamp: Date.now()
  };
  connectionsRef.current.forEach(c => { if (c.open) try { c.send(msg); } catch(e) {} });
  // Exibe alerta local também
  const alertMsg = {
    type: 'text',
    sender: 'system',
    senderName: '🚨 Vigilância da Rede',
    time: new Date().toLocaleTimeString('en-US'),
    timestamp: Date.now(),
    recipient: 'general',
    text: `⚠️ VIOLAÇÃO DETECTADA: "${violatorName || violatorId}" enviou quiz com apenas ${Math.round(elapsedSec)}s de intervalo (mínimo: ${MIN_QUIZ_INTERVAL}s). Mensagem BLOQUEADA pela rede.`
  };
  setMessages(prev => [...prev, alertMsg].slice(-500));
};

// ── Eleição de Mestre P2P (Self-Healing e Consistência) ──
const checkAndAssumeQuizMaster = () => {
  if (!quizBotActiveRef.current) return false;
  // Pega todos os peers conectados + nós mesmos
  const peers = [peerId, ...connectionsRef.current.filter(c => c.open).map(c => c.peer)];
  peers.sort(); // Eleição alfanumérica
  const isMaster = peers[0] === peerId;
  const wasMaster = quizMasterIdRef.current === peerId;
  quizMasterIdRef.current = peers[0];

  if (isMaster && !wasMaster) {
     console.log("👑 Assumi a coroa de Mestre do Quiz via P2P (Alfanumérico)!");
     if (quizTimerRef.current) clearTimeout(quizTimerRef.current);
     if (quizJitterTimerRef.current) clearTimeout(quizJitterTimerRef.current);
     // Jitter aleatório p/ dar segurança que todos enxergaram a queda unânime
     const takeoverDelayMs = 2000 + Math.floor(Math.random() * 2000); 
     quizJitterTimerRef.current = setTimeout(() => {
        // ── SOLUÇÃO 5: Master Claim pra Resolução de Conflito ──
        connectionsRef.current.forEach(c => { if(c.open) try{c.send({type: 'master-claim', senderId: peerId});}catch(e){} });
        askNextQuestion();
     }, takeoverDelayMs);
     
     // RETORNO FALSO TEMPORÁRIO: Bloqueia a execução imediata para evitar disparo duplo de perguntas, delegando para o setTimeout acima.
     return false;
  }
  return isMaster;
};

const askNextQuestion = async () => {
  if (quizTimerRef.current) clearTimeout(quizTimerRef.current);

  const isMaster = checkAndAssumeQuizMaster();

  if (!isMaster) {
      // Somos ouvintes/escravos (Vice-Mestres ou Recebedores).
      // Apenas aguardamos. O tempo e os dados virão pelo relay.
      const masterId = quizMasterIdRef.current;
      
      // Enviamos inscrição (Fallback pra garantir rotas diretas, vital pro World Sync)
      if (masterId !== worldQuizSubscribedToRef.current) {
        worldQuizSubscribedToRef.current = masterId;
        const subMsg = { type: 'subscribe-world-quiz', myId: peerId, distributorId: masterId };
        const masterConn = connectionsRef.current.find(c => c.peer === masterId && c.open);
        if (masterConn) {
          try { masterConn.send(subMsg); } catch(e) {}
        }
      }
      
      // Vigilância P2P pra Failover rápido: se o master demorar muito, re-elege
      quizTimerRef.current = setTimeout(() => {
        if (quizBotActiveRef.current) {
          console.log("Quiz: Timeout esperando mestre. Removendo inscrição e triggando auto-cura...");
          worldQuizSubscribedToRef.current = null;
          askNextQuestion(); // Retorna ao ciclo para auto-cura local ser triggada
        }
      }, safeQuizInterval() * 1000 + 15000); // Fôlego pro master network
      
      return;
  }

  // ── SE CHEGAMOS AQUI: SOMOS O MESTRE DA REDE! ──
  worldQuizSubscribedToRef.current = null;

  // FIX: Respeita o intervalo global mesmo após virar mestre (handoff sync)
  const now = Date.now();
  const elapsed = now - lastQuizTimeRef.current;
  const minIntervalMs = MIN_QUIZ_INTERVAL * 1000;
  
  if (elapsed < minIntervalMs) {
    const wait = minIntervalMs - elapsed + 1000;

// ── K10 V28: GRUPO 0 — Recebe totalUsers e calcula GID alvo localmente ─────
// O servidor Group 0 envia apenas 1 mensagem: { type:'group0-welcome', totalUsers, servers:[] }
// O cliente calcula LOCALMENTE o grupo destino — zero flood, zero coordenação.
//
// ALGORITMO DETERMINÍSTICO (idêntico ao nextSequentialGid() do servidor):
//   Charset: K10_CHARS base62 = 'A'-'Z' + 'a'-'z' + '0'-'9'
//   groupIdx = Math.floor(totalUsers / K10_MAX_GROUP)  (= floor(N / 1800))
//   GID = K10_CHARS base62 de groupIdx, padding 4 chars
//
// EXEMPLOS:
//   totalUsers=0      → groupIdx=0   → GID='AAAA' (primeiro grupo)
//   totalUsers=1800   → groupIdx=1   → GID='AAAB' (segundo grupo)
//   totalUsers=3600   → groupIdx=2   → GID='AAAC'
//   totalUsers=111600 → groupIdx=62  → GID='AABA'
//   totalUsers=1M+    → groupIdx=555 → qualquer GID base62
//
// GARANTIA: este cálculo converge com o servidor porque o servidor preenche
// grupos sequencialmente (AAAA → AAAB → AAAC...) via nextSequentialGid().
// ─────────────────────────────────────────────────────────────────────────────
if (data.type === 'group0-welcome') {
  // ── K10 V29: seta flag anti-loop — impede reenvio de group0-request

  // V29: indexa grupos recebidos no diretório local antes de redirecionar
  if (Array.isArray(data.groups) && data.groups.length > 0) {
    data.groups.forEach(function(g) {
      var gid = g.gid; var sz = g.size;
      if (gid && typeof sz === 'number') {

  }

  if (typeof rawTotal !== 'number' || rawTotal < 0 || rawTotal > 1e9) {
    addAudit(`[Grupo 0] ⚠️ totalUsers inválido recebido: ${rawTotal}`, 'warn');
    return;
  }

  const totalUsers = Math.floor(rawTotal);
  const groupIdx   = Math.floor(totalUsers / K10_MAX_GROUP);

  // Exatamente o mesmo algoritmo de nextSequentialGid() no servidor:
  //   n=0 → 'AAAA', n=1 → 'AAAB', n=62 → 'AABA', etc.
  let n = groupIdx;
  let targetGid = '';
  for (let i = 0; i < K10_GID_LEN; i++) {
    targetGid = K10_CHARS[n % K10_CHARS.length] + targetGid;
    n = Math.floor(n / K10_CHARS.length);
  }

  addAudit(
    `[Grupo 0] ✅ Recebido: totalUsers=${totalUsers.toLocaleString()} ` +

    recipient: 'you',

  }].slice(-500));

    s && typeof s === 'string' &&

  );

    setTimeout(() => {

        }

    );

  // já conhece o cliente e vai incluí-lo no grupo — conexão permanente, não heartbeat.
  const hasValidPeers = Array.isArray(data.peers) && data.peers.length > 0;
  const hasValidServers = candidates.length > 0;
  if (!hasValidPeers && !hasValidServers) {
    addAudit(`[Grupo 0] 🔗 Sem peers/servidores → conectando permanentemente a ${pId}`, 'info');
    setTimeout(() => {
      if (peerInstance.current && !peerInstance.current.destroyed) {
        // FIX V32-HEARTBEAT: delay de 6s garante que o heartbeat inicial (5s) já disparou
        // e encontrou a conexão pendente — evita race condition entre os dois.
        connectToPeer(pId); // pId = K10-CENTRAL — será membro regular do grupo
      }
    }, 6000);
  }
  // ── FIM FIX V32 ────────────────────────────────────────────────────────────

  // ── V30: Conecta diretamente aos peers[] → Modo Geral ativo imediatamente ──
  // O servidor Group 0 agora inclui uma lista de peers reais da rede (locais + mesh).
  // O cliente conecta a eles em paralelo com o redirecionamento ao servidor real.
  // Resultado: ao entrar no chat, o Modo Geral já tem pessoas para conversar —
  // sem esperar o servidor atribuir grupo → receber peer-list → conectar peers.
  if (Array.isArray(data.peers) && data.peers.length > 0) {
    addAudit(
      `[Grupo 0] 🌐 ${data.peers.length} peer(s) recebidos — conectando Modo Geral...`,
      'ok'
    );
    data.peers.forEach(function(pid, i) {
      if (!pid || pid === peerIdRef.current) return;
      // Evita duplicatas com conexões já abertas
      if (connectionsRef.current.some(function(c) { return c.peer === pid && c.open; })) return;
      // Escalonamento: 1s base + 200ms por peer + jitter aleatório
      // Evita flood de conexões simultâneas no PeerJS
      var delay = 1000 + i * 200 + Math.random() * 300;
      setTimeout(function() {
        if (!peerInstance.current || peerInstance.current.destroyed) return;
        // Checa novamente se já conectado (pode ter chegado inbound enquanto aguardava)
        if (connectionsRef.current.some(function(c) { return c.peer === pid && c.open; })) return;
        try {
          // FIX V30-BUG1: setupConnection não existe no cliente — usar connectToPeer
          // connectToPeer já configura todos os handlers (open, data, close, error) corretamente
          connectToPeer(pid);
          addAudit('[Modo Geral] 🔗 Peer direto: ' + pid, 'info');
        } catch(e) {
          addAudit('[Modo Geral] ⚠️ Falha ao conectar ' + pid + ': ' + e.message, 'warn');
        }
      }, delay);
    });

  return;
}

    directoryGlobalRef.current[data.gid].groupSize = cur > newCount ? newCount : cur;
    fillGroupPresenceBits(data.gid, newCount);
    const tag = data._binary ? '[K10-V26] pex-update binário' : '[K10-V25] pex-update';
    addAudit(`${tag}: grupo ${data.gid} → ${newCount} usuários`, 'sys');

    const pexJsonMsgId = data.msgId || (pId + '_pexupd_' + Date.now());
    if (isDuplicate(pexJsonMsgId)) return;
    const safeTtlUpd = Math.min(Math.max(0, parseInt(data.ttl) || 0), 6);
    if (safeTtlUpd > 0) {
      const relay = { ...data, ttl: safeTtlUpd - 1, msgId: pexJsonMsgId };
      connectionsRef.current.forEach(c => {
        if (c.peer !== pId && c.open) try { c.send(relay); } catch(e) {}
      });
    }
  }
  return;
}

// ── position-update — atualiza APENAS myGroupId (GID) ──
// NUNCA altera o Peer ID (p2pChatClientId). Apenas aceita se vier
// do servidor central (isCentralServer) para prevenir spoofing.
if (data.type === 'position-update') {
  if (!data.gid) return;
  // Segurança: só aceita do servidor central
  if (!isCentralServer(pId) && pId !== centralServerIdRef.current) return;
  // Atualiza SOMENTE o Group ID — Peer ID permanece intocado
  myGroupIdRef.current = data.gid;
  localStorage.setItem('myGroupId', data.gid);
  sendUserToMonitor();
  // Atualiza posição se sufixo informado
  if (data.user) {
    const newPosIdx = K10_POSITION_LIST.indexOf(data.user);
    if (newPosIdx >= 0) {
      myPositionIdxRef.current = newPosIdx;
      setGroupPresenceBit(data.gid, newPosIdx, true);
    }
  }
  addAudit(`[Hydra] position-update recebido do servidor: novo GID = ${data.gid}`, 'sys');
  return;
}


// ── V24: pex-family — lista delta comprimida para família de grupos ──────────
if (data.type === 'pex-family') {
  const { prefix, base, branches } = data;
  if (!prefix || typeof prefix !== 'string' || !Array.isArray(base) || !Array.isArray(branches)) return;
  branches.forEach(({ ext, delta }) => {
    if (!ext || !Array.isArray(delta)) return;
    const gid = prefix + ext;
    // V26: registra GID da família no registry binário (para receber eventos binários)
    k10bin.registerGid(gid);
    const allSuffixes = [...base, ...delta];
    if (!directoryGlobalRef.current[gid]) {
      directoryGlobalRef.current[gid] = { reservados: [], groupSize: 0 };
    }
    directoryGlobalRef.current[gid].groupSize = Math.max(
      directoryGlobalRef.current[gid].groupSize || 0,
      allSuffixes.length
    );
    // Conecta aos peers do MEU grupo usando a lista comprimida
    if (myGroupIdRef.current === gid && peerInstance.current) {
      const maxConns = isSuperNodeRef.current ? 50 : 15;
      allSuffixes.forEach(suffix => {
        if (typeof suffix !== 'string' || suffix.length !== K10_SUFFIX_LEN) return;
        const fullId = k10BuildPeerId(gid, suffix);
        if (fullId === peerIdRef.current) return;
        const active = Object.keys(peerInstance.current.connections).length;
        if (active < maxConns && !peerInstance.current.connections[fullId] && !bannedPeersRef.current.has(fullId)) {
          setTimeout(() => connectToPeer(fullId), Math.random() * 3000);
        }
      });
    }
  });
  // Relay com TTL decrementado
  if ((data.ttl || 0) > 0) {
    const relay = { ...data, ttl: capTtl(data.ttl) - 1 };
    connectionsRef.current.forEach(c => { if (c.peer !== pId && c.open) try { c.send(relay); } catch(e) {} });
  }
  return;
}

// ══════════════════════════════════════════════════════════════════════════════
// V27: HANDLERS HOMEOSTÁTICOS DE GRUPO
// INVARIANTE ABSOLUTA: peerIdRef.current NUNCA é alterado aqui.
//   Apenas myGroupIdRef.current e directoryGlobalRef.current são modificados.
// Todos os handlers fazem deduplicação por msgId antes de processar.
// ══════════════════════════════════════════════════════════════════════════════

// ── Handler 1: group-split — Mitose (servidor → cliente) ─────────────────────
// Payload: { parentGid, childGid, parentSize, childSize, msgId }
// Semântica: o grupo parentGid se dividiu. childGid nasce com childSize usuários.
//   Se myGroupIdRef === parentGid E o servidor enviou transferência, muda para childGid.
//   Se transferência não se aplica a este peer, mantém parentGid.
//   Em ambos os casos: peerIdRef.current permanece intocado.
if (data.type === 'group-split') {
  if (isGroupOpDuplicate(data.msgId)) return;
  // Aceita apenas do servidor central — peers P2P não podem iniciar mitose
  if (!isCentralServer(pId) && pId !== centralServerIdRef.current) return;
  const { parentGid, childGid, parentSize, childSize, iAmTransferred } = data;
  if (!parentGid || !childGid) return;
  const safeParentSize = Math.max(0, Math.min(K10_MAX_GROUP, parseInt(parentSize) || 0));
  const safeChildSize  = Math.max(0, Math.min(K10_MAX_GROUP, parseInt(childSize)  || 0));
  // Atualiza diretório: Pai com novo tamanho (≈1620), Filho nasce (≈181)
  setGroupSize(parentGid, safeParentSize);
  setGroupSize(childGid,  safeChildSize);
  // Registra o Filho no registry binário K10 para receber eventos futuros
  k10bin.registerGid(childGid);
  // Se este peer foi selecionado para transferência → muda apenas o GID
  // Peer ID permanece INTOCADO
  if (iAmTransferred === true) {
    const oldGid = myGroupIdRef.current;
    myGroupIdRef.current = childGid;
    localStorage.setItem('myGroupId', childGid);
    sendUserToMonitor();
    addAudit(
      `[K10-V27 MITOSE] Transferido do grupo ${oldGid} → ${childGid}. ` +
      `Pai: ${safeParentSize} usuários | Filho: ${safeChildSize} usuários. ` +
      `Peer ID mantido: ${peerIdRef.current}`,
      'success'
    );
    addGroupSystemMsg(
      `⚗️ Seu grupo se dividiu! Você foi movido para o novo grupo ${childGid} ` +
      `(${safeChildSize} usuários). Seu ID pessoal não mudou.`
    );
  } else {
    // Permanece no Pai — apenas registra o evento
    addAudit(
      `[K10-V27 MITOSE] Grupo ${parentGid} se dividiu → Filho: ${childGid}. ` +
      `Pai: ${safeParentSize} | Filho: ${safeChildSize}. Permaneci no Pai.`,
      'success'
    );
    addGroupSystemMsg(
      `⚗️ Grupo dividido! Novo grupo ${childGid} criado com ${safeChildSize} usuários. ` +
      `Você permanece em ${parentGid}.`
    );
  }
  return;
}

// ── Handler 2: group-tutor-status — Atualiza estado de tutela ────────────────
// Payload: { childGid, childSize, parentGid, active, msgId }
// Semântica: informa se o Filho ainda está em fase de tutela.
//   'active' = true  → Filho ainda não atingiu K10_TUTOR_TARGET.
//   'active' = false → Filho é adulto; irmandade simbiótica iniciada.
if (data.type === 'group-tutor-status') {
  if (isGroupOpDuplicate(data.msgId)) return;
  if (!isCentralServer(pId) && pId !== centralServerIdRef.current) return;
  const { childGid, childSize, parentGid, active } = data;
  if (!childGid) return;
  const safeSize = Math.max(0, Math.min(K10_MAX_GROUP, parseInt(childSize) || 0));
  // Atualiza diretório do Filho com tamanho mais recente
  setGroupSize(childGid, safeSize);
  // Atualiza ref de tutela (usado para exibir badge de status)
  if (active) {
    groupTutorStateRef.current = { childGid, parentGid, childSize: safeSize };
    // Calcula a faixa de roteamento ponderado para o log
    let routingPct = 0;
    if (safeSize < 500)        routingPct = 95;
    else if (safeSize < 1000)  routingPct = 80;
    else if (safeSize < 1500)  routingPct = 60;
    else if (safeSize < 1700)  routingPct = 30;
    addAudit(
      `[K10-V27 TUTELA] Filho ${childGid}: ${safeSize}/${K10_TUTOR_TARGET} usuários. ` +
      `Roteamento: ${routingPct}% de novos entrantes → Filho.`,
      'info'
    );
  } else {
    // Tutela encerrada — ambos os grupos são adultos
    groupTutorStateRef.current = null;
    addAudit(
      `[K10-V27 TUTELA] Grupo ${childGid} atingiu ${K10_TUTOR_TARGET} usuários. ` +
      `Fase adulta iniciada. Irmandade simbiótica com ${parentGid}.`,
      'success'
    );
    addGroupSystemMsg(`✅ Grupo ${childGid} atingiu autonomia. Irmandade simbiótica ativada.`);
  }
  return;
}

// ── Handler 3: group-alert — Alerta de nível crítico/alarme ─────────────────
// Payload: { gid, size, level, siblingGid, msgId }
// level: 'yellow' (< K10_ALERT_LOW) | 'red' (< K10_CRITICAL_LOW) | 'ok'
// Semântica: notifica peers do grupo sobre nível de ocupação para que
//   a UI possa exibir indicador de saúde e o servidor ajuste roteamento.
if (data.type === 'group-alert') {
  if (isGroupOpDuplicate(data.msgId)) return;
  if (!isCentralServer(pId) && pId !== centralServerIdRef.current) return;
  const { gid, size, level, siblingGid } = data;
  if (!gid) return;
  const safeSize = Math.max(0, Math.min(K10_MAX_GROUP, parseInt(size) || 0));
  setGroupSize(gid, safeSize);
  if (level === 'red') {
    addAudit(
      `[K10-V27 ALERTA 🔴] Grupo ${gid}: ${safeSize} usuários (< ${K10_CRITICAL_LOW}). ` +
      `Irmão ${siblingGid || '?'} iniciará compensação ativa.`,
      'error'
    );
    if (myGroupIdRef.current === gid) {
      addGroupSystemMsg(
        `🔴 Grupo crítico: ${safeSize} usuários. Compensação automática em andamento.`
      );
    }
  } else if (level === 'yellow') {
    addAudit(
      `[K10-V27 ALERTA 🟡] Grupo ${gid}: ${safeSize} usuários (< ${K10_ALERT_LOW}). ` +
      `Novos entrantes redirecionados. Monitorando irmão ${siblingGid || '?'}.`,
      'warn'
    );
  } else {
    // level === 'ok': grupo voltou ao normal
    addAudit(
      `[K10-V27 ALERTA ✅] Grupo ${gid}: ${safeSize} usuários. Nível normalizado.`,
      'success'
    );
  }
  return;
}

// ── Handler 4: group-compensate — Transferência de usuários entre irmãos ─────
// Payload: { donorGid, receiverGid, donorNewSize, receiverNewSize, msgId }
// Semântica: o grupo donorGid doou K10_COMPENSATE_DELTA usuários ao receiverGid.
//   Se myGroupIdRef === donorGid E iAmTransferred === true → migra para receiverGid.
//   Caso contrário: atualiza apenas os tamanhos no diretório.
//   Peer ID permanece INTOCADO em qualquer caso.
if (data.type === 'group-compensate') {
  if (isGroupOpDuplicate(data.msgId)) return;
  if (!isCentralServer(pId) && pId !== centralServerIdRef.current) return;
  const { donorGid, receiverGid, donorNewSize, receiverNewSize, iAmTransferred } = data;
  if (!donorGid || !receiverGid) return;
  const safeDonorSize    = Math.max(0, Math.min(K10_MAX_GROUP, parseInt(donorNewSize)    || 0));
  const safeReceiverSize = Math.max(0, Math.min(K10_MAX_GROUP, parseInt(receiverNewSize) || 0));
  // Atualiza tamanhos no diretório local
  setGroupSize(donorGid,    safeDonorSize);
  setGroupSize(receiverGid, safeReceiverSize);
  // Garante que o GID do receptor está registrado no registry binário
  k10bin.registerGid(receiverGid);
  if (iAmTransferred === true) {
    // Este peer é um dos transferidos do doador para o receptor
    // INVARIANTE: peerIdRef.current permanece intocado
    const oldGid = myGroupIdRef.current;
    myGroupIdRef.current = receiverGid;
    localStorage.setItem('myGroupId', receiverGid);
    sendUserToMonitor();
    addAudit(
      `[K10-V27 COMPENSAÇÃO] Movido de ${oldGid} (${safeDonorSize}) → ` +
      `${receiverGid} (${safeReceiverSize}). Peer ID mantido: ${peerIdRef.current}`,
      'success'
    );
    addGroupSystemMsg(
      `⚖️ Compensação de grupo: você foi movido para ${receiverGid} ` +
      `(${safeReceiverSize} usuários). Seu ID pessoal não mudou.`
    );
  } else {
    addAudit(
      `[K10-V27 COMPENSAÇÃO] Doador ${donorGid} → ${safeDonorSize} | ` +
      `Receptor ${receiverGid} → ${safeReceiverSize}. Não transferido.`,
      'info'
    );
  }
  return;
}

// ── Handler 5: group-merge — Fusão de grupos (Entropia Reversa) ──────────────
// Payload: { survivorGid, dissolvedGid, survivorNewSize, msgId }
// Critério de fusão: parentSize + childSize ≤ K10_MERGE_THRESHOLD (1700)
//   durante pelo menos K10_MERGE_DEBOUNCE_MS (5 min) — sem oscilações.
// Semântica: dissolvedGid é encerrado. Seus usuários migram para survivorGid.
//   Se myGroupIdRef === dissolvedGid → atualiza para survivorGid.
//   Diretório local: remove entrada do dissolvedGid, atualiza survivorGid.
//   Peer ID permanece INTOCADO em qualquer caso.
if (data.type === 'group-merge') {
  if (isGroupOpDuplicate(data.msgId)) return;
  if (!isCentralServer(pId) && pId !== centralServerIdRef.current) return;
  const { survivorGid, dissolvedGid, survivorNewSize } = data;
  if (!survivorGid || !dissolvedGid) return;
  const safeSurvivorSize = Math.max(0, Math.min(K10_MAX_GROUP, parseInt(survivorNewSize) || 0));
  // 1. Garante que survivorGid existe no diretório
  if (!directoryGlobalRef.current[survivorGid]) {
    directoryGlobalRef.current[survivorGid] = { reservados: [], groupSize: 0 };
  }
  // 2. Mescla reservados do grupo dissolvido no sobrevivente
  if (directoryGlobalRef.current[dissolvedGid]) {
    const dissolved = directoryGlobalRef.current[dissolvedGid];
    const survivor  = directoryGlobalRef.current[survivorGid];
    const mergedReservados = new Set([...survivor.reservados, ...dissolved.reservados]);
    survivor.reservados = [...mergedReservados].slice(0, 10);
    // Remove entrada do grupo dissolvido
    delete directoryGlobalRef.current[dissolvedGid];
  }
  // 3. Define tamanho do sobrevivente
  setGroupSize(survivorGid, safeSurvivorSize);
  // 4. Cancela qualquer debounce de fusão pendente (já executamos)
  if (groupMergeTimerRef.current) {
    clearTimeout(groupMergeTimerRef.current);
    groupMergeTimerRef.current = null;
  }
  groupMergeDebounceRef.current = null;
  // 5. Se este peer pertencia ao grupo dissolvido → migra para o sobrevivente
  //    INVARIANTE: peerIdRef.current permanece intocado
  if (myGroupIdRef.current === dissolvedGid) {
    myGroupIdRef.current = survivorGid;
    localStorage.setItem('myGroupId', survivorGid);
    sendUserToMonitor();
    // Conecta aos peers do grupo sobrevivente que ainda não conhecemos
    if (peerInstance.current && safeSurvivorSize > 0) {
      const maxConns = isSuperNodeRef.current ? 50 : 15;
      for (let i = 0; i < safeSurvivorSize; i++) {
        const suffix = K10_POSITION_LIST[i];
        if (!suffix) break;
        const fullPeerId = k10BuildPeerId(survivorGid, suffix);
        if (fullPeerId === peerIdRef.current) continue;
        const activeCount = Object.keys(peerInstance.current.connections).length;
        if (activeCount < maxConns
            && !peerInstance.current.connections[fullPeerId]
            && !bannedPeersRef.current.has(fullPeerId)) {
          setTimeout(() => connectToPeer(fullPeerId), Math.random() * 3000);
        }
      }
    }
    addAudit(
      `[K10-V27 FUSÃO] Grupo ${dissolvedGid} dissolvido → migrado para ${survivorGid} ` +
      `(${safeSurvivorSize} usuários). Peer ID mantido: ${peerIdRef.current}`,
      'success'
    );
    addGroupSystemMsg(
      `🔀 Fusão de grupos! Grupo ${dissolvedGid} foi integrado a ${survivorGid} ` +
      `(${safeSurvivorSize} usuários). Seu ID pessoal não mudou.`
    );
  } else if (myGroupIdRef.current === survivorGid) {
    addAudit(
      `[K10-V27 FUSÃO] Grupo ${dissolvedGid} absorvido pelo meu grupo ${survivorGid} ` +
      `→ ${safeSurvivorSize} usuários. Permaneci no sobrevivente.`,
      'success'
    );
    addGroupSystemMsg(
      `🔀 Grupo ${dissolvedGid} fundido aqui. Agora somos ${safeSurvivorSize} usuários.`
    );
  } else {
    // Peer não pertence a nenhum dos grupos — apenas atualiza diretório
    addAudit(
      `[K10-V27 FUSÃO] ${dissolvedGid} → ${survivorGid} (${safeSurvivorSize}). Não afetado.`,
      'info'
    );
  }
  return;
}

// ── Handler 6: group-orphan-rescue — Resgate de órfãos após queda ────────────
// Payload: { rescuerGid, orphanGid, rescuerNewSize, msgId }
// Semântica: o servidor do grupo orphanGid caiu. O grupo rescuerGid absorve
//   os usuários órfãos. Se myGroupIdRef === orphanGid → migra para rescuerGid.
//   Peer ID permanece INTOCADO.
if (data.type === 'group-orphan-rescue') {
  if (isGroupOpDuplicate(data.msgId)) return;
  if (!isCentralServer(pId) && pId !== centralServerIdRef.current) return;
  const { rescuerGid, orphanGid, rescuerNewSize } = data;
  if (!rescuerGid || !orphanGid) return;
  const safeRescuerSize = Math.max(0, Math.min(K10_MAX_GROUP, parseInt(rescuerNewSize) || 0));
  // Remove o grupo órfão do diretório
  delete directoryGlobalRef.current[orphanGid];
  // Atualiza o grupo resgatador
  setGroupSize(rescuerGid, safeRescuerSize);
  k10bin.registerGid(rescuerGid);
  // Se este peer era do grupo órfão → migra para o resgatador
  // Peer ID permanece INTOCADO
  if (myGroupIdRef.current === orphanGid) {
    myGroupIdRef.current = rescuerGid;
    localStorage.setItem('myGroupId', rescuerGid);
    sendUserToMonitor();
    // Reconecta aos peers do resgatador
    if (peerInstance.current && safeRescuerSize > 0) {
      const maxConns = isSuperNodeRef.current ? 50 : 15;
      for (let i = 0; i < safeRescuerSize; i++) {
        const suffix = K10_POSITION_LIST[i];
        if (!suffix) break;
        const fullPeerId = k10BuildPeerId(rescuerGid, suffix);
        if (fullPeerId === peerIdRef.current) continue;
        const activeCount = Object.keys(peerInstance.current.connections).length;
        if (activeCount < maxConns
            && !peerInstance.current.connections[fullPeerId]
            && !bannedPeersRef.current.has(fullPeerId)) {
          setTimeout(() => connectToPeer(fullPeerId), Math.random() * 2000);
        }
      }
    }
    addAudit(
      `[K10-V27 ORFANATO] Servidor do grupo ${orphanGid} caiu. ` +
      `Reabsorvido por ${rescuerGid} (${safeRescuerSize} usuários). ` +
      `Peer ID mantido: ${peerIdRef.current}`,
      'warn'
    );
    addGroupSystemMsg(
      `🆘 Servidor do seu grupo caiu. Você foi resgatado e movido para ${rescuerGid} ` +
      `(${safeRescuerSize} usuários). Seu ID pessoal não mudou.`
    );
  } else {
    addAudit(
      `[K10-V27 ORFANATO] Grupo ${orphanGid} resgatado por ${rescuerGid} ` +
      `(${safeRescuerSize}). Não afetado.`,
      'info'
    );
  }
  return;
}

// ── V27: Lógica de Debounce de Fusão (avaliação periódica P2P) ───────────────
// Esta lógica é executada localmente como monitor de saúde, mas a fusão real
// só ocorre quando o servidor envia 'group-merge'. Esta função avalia se as
// condições de fusão estão presentes e registra no audit para o servidor agir.
// NÃO executa fusão diretamente — apenas monitora e reporta.
if (data.type === 'group-size-report') {
  // Mensagem enviada pelo servidor para sincronizar tamanhos de grupos irmãos
  if (!isCentralServer(pId) && pId !== centralServerIdRef.current) return;
  const { groups } = data; // Array de { gid, size }
  if (!Array.isArray(groups)) return;
  groups.forEach(({ gid, size }) => {
    if (!gid || typeof size !== 'number') return;
    setGroupSize(gid, size);
  });
  // Avalia condição de fusão para pares de grupos
  // Encontra pares (Pai, Filho) onde soma ≤ K10_MERGE_THRESHOLD
  const gids = groups.map(g => g.gid);
  for (let i = 0; i < gids.length; i++) {
    for (let j = i + 1; j < gids.length; j++) {
      const gA = gids[i], gB = gids[j];
      const sumAB = getGroupSize(gA) + getGroupSize(gB);
      if (sumAB <= K10_MERGE_THRESHOLD) {
        const debounce = groupMergeDebounceRef.current;
        const now = Date.now();
        if (!debounce || debounce.gid1 !== gA || debounce.gid2 !== gB) {
          // Nova condição de fusão — inicia debounce
          if (groupMergeTimerRef.current) clearTimeout(groupMergeTimerRef.current);
          groupMergeDebounceRef.current = { gid1: gA, gid2: gB, since: now, sum: sumAB };
          groupMergeTimerRef.current = setTimeout(() => {
            // Após K10_MERGE_DEBOUNCE_MS: condição estável → audita para o servidor
            // O servidor tomará a decisão final e enviará 'group-merge'
            const cur = groupMergeDebounceRef.current;
            if (cur && cur.gid1 === gA && cur.gid2 === gB) {
              addAudit(
                `[K10-V27 FUSÃO-DEBOUNCE] Condição de fusão estável por 5min: ` +
                `${gA}(${getGroupSize(gA)}) + ${gB}(${getGroupSize(gB)}) = ${getGroupSize(gA)+getGroupSize(gB)} ≤ ${K10_MERGE_THRESHOLD}. ` +
                `Aguardando confirmação do servidor para executar fusão.`,
                'warn'
              );
            }
            groupMergeDebounceRef.current = null;
            groupMergeTimerRef.current = null;
          }, K10_MERGE_DEBOUNCE_MS);
          addAudit(
            `[K10-V27 FUSÃO] Condição detectada: ${gA}+${gB}=${sumAB} ≤ ${K10_MERGE_THRESHOLD}. ` +
            `Aguardando ${K10_MERGE_DEBOUNCE_MS/60000}min sem oscilação.`,
            'info'
          );
        }
        // else: mesma condição, debounce já em andamento — não reinicia
      } else {
        // Condição de fusão não atendida — cancela debounce se existia
        const debounce = groupMergeDebounceRef.current;
        if (debounce && debounce.gid1 === gA && debounce.gid2 === gB) {
          if (groupMergeTimerRef.current) clearTimeout(groupMergeTimerRef.current);
          groupMergeDebounceRef.current = null;
          groupMergeTimerRef.current = null;
          addAudit(
            `[K10-V27 FUSÃO] Condição cancelada: ${gA}+${gB}=${sumAB} > ${K10_MERGE_THRESHOLD}. Debounce resetado.`,
            'info'
          );
        }
      }
    }
  }
  return;
}
// ══════════════════════════════════════════════════════════════════════════════
// FIM DOS HANDLERS V27 HOMEOSTÁTICOS
// ══════════════════════════════════════════════════════════════════════════════

// ── V24: gid-promote — troca de GID por dominância dinâmica ─────────────────
if (data.type === 'gid-promote') {
  // V26: para pacotes binários o dedup já foi feito acima pelo SEQ
  if (!data._binary && data.msgId && isDuplicate(data.msgId)) return;
  const { formerDominantGid, formerRecessiveGid } = data;
  if (!formerDominantGid || !formerRecessiveGid) return;
  // V26: garante que ambos os GIDs estão no registry binário (troca de índices)
  k10bin.registerGid(formerDominantGid);
  k10bin.registerGid(formerRecessiveGid);
  if (!formerDominantGid || !formerRecessiveGid) return;
  const myGid = myGroupIdRef.current;
  if (myGid === formerDominantGid || myGid === formerRecessiveGid) {
    // Se este nó pertence ao grupo recessivo, migra para o dominante
    const newGid = myGid === formerRecessiveGid ? formerDominantGid : formerRecessiveGid;
    myGroupIdRef.current = newGid;
    localStorage.setItem('myGroupId', newGid);
    sendUserToMonitor();
    // Peer ID permanece INTOCADO — apenas o Group ID muda
    addAudit(`[Hydra] gid-promote: migrado de ${myGid} → ${newGid}. Peer ID mantido: ${peerIdRef.current}`, 'sys');
    // Mescla diretório: absorve entradas do grupo antigo no novo
    if (directoryGlobalRef.current[myGid]) {
      if (!directoryGlobalRef.current[newGid]) {
        directoryGlobalRef.current[newGid] = { reservados: [], groupSize: 0 };
      }
      const dominated = directoryGlobalRef.current[myGid];
      const dominant  = directoryGlobalRef.current[newGid];
      const mergedR = new Set([...dominant.reservados, ...dominated.reservados]);
      dominant.reservados = [...mergedR].slice(0, 10);
      dominant.groupSize  = Math.max(dominant.groupSize, dominant.groupSize + dominated.groupSize, dominated.groupSize);
      dominant.lastUpdate = Date.now();
      delete directoryGlobalRef.current[myGid];
    }
  }
  // V26: relay apenas JSON (binários já relayados no interceptor do topo)
  if (!data._binary && (data.ttl || 0) > 0) {
    const relay = { ...data, ttl: capTtl(data.ttl) - 1 };
    connectionsRef.current.forEach(c => { if (c.peer !== pId && c.open) try { c.send(relay); } catch(e) {} });
  }
  return;
}


// ════════════════════════════════════════════════════════════════════
// V8-BUG#4: bounds-check de tamanho ANTES de qualquer relay/processamento
// Mensagens de topologia/texto não devem passar de 200KB. file-chunk e
// audio-chunk têm seus próprios limites (totalSize já validado).
// ════════════════════════════════════════════════════════════════════
try {
  if (data && typeof data === 'object' &&
      data.type !== 'file-chunk' && data.type !== 'file-start' &&
      data.type !== 'audio-chunk' && data.type !== 'audio-start' &&
      data.type !== 'radio-chunk' && data.type !== 'radio-start') {
    const approxSize = JSON.stringify(data).length;
    if (approxSize > 200 * 1024) {
      console.warn('[V8-BUG#4] mensagem rejeitada por tamanho:', data.type, approxSize);
      return;
    }
  }
} catch(e) {}

// FASE-3/Caso2: trava de operação em andamento recebida de outro grupo
if (data.type === 'group-operation-lock') {
  // V6 FIX: dedup + TTL decremento para evitar eco infinito
  if (data.msgId && seenMsgIdsRef.current.has(data.msgId)) return;

  lockedGroupsRef.current[data.groupId] = data.expiry;
  if (data.ttl !== undefined && data.ttl > 0) {
    const relayLock = { ...data, ttl: capTtl(data.ttl) - 1 };

// FASE-3/Caso5: eleição de novo reservado após split
if (data.type === 'new-reservado' && data.peerId && data.groupId) {
  addAudit(`[Hydra] Novo Reservado eleito: ${data.peerId} para o grupo ${data.groupId}`, 'sys');

    set.add(data.peerId);

  }

if (data.type === 'group-split') {

  if (data.msgId && isDuplicate(data.msgId)) return;
  const { oldGroupId, newGroupId } = data;
  // Atualiza diretório: cria entrada para o novo grupo
  if (newGroupId && !directoryGlobalRef.current[newGroupId]) {
    directoryGlobalRef.current[newGroupId] = { reservados: data.migratedReservados || [], groupSize: data.migratedReservados ? data.migratedReservados.length : 0, lastUpdate: Date.now() };
  }
  // Se sou reservado do grupo que fez split, migro para o novo grupo
  if (isSuperNodeRef.current && myGroupIdRef.current === oldGroupId) {
    myGroupIdRef.current = newGroupId;
    localStorage.setItem('myGroupId', newGroupId);
    sendUserToMonitor();
  }
  // FASE-3/Caso5: se meu grupo original perdeu todos os reservados, auto-eleição
  if (myGroupIdRef.current === oldGroupId && !isSuperNodeRef.current) {
    const myConns = Object.keys(peerInstance.current ? peerInstance.current.connections : {}).length;
    if (myConns >= 20) {
      // V6 (P7): eleicao baseada em heartbeats observados localmente.
      // Cada no calcula o conjunto de peers vivos de seu grupo, ordena por peerId,
      // e elege os 10 menores como novos reservados (capacidade reduzida 1800->10).
      const myGroupNow = myGroupIdRef.current;
      const livePeers = [peerId];
      for (const [pid, info] of peerHeartbeatsRef.current) {
        if (info.groupId === myGroupNow && Date.now() - info.lastSeen < 90000) livePeers.push(pid);
      }
      const sorted = [...new Set(livePeers)].sort();
      const electedTop10 = sorted.slice(0, 10);
      // PATCH-3 (V4 FIX BUG#1): só assume reservado se device for capaz (desktop, RAM/CPU OK)
      // Lógica original estava invertida — o else-if capturava QUALQUER eleição.
      if (electedTop10.includes(peerId) && canBeReservadoRef.current) {
        isSuperNodeRef.current = true;
        setIsSuperNode(true);
        const electMsg = {
          type: 'new-reservado',
          msgId: makeMsgId(),
          peerId,
          groupId: oldGroupId,
          epoch: epochRef.current,
          ttl: 5
        };
        floodMessage(electMsg, null);
      } else if (electedTop10.includes(peerId)) {

      }
    }
  }
  // V4 FIX BUG#5: dedup já feito no início; aqui só relay.
  if (data.ttl !== undefined && data.ttl > 0) {
    const relay = { ...data, ttl: capTtl(data.ttl) - 1 };
    connectionsRef.current.forEach(c => { if (c.peer !== pId && c.open) try { c.send(relay); } catch(e) {} });
  }
  return;
}

// FASE-3/Caso3: receber group-merge — confiar na mensagem do reservado remetente
if (data.type === 'group-merge') {
  addAudit(`[Hydra] Fusão de grupos: ${data.absorbedGroupId} absorvido por ${data.survivingGroupId}`, 'sys');
  // V4 FIX BUG#6: dedup ANTES de qualquer mutação. Sem isso, cada hop somava
  //               groupSize (BUG#7) e remigrar o nó N vezes.
  if (data.msgId && isDuplicate(data.msgId)) return;
  const { survivingGroupId, absorbedGroupId } = data;
  // Confiar na mensagem — remetente tem dados mais atualizados
  if (myGroupIdRef.current === absorbedGroupId) {
    myGroupIdRef.current = survivingGroupId;
    localStorage.setItem('myGroupId', survivingGroupId);
    sendUserToMonitor();
  }
  // Atualizar diretório local imediatamente
  if (directoryGlobalRef.current[absorbedGroupId]) {
    const absorbed = directoryGlobalRef.current[absorbedGroupId];
    if (!directoryGlobalRef.current[survivingGroupId]) {
      directoryGlobalRef.current[survivingGroupId] = { reservados: [], groupSize: 0, lastUpdate: Date.now() };
    }
    // Merge dos reservados
    const mergedR = new Set([
      ...directoryGlobalRef.current[survivingGroupId].reservados,
      ...absorbed.reservados
    ]);
    directoryGlobalRef.current[survivingGroupId].reservados = [...mergedR].slice(0, 10); // PATCH-B: V6=10
    // V8-BUG#3: groupSize idempotente — usar MAX(soma_atual, soma_absorvido)
    // para que múltiplos relays não inflem o tamanho.
    const survivingSize = directoryGlobalRef.current[survivingGroupId].groupSize || 0;
    const absorbedSize  = absorbed.groupSize || 0;
    directoryGlobalRef.current[survivingGroupId].groupSize = Math.max(survivingSize, survivingSize + absorbedSize, absorbedSize);
    directoryGlobalRef.current[survivingGroupId].lastUpdate = Date.now();
    delete directoryGlobalRef.current[absorbedGroupId];
  }
  if (data.ttl !== undefined && data.ttl > 0) {
    const relay = { ...data, ttl: capTtl(data.ttl) - 1 };
    connectionsRef.current.forEach(c => { if (c.peer !== pId && c.open) try { c.send(relay); } catch(e) {} });
  }
  return;
}

// V6 (P1+P2): handler de p2p-heartbeat para manter contagem real de membros

    peerHeartbeatsRef.current.set(data.peerId, {
      lastSeen: Date.now(),
      groupId: data.groupId,
      isReservado: data.isReservado,
      epoch: data.epoch,
      afk: !!data.afk  // PATCH-3: rastreia tabs em background

  // relay
  if (data.ttl !== undefined && data.ttl > 0) {
    const relay = { ...data, ttl: capTtl(data.ttl) - 1 };
    connectionsRef.current.forEach(c => { if (c.peer !== pId && c.open) try { c.send(relay); } catch(e) {} });

}

  if (data.msgId && isDuplicate(data.msgId)) return;
  if (!data.groupId) return;
  const cur = directoryGlobalRef.current[data.groupId];
  const incomingEpoch = data.epoch || 0;
  if (!cur || (cur.epoch || 0) <= incomingEpoch) {
    directoryGlobalRef.current[data.groupId] = {
      reservados: Array.isArray(data.reservados) ? data.reservados.slice(0, 10) : [],
      groupSize: typeof data.groupSize === 'number' ? data.groupSize : 0,
      epoch: incomingEpoch,
      lastUpdate: Date.now()
    };
  }
  const ttl = capTtl(data.ttl) - 1;
  if (ttl > 0) {
    const relay = { ...data, ttl };
    connectionsRef.current.forEach(c => {
      if (c.peer !== pId && c.open) try { c.send(relay); } catch(e) {}
    });
  }
  return;
}

// FASE-2: update-peer — mensagem de topologia com TTL=5, filtrada por grupo
if (data.type === 'update-peer') {

  if (data.groupId && myGroupIdRef.current && data.groupId !== myGroupIdRef.current) return;

  if (data.groupId && data.peerId) {
    if (!directoryGlobalRef.current[data.groupId]) {
      directoryGlobalRef.current[data.groupId] = { reservados: [], groupSize: 0 };
    }
    if (data.isReservado) {
      const set = new Set(directoryGlobalRef.current[data.groupId].reservados);
      set.add(data.peerId);
      directoryGlobalRef.current[data.groupId].reservados = [...set].slice(0, 10); // PATCH-B: V6=10 reservados
    }
    if (data.groupSize !== undefined) {
      directoryGlobalRef.current[data.groupId].groupSize = data.groupSize;
    }
  }
  // Relay com TTL decrementado (TTL=5 para mensagens de topologia)
  const ttl = capTtl(data.ttl !== undefined ? data.ttl : 5);
  if (ttl > 0) {
    const relay = { ...data, ttl: ttl - 1 };
    connectionsRef.current.forEach(c => { if (c.peer !== pId && c.open) try { c.send(relay); } catch(e) {} });

}

return { status: now >= data.startTime ? 'playing' : 'buffering', type: 'stream', startTime: data.startTime, audioUrl: data.streamUrl, fileName: data.fileName, sender: data.senderName, showVideo: false, videoSize: 'medium' };

} else if (data.radioType === 'youtube') {

pruneSeenClient();

let ttl = capTtl(data.ttl !== undefined ? data.ttl : 8); // FIX-AUDIT-CLI3e
if (ttl > 0) { const relay = { ...data, ttl: ttl - 1 }; /* FIX BUG-6: relay via ref — no side-effects inside state updater */ connectionsRef.current.forEach(c => { if (c.peer !== pId && c.open) try { c.send(relay); } catch(e){} }); }
if (data.type === 'radio-start') {

pendingRadioFiles.current[data.radioId] = { chunks: new Uint8Array(data.fileSize), receivedBytes: 0, totalSize: data.fileSize, _t: Date.now() };
setRadioState({ status: 'buffering', type: 'file', startTime: data.startTime, duration: data.duration, audioUrl: null, youtubeId: null, fileName: data.fileName, sender: data.senderName, showVideo: false, videoSize: 'medium' });
} else if (data.type === 'radio-stream-start') {

}

call.on('stream', rs => setRemoteStreams(prev => [...prev.filter(s => !(s.peerId === peerIdToCall && s.type === 'voice')), { peerId: peerIdToCall, stream: rs, type: 'voice' }]));
call.on('close', () => endCall(peerIdToCall, 'voice'));
call.on('error', err => { alert(t(lang, 'callError') + err.message); endCall(peerIdToCall, 'voice'); });
} catch (err) { alert(t(lang, 'micError') + err.message); }
};


const toggleVideoCall = async (peerIdToCall) => {
if (!peerInstance.current || !peerIdToCall) return;
const existingCall = activeCallsRef.current.find(c => c.peerId === peerIdToCall && c.type === 'video'); // FIX N-2 V20: era activeCalls (stale closure)
const isSendingVideo = existingCall && existingCall.localStream;
// V39-FIX: chamada video user→user → peer aparece na aba Privado
// V43-FIX: atualiza REF + STATE
if (!isSendingVideo && !directPeersRef.current.has(peerIdToCall)) {
  directPeersRef.current.add(peerIdToCall);
  setDirectPeers(prev => { const s = new Set(prev); s.add(peerIdToCall); return s; });
}
// BUG C-4 FIX: usa connectionsRef.current para evitar stale closure
const conn = connectionsRef.current.find(c => c.peer === peerIdToCall);
if (isSendingVideo) {
if (existingCall.localStream) { existingCall.localStream.getTracks().forEach(tr => tr.stop()); localStreamsRef.current.delete(peerIdToCall + '_video'); }
setActiveCalls(prev => prev.map(c => c.peerId === peerIdToCall && c.type === 'video' ? { ...c, localStream: null } : c));
if (localStreamsRef.current.size === 0) { setIsLocalVideoVisible(false); if (localVideoRef.current) localVideoRef.current.srcObject = null; }
} else {
if (!conn || !conn.open) { alert(t(lang, 'contactOffline2')); return; }
try {
const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
localStreamsRef.current.set(peerIdToCall + '_video', stream);
setIsLocalVideoVisible(true);
if (localVideoRef.current) localVideoRef.current.srcObject = stream;
const call = peerInstance.current.call(peerIdToCall, stream, { metadata: { type: 'video' } });
setActiveCalls(prev => [...prev.filter(c => !(c.peerId === peerIdToCall && c.type === 'video')), { peerId: peerIdToCall, call, localStream: stream, type: 'video', direction: 'outgoing', isTemporaryStream: false }]);
call.on('stream', rs => setRemoteStreams(prev => [...prev.filter(s => !(s.peerId === peerIdToCall && s.type === 'video')), { peerId: peerIdToCall, stream: rs, type: 'video' }]));
call.on('close', () => endCall(peerIdToCall, 'video'));
call.on('error', err => { alert(t(lang, 'videoError') + err.message); endCall(peerIdToCall, 'video'); });
} catch (err) { alert(t(lang, 'cameraError') + err.message); }
}
};


const broadcastYoutubeChat = () => {
if (youtubeChatId) { alert(t(lang, 'chatAlreadyActive') || 'A chat is already active. Stop it first.'); return; }
const url = prompt(t(lang, 'enterYoutubeUrl') || 'Enter YouTube Live URL for Chat:');
if (!url) return;
let yId = null;
try {
let parsedUrl = url;
if (!parsedUrl.startsWith('http')) parsedUrl = 'https://' + parsedUrl;
if (parsedUrl.includes('youtu.be/')) yId = parsedUrl.split('youtu.be/')[1].split('?')[0];
else if (parsedUrl.includes('youtube.com/watch')) yId = new URL(parsedUrl).searchParams.get('v');
else if (parsedUrl.includes('youtube.com/live/')) yId = parsedUrl.split('youtube.com/live/')[1].split('?')[0];
} catch (e) {}
if (!yId) { alert(t(lang, 'invalidYoutubeUrl') || 'Invalid YouTube URL'); return; }


setYoutubeChatId(yId);
const msgId = Date.now() + Math.random().toString(36).substring(2);
const msgData = { type: 'youtube-chat-start', id: msgId, youtubeId: yId, ttl: 15 };
connectionsRef.current.forEach(c => { if (c.open) try { c.send(msgData); } catch(e){} }); // FIX O-3 V21: era connections (stale closure)
};


const stopYoutubeChat = () => {
setYoutubeChatId(null);
// FIX BUG-L5b: sem este broadcast nenhum peer recebia o stop — rede ficava com chat preso
const msgId = Date.now() + Math.random().toString(36).substring(2);
const msgData = { type: 'youtube-chat-stop', id: msgId, ttl: 8 };
connectionsRef.current.forEach(c => { if (c.open) try { c.send(msgData); } catch(e){} });
};


const endCall = (peerIdToEnd, callType) => {
  // V7-B19: parar tracks do remoteStream antes de remover
  try {
    setRemoteStreams(prev => {
      prev.forEach(s => { if (s.peerId === peerIdToEnd && s.type === callType && s.stream) { try { s.stream.getTracks().forEach(t => t.stop()); } catch(e){} } });
      return prev.filter(s => !(s.peerId === peerIdToEnd && s.type === callType));
    });
  } catch(e){}
// FIX C-10: usa activeCallsRef.current (sempre fresco) — activeCalls é closure stale em callbacks PeerJS
const callData = activeCallsRef.current.find(c => c.peerId === peerIdToEnd && c.type === callType);
if (callData) {
if (callData.call) callData.call.close();
if (callData.localStream) { callData.localStream.getTracks().forEach(tr => tr.stop()); stopAndRemoveLocalStream(peerIdToEnd + '_' + callType); }
}
setActiveCalls(prev => prev.filter(c => !(c.peerId === peerIdToEnd && c.type === callType)));
setRemoteStreams(prev => prev.filter(s => !(s.peerId === peerIdToEnd && s.type === callType)));
const anyVideo = Array.from(localStreamsRef.current.values()).some(s => s.getVideoTracks().some(tr => tr.readyState === 'live'));
if (!anyVideo) { setIsLocalVideoVisible(false); if (localVideoRef.current) localVideoRef.current.srcObject = null; }
};

  </div>
  <div style={{ flex: 1 }}>
    {editingName ? (
      <div className="user-name-form">
        <input type="text" value={userName} onChange={e => setUserName(e.target.value)} placeholder={t(lang, 'typeName')} autoFocus />
        <button onClick={saveUserName} disabled={!userName.trim()}>{t(lang, 'save')}</button>
      </div>
    ) : (
      <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
        <span style={{ fontSize: '13px', color: 'var(--text-muted)' }}>{t(lang, 'yourName')}:</span>
        <span className="username">{userName}</span>
        <button className="user-edit-button" onClick={() => setEditingName(true)}>{t(lang, 'edit')}</button>
        <button className="user-edit-button" style={{ background: '#f8fafc', color: '#6366f1', border: '1px solid #e2e8f0', marginLeft: '6px' }} onClick={() => setShowAuditPanel(true)}>
          <i className="fas fa-list-alt"></i> {t(lang, 'auditLog')}
        </button>
      </div>
    )}
  </div>
</div>


<div className="peer-id-container">
<div style={{ display: 'flex', alignItems: 'center', gap: '14px', flexWrap: 'wrap' }}>
<span style={{ fontSize: '13px', color: 'var(--text-muted)' }}>{t(lang, 'yourId')}</span>
<span className="peer-id-label">{peerId}</span>
<button onClick={() => setIsSuperNode(!isSuperNode)} style={{ backgroundColor: isSuperNode ? '#fef3c7' : 'white', color: isSuperNode ? '#b45309' : '#64748b', border: `1px solid ${isSuperNode ? '#f59e0b' : 'var(--border)'}`, padding: '5px 12px', borderRadius: '6px', cursor: 'pointer', fontSize: '12px', fontWeight: '700' }}>
<i className="fas fa-bolt" style={{ color: isSuperNode ? '#d97706' : '#94a3b8' }}></i> {isSuperNode ? t(lang, 'superNodeOn') : t(lang, 'superNodeOff')}
</button>
</div>
<div style={{ display: 'flex', gap: '8px' }}>
<button onClick={() => { navigator.clipboard.writeText(peerId); alert(t(lang, 'copied')); }}>{t(lang, 'copy')}</button>

</div>
</div>


{showYoutubeGrid && (
<div style={{ position: 'fixed', inset: 0, backgroundColor: 'rgba(0,0,0,0.85)', zIndex: 10000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' }}>
<div style={{ backgroundColor: '#1e1e1e', borderRadius: '12px', width: '100%', maxWidth: '500px', padding: '24px', boxShadow: '0 20px 50px rgba(0,0,0,0.8)', color: 'white', fontFamily: 'sans-serif' }}>
<div style={{ marginBottom: '16px' }}>
<div style={{ fontSize: '14px', color: '#ccc', marginBottom: '8px' }}>andradepsa.github.io diz</div>
<div style={{ fontSize: '16px', fontWeight: '500', marginBottom: '12px' }}>{t(lang, 'enterYoutubeUrl')}</div>
<input
type="text"
value={gridInput}
onChange={e => setGridInput(e.target.value)}
style={{ width: '100%', padding: '12px', borderRadius: '8px', border: '1px solid #444', backgroundColor: '#2d2d2d', color: 'white', outline: 'none', fontSize: '14px' }}
onKeyDown={e => { if (e.key === 'Enter') startYoutubeBroadcast(gridInput); }}
autoFocus
/>
</div>


<div style={{ display: 'grid', gridTemplateColumns: 'repeat(10, 1fr)', gap: '4px', marginBottom: '24px', maxHeight: '300px', overflowY: 'auto', padding: '4px' }}>
{Array.from({ length: Object.keys(YOUTUBE_LINKS_LIST).length }, (_, i) => i + 1).map(num => (
<button
key={num}
onClick={() => {
const savedUrl = youtubeLinks[num];
if (savedUrl) {
startYoutubeBroadcast(savedUrl);
} else {
const url = prompt(`${t(lang, 'enterUrlFor')} ${num}:`);
if (url) {
const newLinks = { ...youtubeLinks, [num]: url };
setYoutubeLinks(newLinks);
startYoutubeBroadcast(url);
}
}
}}
onContextMenu={(e) => {
e.preventDefault();
const url = prompt(`${t(lang, 'editUrlFor')} ${num}:`, youtubeLinks[num] || '');
if (url !== null) {
const newLinks = { ...youtubeLinks, [num]: url };
setYoutubeLinks(newLinks);
}
}}
style={{
padding: '6px 0',
borderRadius: '4px',
border: 'none',
backgroundColor: 'transparent',
color: youtubeLinks[num] ? '#38bdf8' : '#fff',
fontSize: '13px',
cursor: 'pointer',
textAlign: 'center'
}}
>
{num}
</button>
))}
</div>


<div style={{ display: 'flex', justifyContent: 'flex-end', gap: '12px' }}>
<button
onClick={() => startYoutubeBroadcast(gridInput)}
style={{ padding: '10px 30px', borderRadius: '25px', border: 'none', backgroundColor: '#93c5fd', color: '#1e3a8a', fontWeight: 'bold', cursor: 'pointer' }}
>
OK
</button>
<button
onClick={() => setShowYoutubeGrid(false)}
style={{ padding: '10px 30px', borderRadius: '25px', border: 'none', backgroundColor: '#0c4a6e', color: '#bae6fd', fontWeight: 'bold', cursor: 'pointer' }}
>
{t(lang, 'cancel') || 'Cancelar'}
</button>
</div>
</div>
</div>
)}


{/* Local Video Windows */}
{isLocalVideoVisible && (
<FloatingWindow
title={t(lang, 'you') + ' (Cam)'}
initialPosition={{ x: 20, y: 20 }}
onClose={() => setIsLocalVideoVisible(false)}
onNextCamera={() => {
const allPeers = [...new Set([peerId, ...remoteStreams.map(s => s.peerId), ...Object.keys(userYoutubeStreams), ...Object.keys(userRadios)])];
if (allPeers.length <= 1) return;
const currIdx = allPeers.indexOf(peerId);
const nextPeer = allPeers[(currIdx + 1) % allPeers.length];
setWindowTargets(prev => ({ ...prev, [peerId]: nextPeer }));
}}
>
<StreamRenderer targetId={windowTargets[peerId] || peerId} peerId={peerId} streamType="video" localVideoRef={localVideoRef} videoRefs={videoRefs}/>
</FloatingWindow>
)}

{/* Local Radio Window */}
{userRadios[peerId] && (
<FloatingWindow
title={t(lang, 'worldRadios')}
initialPosition={{ x: 30, y: 30 }}
onClose={handleStopWorldRadio}
>
<StreamRenderer targetId={peerId} peerId={peerId} streamType="radio" userRadios={userRadios} localVideoRef={localVideoRef} videoRefs={videoRefs} />
</FloatingWindow>
)}

{/* Local YouTube Window */}
{userYoutubeStreams[peerId] && (
<FloatingWindow
title={t(lang, 'you') + ' (YT)'}
initialPosition={{ x: 40, y: 40 }}
onClose={handleYoutubeRadio}
>
<StreamRenderer targetId={peerId} peerId={peerId} streamType="yt" userYoutubeStreams={userYoutubeStreams} localVideoRef={localVideoRef} videoRefs={videoRefs} />
</FloatingWindow>
)}


{/* Remote Streams / YouTube Gallery / World Radios */}
{(() => {
  const videoPeers = remoteStreams.map(s => s.peerId).filter(id => id !== peerId);
  const ytPeers = Object.keys(userYoutubeStreams).filter(id => id !== peerId);
  const wrPeers = Object.keys(userRadios).filter(id => id !== peerId);

  return (
    <>
      {videoPeers.map((pId) => (
        <FloatingWindow key={pId} title={getContactName(windowTargets[pId] || pId)} onClose={() => endCall(pId, 'video')}>
           <StreamRenderer targetId={windowTargets[pId] || pId} peerId={peerId} localVideoRef={localVideoRef} videoRefs={videoRefs}/>
        </FloatingWindow>
      ))}
      {ytPeers.map((pId) => (
        <FloatingWindow key={pId + '_yt'} title={getContactName(pId) + ' (YT)'} onClose={() => setUserYoutubeStreams(prev => { const next = { ...prev }; delete next[pId]; return next; })}>
           <StreamRenderer targetId={pId} peerId={peerId} streamType="yt" userYoutubeStreams={userYoutubeStreams} localVideoRef={localVideoRef} videoRefs={videoRefs}/>
        </FloatingWindow>
      ))}
      {wrPeers.map((pId) => (
        <FloatingWindow key={pId + '_radio'} title={getContactName(pId) + ' (Radio)'} onClose={() => setUserRadios(prev => { const next = { ...prev }; delete next[pId]; return next; })}>
           <StreamRenderer targetId={pId} peerId={peerId} streamType="radio" userRadios={userRadios} localVideoRef={localVideoRef} videoRefs={videoRefs}/>
        </FloatingWindow>
      ))}
    </>
  );
})()}


{activeCalls.map((call, idx) => call.type === 'voice' && (
<div key={idx} className="audio-call-container">
<i className="fas fa-phone" style={{ color: '#22c55e' }}></i>
<span style={{ fontSize: '14px', fontWeight: 600 }}>{t(lang, 'voiceCallWith')} {getContactName(call.peerId)}</span>
<button className="call-end-button" onClick={() => endCall(call.peerId, 'voice')}>{t(lang, 'endCall')}</button>
<audio ref={el => audioRefs.current[call.peerId] = el} autoPlay></audio>
<div style={{ marginTop: '4px', display: 'flex', alignItems: 'center', gap: '8px' }}>
<label style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{t(lang, 'volume')}</label>
<input type="range" min="0" max="1" step="0.1" defaultValue="1" onChange={e => { if (audioRefs.current[call.peerId]) audioRefs.current[call.peerId].volume = parseFloat(e.target.value); }} />
</div>
</div>
))}


{showContacts ? (
<ContactsScreen lang={lang} contacts={contacts} setContacts={setContacts} onBack={() => setShowContacts(false)}
onSelectContact={(pId) => { connectToPeer(pId); setSelectedContact(pId); setShowContacts(false); }} avatars={avatars} />
) : (
<ChatManager
lang={lang}
connections={connections} messages={messages} setMessages={setMessages}
contacts={contacts} userName={userName} peerId={peerId}
activeCalls={activeCalls} endCall={endCall} startVoiceCall={startVoiceCall}
toggleVideoCall={toggleVideoCall} remoteStreams={remoteStreams}
audioRefs={audioRefs} videoRefs={videoRefs} handleFileChange={handleFileChange}
fileInputRef={fileInputRef} handleAudioRecording={handleAudioRecording}
newMessage={newMessage} setNewMessage={setNewMessage}
showEmojiPanel={showEmojiPanel} setShowEmojiPanel={setShowEmojiPanel}
populateEmojiPanel={populateEmojiPanel} getContactName={getContactName}
selectedContact={selectedContact} setSelectedContact={setSelectedContact}
localVideoRef={localVideoRef} registerSentMessage={(id) => seenMessagesRef.current.add(id)}
cooldownRemaining={cooldownRemaining} setCooldownRemaining={setCooldownRemaining}
networkSize={networkSize} centralServerId={centralServerId}
e2eeState={e2eeState} setE2eeState={setE2eeState}
isCentralServer={isCentralServer}
isMyGroupServer={isMyGroupServer}
serverE2EE={serverE2EE} setServerE2EE={setServerE2EE} connectToPeer={connectToPeer}
handleTorrentSeed={handleTorrentSeed} handleTorrentDownload={handleTorrentDownload}
setShowTorrentManager={setShowTorrentManager}
pendingTorrentRequests={pendingTorrentRequests}
setPendingTorrentRequests={setPendingTorrentRequests}
handleTorrentDirectSeed={handleTorrentDirectSeed}
youtubeChatId={youtubeChatId}
disconnectPeer={disconnectPeer}
showWhiteboard={showWhiteboard}
setShowWhiteboard={setShowWhiteboard}
avatars={avatars}
currentQuizQuestionRef={currentQuizQuestionRef}
connectionsRef={connectionsRef}
directPeersRef={directPeersRef}
directPeers={directPeers}
isSuperNode={isSuperNode}
/>
)}

{showWhiteboard && (
  <Whiteboard 
    lang={lang} 
    connectionsRef={connectionsRef}
    selectedContact={selectedContact} 
    onClose={() => setShowWhiteboard(false)} 
  />
)}
{showAuditPanel && <AuditPanel lang={lang} logs={auditLogs} onClose={() => setShowAuditPanel(false)} />}
</div>
);
};



ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
<script>
  (async () => {
    try {
      await esbuild.initialize({ wasmURL: 'https://cdn.jsdelivr.net/npm/esbuild-wasm@0.20.1/esbuild.wasm' });
      const script = document.getElementById('esbuild-main').textContent;
      const { code } = await esbuild.transform(script, { loader: 'tsx', target: 'esnext' });
      const s = document.createElement('script');
      s.textContent = code;
      document.body.appendChild(s);
