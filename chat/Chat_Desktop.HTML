     NOVO V29 — GRUPO 0: ALWAYS-ON + ANTI-FLOOD
     ══════════════════════════════════════════════════════════════════════
     PROBLEMA RESOLVIDO:
       Com milhões de servidores, precisávamos de um ponto de entrada que
       não causasse flood na rede ao anunciar grupos disponíveis.

     SOLUÇÃO — 1 mensagem, cálculo local:
       1. Cliente conecta ao servidor Grupo 0 (modo portal)
       2. Servidor envia APENAS: { type:'group0-welcome', totalUsers, servers:[] }
       3. Cliente calcula LOCALMENTE: groupIdx = floor(totalUsers / 1800)
       4. GID alvo = base62(groupIdx) com K10_CHARS — idêntico ao servidor
       5. Cliente conecta ao servidor real da lista → fim do processo

     GARANTIA DE CONVERGÊNCIA:
       O servidor preenche grupos sequencialmente: AAAA → AAAB → AAAC...
       O cliente replica o mesmo cálculo e chega ao MESMO grupo sem
       perguntar nada à rede. Zero flood. Zero coordenação.

     EXEMPLOS:
       totalUsers=0      → GID='AAAA'  (índice 0)
       totalUsers=1800   → GID='AAAB'  (índice 1)
       totalUsers=3600   → GID='AAAC'  (índice 2)
       totalUsers=111600 → GID='AABA'  (índice 62)

     NOVO HANDLER:
       'group0-welcome'  — recebe totalUsers, calcula GID, redireciona

     MUDANÇAS NO CÓDIGO:
       Servidor: group0Mode toggle + lógica em setupConnection (return early)
       Cliente:  handler 'group0-welcome' + função deterministicGid inline
       Arquivos:  ServidorChatK10_V28.html + Chat_Desktop_V28.html

     NOVO V27 — PROTOCOLO HOMEOSTÁTICO DE GRUPOS (Mitose + Tutela + Fusão):
     ══════════════════════════════════════════════════════════════════════
     CONSTANTES DO PROTOCOLO:
       K10_SPLIT_THRESHOLD   = 1800  — dispara mitose ao atingir (já existia como MAX)
       K10_TRANSFER_SIZE     = 180   — 10% dos usuários mais recentes vão para o Filho
       K10_TUTOR_TARGET      = 1700  — Filho considerado "adulto" (fim da Tutela)
       K10_ALERT_LOW         = 1600  — alerta amarelo (começa a recusar novos entrantes)
       K10_CRITICAL_LOW      = 1400  — alerta vermelho (irmão doa usuários ativamente)
       K10_MERGE_THRESHOLD   = 1700  — fusão se Pai+Filho ≤ este valor
       K10_MERGE_DEBOUNCE_MS = 300000 — 5min de janela estável antes de fundir
       K10_COMPENSATE_DELTA  = 100   — usuários trocados por ciclo de compensação

     REGRA 1 — MITOSE (Divisão do Grupo):
       - Quando groupSize do Pai atinge K10_SPLIT_THRESHOLD (1800), o servidor
         envia 'group-split' ao cliente com {parentGid, childGid, transferCount}.
       - O cliente handler 'group-split' atualiza o directoryGlobalRef:
         Pai: groupSize → 1620, Filho: groupSize → 181 (transferCount+1).
       - PEER ID do usuário NUNCA é alterado. Apenas o myGroupIdRef muda se
         o usuário for um dos 180 transferidos.
       - O Filho nasce com massa crítica (181 usuários) — nunca inicia vazio.

     REGRA 2 — FASE DE TUTELA (Roteamento ponderado ao Filho):
       - Enquanto childGroupSize < K10_TUTOR_TARGET (1700), o servidor prioriza
         novos entrantes para o Filho via roteamento ponderado (ver tabela abaixo).
       - Cliente recebe 'group-tutor-status' com {childGid, childSize} e armazena
         em groupTutorStateRef para exibir badge "⚕️ Em Tutela".
       - Tabela de peso de roteamento (usada pelo servidor):
           < 500   → 95% dos novos vão ao Filho
           500–999 → 80%
           1000–1499 → 60%
           1500–1699 → 30%
           ≥ 1700  → 0% (Filho adulto, fase terminada)

     REGRA 3 — FASE ADULTA + COMPENSAÇÃO MÚTUA (Irmãos Simbióticos):
       - Quando ambos ≥ K10_TUTOR_TARGET: tornam-se irmãos simbióticos.
       - Se diferença > K10_COMPENSATE_DELTA E um deles < K10_CRITICAL_LOW (1400):
           O irmão mais cheio emite 'group-compensate' → move delta usuários.
       - Se um deles entra em K10_ALERT_LOW (1600): para de aceitar novos e avisa
         o irmão via 'group-alert' para iniciar compensação preventiva.
       - Invariante: após compensação, ambos ficam com ≈ (total/2) usuários.

     REGRA 4 — FUSÃO (Entropia Reversa):
       - Critério: parentSize + childSize ≤ K10_MERGE_THRESHOLD (1700)
       - Janela: esta soma deve permanecer ≤ limiar por K10_MERGE_DEBOUNCE_MS (5min)
       - O servidor envia 'group-merge' com {survivorGid, dissolvedGid}.
       - Handler cliente 'group-merge':
           1. Move todos os peers do dissolvedGid para survivorGid no diretório local.
           2. Se myGroupIdRef === dissolvedGid, atualiza para survivorGid.
           3. Peers do grupo dissolvido recebem 'reroute' e reconectam.

/* MEDIA CONTROLS MODAL */

<script>
  (function() {
    if (window.__k10CentralLoaded) return;
    window.__k10CentralLoaded = true;

    // FIX: O bloco <script> roda ANTES dos externos (PeerJS carrega na linha ~1209).
    // Envolvemos tudo em initK10Central() e esperamos Peer estar disponível via polling.
    function initK10Central() {
      console.log('[K10] Iniciando servidor central K10-CENTRAL (todos no mesmo grupo)...');

      const PEER_ID = 'K10-CENTRAL';
      const MAX_PEERS = 5000;
      const connections = new Map(); // peerId -> { conn, lastSeen }
      const GROUP_ID = 'AAAA';      // grupo fixo para todos os clientes
      let totalUsersHint = 0;

      const peer = new Peer(PEER_ID, { ...window.K10_SIG, debug: 0 });

      peer.on('open', () => {
        console.log('✅ Servidor K10-CENTRAL online (modo grupo único)');
      });

      peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
          console.warn('⚠️ ID K10-CENTRAL já em uso. Outro servidor já está rodando.');
        } else {
          console.error('Erro no servidor:', err);
        }
      });

      // Retransmite mensagens para todos os peers (exceto o remetente)
      // FIX-DIRECT-ROUTING: mensagens diretas (direct:true + recipient) vão SOMENTE ao destinatário
      // Portado do FIX-DIRECT-ROUTING do V34-ServidorChatK10
      // FIX V41-RELAY-DEDUP: Set de msgIds já vistos para dedup no relay P2P.
      // Impede double-delivery quando a mesma mensagem chega via servidor E via
      // caminho P2P (usuário real → relay → bot), bug confirmado nos testes V5/V6.
      // Cleanup automático ao atingir 2000 entradas (evita memory leak de longa sessão).
      const relaySeenMessages = new Set();
      // FIX V45-RELAYPRUNE: substituído clear() por slice(-1000) — evita que duplicatas com alta
      // latência passem logo após o clear (mesmo padrão do pruneSeenClient do seenMessagesRef principal).
      const pruneRelaySeen = () => {
        if (relaySeenMessages.size > 2000) {
          const keep = [...relaySeenMessages].slice(-1000);
          relaySeenMessages.clear();
          keep.forEach(id => relaySeenMessages.add(id));
        }
      };

      function relayMessage(conn, data, senderId) {
        if (!data || typeof data !== 'object') return;
        if (data.type !== 'message') return;
        if (data._relayed) return;

        // FIX V40-TTL-RELAY: descartar mensagens com TTL esgotado antes de qualquer relay P2P.
        // Espelha o guard de distributeMessage do servidor — impede bypass via caminho P2P.
        const relayTtl = data.ttl !== undefined ? (parseInt(data.ttl) || 0) : 15;
        let clampedTtl = isNaN(relayTtl) ? 15 : Math.min(Math.max(0, relayTtl), 15);
        if (clampedTtl <= 0) return;
        
        // FIX-AUDIT-CLI: sanitize before relay
        data.ttl = clampedTtl - 1; // BUG FIX: TTL deve ser decrementado a cada hop (era clampedTtl sem -1)
        if (typeof data.senderName === 'string') {
          data.senderName = data.senderName.replace(/[<>]/g, '').slice(0, 60);
        }

        // FIX V41-RELAY-DEDUP: descartar se este msgId já foi relay-ado por este peer.
        // Cenário corrigido: servidor envia broadcast para usuário real E para bots;
        // o usuário real, ao receber do servidor, tentaria relay P2P para os bots
        // novamente — causando double-delivery. Com o dedup, a segunda chegada
        // (via qualquer outro caminho) é descartada antes do relay.
        if (data.id) {
          if (relaySeenMessages.has(data.id)) return;
          relaySeenMessages.add(data.id);
          pruneRelaySeen();
        }

        data._relayed = true;

        // Mensagem direta → entrega SOMENTE ao destinatário (nunca broadcast)
        if (data.direct === true && data.recipient && typeof data.recipient === 'string') {
          const target = connections.get(data.recipient);
          if (target && target.conn && target.conn.open && data.recipient !== senderId) {
            try { target.conn.send(data); } catch(e) {}
          }
          return; // não faz broadcast
        }

        // Broadcast para todos (modo geral)
        for (const [pid, target] of connections.entries()) {
          if (pid === senderId) continue;
          if (target.conn && target.conn.open) {
            try { target.conn.send(data); } catch(e) {}
          }
        }
      }

      // Envia lista de peers (peer-list) para um cliente recém-conectado
      // FIX: usa campo 'gid' (V25+ protocol) além de 'groupId' para compatibilidade com testes
      function sendPeerList(conn) {
        const peerIds = Array.from(connections.keys()).filter(id => id !== conn.peer);
        if (peerIds.length === 0) return;
        try {
          conn.send({
            type: 'peer-list',
            peers: peerIds,
            gid: GROUP_ID,       // FIX: campo esperado pelo teste e pelo protocolo V25+
            groupId: GROUP_ID,   // compat retroativa
            user: conn.peer.slice(-2), // FIX V40: sufixo de 2 chars — compatível com K10_POS do protocolo
            count: connections.size
          });
          console.log(`📋 Enviada lista de ${peerIds.length} peers para ${conn.peer}`);
        } catch(e) {}
      }

      // Anuncia nova conexão para todos os peers já conectados (join-update)
      function broadcastJoinUpdate() {
        const joinMsg = {
          type: 'join-update',
          gid: GROUP_ID,
          count: connections.size
        };
        for (const [pid, target] of connections.entries()) {
          if (target.conn && target.conn.open) {
            try { target.conn.send(joinMsg); } catch(e) {}
          }
        }
      }

      // Envia uma mensagem de sistema para todos os peers (opcional)
      function broadcastSystemMessage(text) {
        const sysMsg = {
          type: 'message',
          id: 'sys_welcome_' + Date.now(), // BUG FIX: sem id, dedup era bypassado e msg podia duplicar
          text: text,
          senderName: '🚀 K10-CENTRAL',
          direct: false,
          timestamp: Date.now(),
          time: new Date().toLocaleTimeString()
        };
        for (const [pid, target] of connections.entries()) {
          if (target.conn && target.conn.open) {
            try { target.conn.send(sysMsg); } catch(e) {}
          }
        }
      }

      peer.on('connection', (conn) => {
        if (connections.size >= MAX_PEERS) {
          console.warn(`❌ Conexão recusada: limite ${MAX_PEERS} atingido`);
          conn.close();
          return;
        }

        const peerId = conn.peer;
        connections.set(peerId, { conn, lastSeen: Date.now() });
        console.log(`🔗 Conectado: ${peerId} (total: ${connections.size})`);

        conn.on('open', () => {
          // 1. Envia group0-welcome (para compatibilidade com o cliente V38)
          //    - totalUsers é usado pelo cliente para calcular o grupo.
          //    - Como queremos todos no mesmo grupo, forçamos totalUsers
          //      a um valor que resulte no GROUP_ID desejado.
          //    - Vamos usar totalUsers = 0 → índice 0 → GID 'AAAA'.
          try {
            conn.send({
              type: 'group0-welcome',
              totalUsers: 0,  // força índice 0 -> GID 'AAAA'
              servers: []     // sem servidores externos
            });
          } catch(e) {}

          // 2. Envia a lista de peers já conectados (após um pequeno delay)
          setTimeout(() => {
            sendPeerList(conn);
            broadcastJoinUpdate(); // anuncia para todos que há novo peer
          }, 500);
        });

        conn.on('data', (data) => {
          const entry = connections.get(peerId);
          if (entry) entry.lastSeen = Date.now();

          // Responde a group0-request (caso o cliente reenvie)
          if (data && data.type === 'group0-request') {
            try {
              conn.send({
                type: 'group0-welcome',
                totalUsers: 0,
                servers: []
              });
            } catch(e) {}
            return;
          }

          // Relay de mensagens (modo geral)
          relayMessage(conn, data, peerId);
        });

        conn.on('close', () => {
          connections.delete(peerId);
          console.log(`🔌 Desconectado: ${peerId} (restam: ${connections.size})`);

          // Anuncia a saída para os demais peers (pex-update)
          const leaveMsg = {
            type: 'pex-update',
            gid: GROUP_ID,
            user: peerId,
            ttl: 5
          };
          for (const [pid, target] of connections.entries()) {
            if (target.conn && target.conn.open) {
              try { target.conn.send(leaveMsg); } catch(e) {}
            }
          }
        });

        conn.on('error', (err) => {
          console.warn(`⚠️ Erro na conexão com ${peerId}: ${err.message}`);
          connections.delete(peerId);
        });
      });

      // Atualiza a estimativa de usuários (não usado, mas mantido)
      setInterval(() => {
        totalUsersHint = connections.size;
      }, 10000);

      // A cada 30 segundos, envia uma atualização da lista de peers para todos (pex)
      setInterval(() => {
        const peerIds = Array.from(connections.keys());
        if (peerIds.length === 0) return;
        for (const [pid, target] of connections.entries()) {
          if (target.conn && target.conn.open) {
            try {
              target.conn.send({
                type: 'pex',
                peers: peerIds.filter(id => id !== pid),
                groupId: GROUP_ID,
                groupSize: connections.size
              });
            } catch(e) {}
          }
        }
      }, 30000);

      // Opcional: envia uma mensagem de boas-vindas quando o servidor inicia
      setTimeout(() => {
        broadcastSystemMessage('🎉 Servidor K10-CENTRAL ativo! Todos os usuários estão no mesmo grupo.');
      }, 2000);
    } // fim initK10Central

    // Aguarda PeerJS carregar (é um <script> externo que vem depois deste bloco)
    if (typeof Peer !== 'undefined') {
      initK10Central();
    } else {
      var _k10PeerPoll = setInterval(function() {
        if (typeof Peer !== 'undefined') {
          clearInterval(_k10PeerPoll);
          initK10Central();
        }
      }, 50);
      // Segurança: cancela após 30s se PeerJS nunca carregar (ex: sem internet)
      setTimeout(function() { clearInterval(_k10PeerPoll); }, 30000);
    }
  })();
</script>

const sanitizeHTML = (dirtyHtml) => {
    if (!dirtyHtml) return '';
    
    if (typeof window.DOMPurify === 'undefined') {
        console.warn('⚠️ DOMPurify não carregado - usando fallback de escape HTML seguro');
        return dirtyHtml
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    return window.DOMPurify.sanitize(dirtyHtml, {
        ALLOWED_TAGS: ['p', 'br', 'b', 'i', 'em', 'strong', 'u', 'a', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'h4', 'pre', 'code', 'blockquote', 'span', 'img'],

let _dynTranslLang = '';       // which lang _dynTransl is for
let _dynTranslReady = false;   // true once the current lang is fully translated

// Per-session translation cache (both UI keys and message text)
const _gtCache = (() => {
  try {
    const s = sessionStorage.getItem('k10_gt_cache');
    return s ? JSON.parse(s) : {};
  } catch(e) { return {}; }
})();

function _saveGtCache() {
  try { 
    // Purge cache if it gets too large (e.g., > 1000 keys)
    const keys = Object.keys(_gtCache);
    if (keys.length > 1000) {
      // Keep only the most recent 500 keys
      const toDelete = keys.slice(0, 500);
      toDelete.forEach(k => delete _gtCache[k]);
    }
    sessionStorage.setItem('k10_gt_cache', JSON.stringify(_gtCache)); 
  } catch(e) {}
}

// Translate a single text string via unofficial Google Translate endpoint
async function gtTranslate(text, targetLang, sourceLang = 'en') {
  if (!text || !text.trim()) return text;
  if (targetLang === sourceLang && sourceLang !== 'auto') return text;
  const key = `${sourceLang}|${targetLang}|${text}`;
  if (_gtCache[key]) return _gtCache[key];
  try {
    const sl = sourceLang === 'auto' ? 'auto' : sourceLang;
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${encodeURIComponent(targetLang)}&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    const data = await res.json();
    // data[0] is array of [translated_segment, original_segment]
    const translated = (data[0] || []).map(s => s[0] || '').join('');
    // Only cache if actually translated (different from original)
    if (translated && translated !== text) {
      _gtCache[key] = translated;
      _saveGtCache();
    }
    return translated || text;
  } catch(e) {
    return text;
  }
}

// Translate a batch of texts (join with separator, split result)
async function gtTranslateBatch(texts, targetLang, sourceLang = 'en') {
  if (!texts.length || targetLang === sourceLang) return texts;
  const SEP = '\n⟨|⟩\n';
  // Filter already-cached
  const needsTranslation = texts.map(t => {
    const key = `${sourceLang}|${targetLang}|${t}`;
    return _gtCache[key] ? null : t;
  });
  const unique = [...new Set(needsTranslation.filter(Boolean))];
  if (unique.length) {
    try {
      const joined = unique.join(SEP);
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(joined)}`;
      const res = await fetch(url);
      const data = await res.json();
      const translatedJoined = (data[0] || []).map(s => s[0] || '').join('');
      const parts = translatedJoined.split(/\n[⟨<]\|[⟩>]\n/);
      unique.forEach((orig, i) => {
        const translated = (parts[i] || orig).trim();
        const cacheKey = `${sourceLang}|${targetLang}|${orig}`;
        _gtCache[cacheKey] = translated;
      });
      _saveGtCache();
    } catch(e) {}
  }
  return texts.map(text => {
    const key = `${sourceLang}|${targetLang}|${text}`;
    return _gtCache[key] || text;
  });
}

// Build dynamic translation object for the given language (all TRANSLATIONS.en keys)
// Returns a promise that resolves when done; updates _dynTransl in place
async function buildDynTransl(targetLang) {
  if (targetLang === 'en' || targetLang === 'pt') {
    _dynTransl = {};
    _dynTranslLang = targetLang;
    _dynTranslReady = true;
    return;
  }

  // Check localStorage for pre-built translations
  const lsKey = `k10_ui_transl_${targetLang}`;
  try {
    const saved = localStorage.getItem(lsKey);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed && Object.keys(parsed).length > 50) {
        _dynTransl = parsed;
        _dynTranslLang = targetLang;
        _dynTranslReady = true;
        return;
      }
    }
  } catch(e) {}

  _dynTranslReady = false;
  _dynTranslLang = targetLang;

  const enKeys = Object.keys(TRANSLATIONS.en);
  const enVals = enKeys.map(k => TRANSLATIONS.en[k]);

  // Batch in groups of 40 to avoid URL length limits
  const BATCH = 40;
  const result = {};
  for (let i = 0; i < enKeys.length; i += BATCH) {
    const bKeys = enKeys.slice(i, i + BATCH);
    const bVals = enVals.slice(i, i + BATCH);
    const translated = await gtTranslateBatch(bVals, targetLang);
    bKeys.forEach((k, j) => { result[k] = translated[j]; });
    // Update partially as we go
    Object.assign(_dynTransl, result);
  }

  _dynTransl = result;
  _dynTranslLang = targetLang;
  _dynTranslReady = true;

  try { localStorage.setItem(lsKey, JSON.stringify(result)); } catch(e) {}
}

const t = (lang, key, vars = {}) => {
  let str;
  if (lang === 'pt') {
    str = TRANSLATIONS.pt[key];
  } else if (lang === 'en') {
    str = TRANSLATIONS.en[key];
  } else {
    // Use dynamic translation if ready for this lang, else fall back to EN
    str = (_dynTranslLang === lang) ? _dynTransl[key] : undefined;
  }
  str = str || TRANSLATIONS.en[key] || key;
  Object.entries(vars).forEach(([k, v]) => { str = str.replace(`{${k}}`, v); });
  return str;
};

// Returns a human-readable name for a lang code
const getLangName = (code) => LANG_LABELS[code] || code;

// Map a raw browser BCP-47 tag to the closest Google Translate code.
const toGTCode = (tag) => {
  if (!tag) return 'en';
  const t = tag.toLowerCase();
  if (t.startsWith('zh')) return t.includes('tw') || t.includes('hant') ? 'zh-TW' : 'zh-CN';
  const base = t.split('-')[0];
  // Hebrew: browser uses 'he', GT uses 'iw'
  if (base === 'he') return 'iw';
  return base;
};

// Auto-detect the user's preferred language from the browser.
// Returns a Google Translate language code; falls back to 'en'.
const detectBrowserLang = () => {
  const saved = localStorage.getItem('p2pUserLang');
  if (saved) return saved;
  const list = (navigator.languages && navigator.languages.length)
    ? Array.from(navigator.languages) : [navigator.language || 'en'];
  for (const bl of list) {
    const code = toGTCode(bl);
    if (LANG_LABELS[code]) return code;
  }
  return 'en';
};


// Quiz translation cache — usa o mesmo _gtCache global (sessionStorage) para persistência.
// quizPendingMap evita fetches duplicados: se dois componentes pedem a mesma tradução
// ao mesmo tempo, apenas UM fetch é feito e ambos aguardam a mesma Promise.
const quizPendingMap = new Map(); // cacheKey -> Promise<string>

// Traduz texto do quiz bot de PT para targetLang, com cache e deduplicação de fetches
async function translateQuizText(text, targetLang) {
  if (!text || targetLang === 'pt') return text;
  const cacheKey = 'pt|' + targetLang + '|' + text;
  // 1. Já está no cache (memória/sessionStorage)?
  if (_gtCache[cacheKey]) return _gtCache[cacheKey];
  // 2. Já tem um fetch em andamento para esse texto+lang? Reutiliza a mesma Promise.
  if (quizPendingMap.has(cacheKey)) return quizPendingMap.get(cacheKey);
  // 3. Inicia novo fetch
  const promise = fetch(
    'https://translate.googleapis.com/translate_a/single?client=gtx&sl=pt&tl=' + encodeURIComponent(targetLang) + '&dt=t&q=' + encodeURIComponent(text)
  )
    .then(r => r.json())
    .then(d => {
      const translated = (d[0] || []).map(item => item[0] || '').join('');
      const result = translated || text;
      _gtCache[cacheKey] = result;
      _saveGtCache();
      return result;
    })
    .catch(() => text)
    .finally(() => quizPendingMap.delete(cacheKey));
  quizPendingMap.set(cacheKey, promise);
  return promise;
}

const quizTranslationCache = new Map(); // mantido para compatibilidade
const keyCache = new Map();
async function deriveKey(secret) {
if (keyCache.has(secret)) return keyCache.get(secret);
const enc = new TextEncoder();
const base = await crypto.subtle.importKey("raw", enc.encode(secret), "PBKDF2", false, ["deriveKey"]);
const key = await crypto.subtle.deriveKey(
{ name: "PBKDF2", salt: enc.encode("chat-k10-e2ee-2026"), iterations: 100000, hash: "SHA-256" },
base, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
);
keyCache.set(secret, key);
return key;
}
async function encryptMsg(text, secret) {
const key = await deriveKey(secret);
const iv = crypto.getRandomValues(new Uint8Array(12));
const enc = new TextEncoder();
const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(text));
const combined = new Uint8Array(iv.length + cipher.byteLength);
combined.set(iv, 0); combined.set(new Uint8Array(cipher), 12);
return btoa(String.fromCharCode(...combined));
}
async function decryptMsg(b64, secret) {
const key = await deriveKey(secret);
const data = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
const iv = data.slice(0, 12), cipher = data.slice(12);
const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, cipher);
return new TextDecoder().decode(plain);
}
function generateSecret() {
return Array.from(crypto.getRandomValues(new Uint8Array(32)), b => b.toString(16).padStart(2,'0')).join('');
}

const PEER_ID_STORAGE_KEY = 'p2pChatClientId';
const MESSAGES_STORAGE_KEY = 'p2pChatMessages';

// ═══════════════════════════════════════════════════════════════════
// V23 S-10: Sistema K10 ID
// Estrutura: K10(3) + GID(4) + sufixo(2) = 9 chars total
// K10 = prefixo implícito — NUNCA transmitido na rede
// GID = identificador do grupo — 4 chars, recebido do servidor 1×
// sufixo = identificador do usuário no grupo — 2 chars
// Charset: 62 chars case-sensitive (A-Z a-z 0-9)
// ═══════════════════════════════════════════════════════════════════
const K10_PREFIX = 'K10';
const K10_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
const K10_GID_LEN = 4;
const K10_SUFFIX_LEN = 2;
const K10_TOTAL_LEN = K10_PREFIX.length + K10_GID_LEN + K10_SUFFIX_LEN; // 9

// ── V25: Lista de 1800 posições fixas — idêntica em TODOS os nós ──────────
// Posição 1→'AA', Posição 2→'AB', ..., Posição 1800→'dB'
// Gravada no código: ninguém precisa transmitir a lista, só o sufixo/count
const K10_MAX_GROUP = 1800;
const K10_POSITION_LIST = (() => {
  const list = [];
  for (let i = 0; i < K10_CHARS.length; i++) {
    for (let j = 0; j < K10_CHARS.length; j++) {
      if (list.length >= K10_MAX_GROUP) break;
      list.push(K10_CHARS[i] + K10_CHARS[j]);
    }
    if (list.length >= K10_MAX_GROUP) break;
  }
  return list; // ['AA','AB','AC',...,'dB'] — exatamente 1800 entradas
})();

// ══════════════════════════════════════════════════════════════════════════════
// V27: PROTOCOLO HOMEOSTÁTICO DE GRUPOS — Constantes
// Estas constantes governam Mitose, Tutela, Compensação e Fusão de grupos.
// O Peer ID do usuário NUNCA é alterado por nenhuma dessas operações.
// Apenas myGroupIdRef (GID) e directoryGlobalRef são modificados.
// ══════════════════════════════════════════════════════════════════════════════
const K10_SPLIT_THRESHOLD   = 1800;  // dispara mitose (= K10_MAX_GROUP)
const K10_TRANSFER_SIZE     = 180;   // 10% dos usuários mais recentes → Filho
const K10_TUTOR_TARGET      = 1700;  // Filho "adulto" — fim da fase de tutela
const K10_ALERT_LOW         = 1600;  // alerta amarelo — grupo próximo do mínimo seguro
const K10_CRITICAL_LOW      = 1400;  // alerta vermelho — irmão doa usuários ativamente
const K10_MERGE_THRESHOLD   = 1700;  // fusão se Pai+Filho ≤ este valor
const K10_MERGE_DEBOUNCE_MS = 300000; // 5 min estável antes de fundir (evita fusões frenéticas)
const K10_COMPENSATE_DELTA  = 100;   // usuários transferidos por ciclo de compensação

// Verifica se um peerId tem formato K10 válido
const isK10Id = (id) => typeof id === 'string' && id.length === K10_TOTAL_LEN && id.startsWith(K10_PREFIX);

// Extrai GID (4 chars) de um peerId completo K10GGGGXX
const k10ExtractGid = (peerId) => isK10Id(peerId) ? peerId.slice(K10_PREFIX.length, K10_PREFIX.length + K10_GID_LEN) : null;

// Extrai sufixo (2 chars) de um peerId completo K10GGGGXX
const k10ExtractSuffix = (peerId) => isK10Id(peerId) ? peerId.slice(K10_PREFIX.length + K10_GID_LEN) : null;

// Reconstrói peerId completo a partir de GID + sufixo
const k10BuildPeerId = (gid, suffix) => K10_PREFIX + gid + suffix;

// Gera um sufixo de 2 chars aleatório (usado apenas como fallback)
const k10RandomSuffix = () => {
  const buf = new Uint8Array(K10_SUFFIX_LEN);
  crypto.getRandomValues(buf);
  return Array.from(buf).map(b => K10_CHARS[b % K10_CHARS.length]).join('');
};

// Encontra próximo sufixo livre dado uma lista de sufixos já ocupados
const k10FindFreeSuffix = (usedSuffixes) => {
  const used = new Set(usedSuffixes);
  for (let i = 0; i < K10_CHARS.length; i++) {
    for (let j = 0; j < K10_CHARS.length; j++) {
      const candidate = K10_CHARS[i] + K10_CHARS[j];
      if (!used.has(candidate)) return candidate;
    }
  }
  return null; // grupo cheio (3844 usuários)
};

// ── V26: Protocolo Binário K10 (cliente) ──────────────────────────────────────
// Mesmo protocolo do servidor — MAGIC=0xB1, 7 bytes fixos por pacote de topologia
// C-V26: classe injetada aqui e instância k10bin criada globalmente
// Compatibilidade total com V25: JSON continua funcionando como fallback
const K10B_MAGIC    = 0xB1;
const K10B_SIZE     = 7;
const K10B_TYPE_CLI = { PEX_UPDATE:0x01, POSITION_UPDATE:0x02, GID_PROMOTE:0x03, JOIN_UPDATE:0x04 };
const K10B_SEQ_MASK_CLI  = 0x1F;
const K10B_TTL_SHIFT_CLI = 5;
const K10B_TTL_MAX_CLI   = 6;

class K10BinaryProtocolClient {
  constructor() {
    this._gidToIdx  = new Map();
    this._idxToGid  = new Map();
    this._nextIdx   = 0;
    this._seqCounters = new Map();
    this._dedupCache  = new Set();
    this._dedupOrder  = [];
  }
  // ── Registry ────────────────────────────────────────────────────────────────
  registerGid(gid) {
    if (this._gidToIdx.has(gid)) return this._gidToIdx.get(gid);
    const idx = this._nextIdx++;
    this._gidToIdx.set(gid, idx); this._idxToGid.set(idx, gid);
    return idx;
  }
  /** Aprende GID + índice vindos do campo gidIdx do peer-list JSON */
  learnGid(gid, idx) {
    if (typeof idx !== 'number' || idx < 0 || !gid) return;
    this._gidToIdx.set(gid, idx); this._idxToGid.set(idx, gid);
    if (idx >= this._nextIdx) this._nextIdx = idx + 1;
  }
  getIdx(gid) { return this._gidToIdx.has(gid) ? this._gidToIdx.get(gid) : -1; }
  getGid(idx) { return this._idxToGid.get(idx) || null; }
  getOrRegisterIdx(gid) {
    const idx = this.getIdx(gid);
    return idx >= 0 ? idx : this.registerGid(gid);
  }
  // ── Dedup ────────────────────────────────────────────────────────────────────
  nextSeq(gidIdx) {
    const next = ((this._seqCounters.get(gidIdx) || 0) + 1) & K10B_SEQ_MASK_CLI;
    this._seqCounters.set(gidIdx, next); return next;
  }
  isDuplicate(gidIdx, type, seq) {
    const key = `${gidIdx}:${type}:${seq}`;
    if (this._dedupCache.has(key)) return true;
    this._dedupCache.add(key); this._dedupOrder.push(key);
    if (this._dedupOrder.length > 128) this._dedupCache.delete(this._dedupOrder.shift());
    return false;
  }
  // ── Detecção ─────────────────────────────────────────────────────────────────
  static isBinaryPacket(data) {
    if (data instanceof ArrayBuffer) return data.byteLength >= K10B_SIZE && new Uint8Array(data)[0] === K10B_MAGIC;
    if (data instanceof Uint8Array)  return data.length   >= K10B_SIZE && data[0]                  === K10B_MAGIC;
    return false;
  }
  // ── Decode ───────────────────────────────────────────────────────────────────
  decode(buffer) {
    const buf = buffer instanceof Uint8Array ? buffer : new Uint8Array(buffer);
    if (buf.length < K10B_SIZE || buf[0] !== K10B_MAGIC) return null;
    const view = new DataView(buf.buffer, buf.byteOffset);
    return {
      type:   buf[1],
      paramA: view.getUint16(2, true),
      paramB: view.getUint16(4, true),
      ttl:    (buf[6] >> K10B_TTL_SHIFT_CLI) & 0x07,
      seq:    buf[6] & K10B_SEQ_MASK_CLI,
    };
  }
  /**
   * Decodifica pacote binário para objeto JS com mesmo formato dos
   * objetos JSON V25 correspondentes. Retorna null se GID desconhecido.
   */
  decodeToObject(buffer) {
    const pkt = this.decode(buffer);
    if (!pkt) return null;
    switch (pkt.type) {
      case K10B_TYPE_CLI.PEX_UPDATE: {
        const gid = this.getGid(pkt.paramA);
        if (!gid) return null;
        const newCount = pkt.paramB;
        return {
          type: 'pex-update', gid,
          user: K10_POSITION_LIST[newCount] || null,
          newCount,
          ttl: pkt.ttl, _seq: pkt.seq, _gidIdx: pkt.paramA, _binary: true,
        };
      }
      case K10B_TYPE_CLI.POSITION_UPDATE: {
        const gid = this.getGid(pkt.paramA);
        if (!gid) return null;
        return {
          type: 'position-update', gid,
          user: K10_POSITION_LIST[pkt.paramB] || null,
          _binary: true,
        };
      }
      case K10B_TYPE_CLI.JOIN_UPDATE: {
        const gid = this.getGid(pkt.paramA);
        if (!gid) return null;
        const newCount = pkt.paramB;
        return {
          type: 'join-update', gid,
          user: newCount > 0 ? (K10_POSITION_LIST[newCount - 1] || null) : null,
          newCount,
          ttl: pkt.ttl, _seq: pkt.seq, _gidIdx: pkt.paramA, _binary: true,
        };
      }
      case K10B_TYPE_CLI.GID_PROMOTE: {
        const gidA = this.getGid(pkt.paramA);
        const gidB = this.getGid(pkt.paramB);
        if (!gidA || !gidB) return null;
        return {
          type: 'gid-promote',
          formerDominantGid: gidA, formerRecessiveGid: gidB,
          ttl: pkt.ttl, _seq: pkt.seq, _binary: true,
        };
      }
      default: return null;
    }
  }
  // ── Encode (para relay P2P) ──────────────────────────────────────────────────
  encode(type, gidIdxA, paramB, ttl = K10B_TTL_MAX_CLI, seq = -1) {
    if (gidIdxA < 0) return null;
    const buf = new Uint8Array(K10B_SIZE);
    const view = new DataView(buf.buffer);
    const safeSeq = seq < 0 ? this.nextSeq(gidIdxA & 0xFFFF) : (seq & K10B_SEQ_MASK_CLI);
    buf[0] = K10B_MAGIC; buf[1] = type;
    view.setUint16(2, gidIdxA & 0xFFFF, true);
    view.setUint16(4, paramB  & 0xFFFF, true);
    buf[6] = ((Math.min(Math.max(0,ttl),K10B_TTL_MAX_CLI) & 0x07) << K10B_TTL_SHIFT_CLI) | safeSeq;
    return buf;
  }
  /** Re-codifica um pacote recebido com TTL-1 para relay P2P */
  reencodeWithDecrementedTtl(buffer) {
    const pkt = this.decode(buffer);
    if (!pkt || pkt.ttl === 0) return null;
    return this.encode(pkt.type, pkt.paramA, pkt.paramB, pkt.ttl - 1, pkt.seq);
  }
}

// generateId V23: gera peerId simples de 9 chars aleatórios
// Peer ID é PERMANENTE — nunca muda. Group ID é gerenciado separadamente via myGroupIdRef.
const generateId = () => {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  const buffer = new Uint8Array(9);
  crypto.getRandomValues(buffer);
  return Array.from(buffer).map(b => chars[b % chars.length]).join('');
};

const usePersistentId = () => {
  const [peerId, setPeerId] = useState('');
  useEffect(() => {
    const savedId = localStorage.getItem(PEER_ID_STORAGE_KEY);
    if (savedId) {
      setPeerId(savedId);
    } else {
      const newId = generateId();
      localStorage.setItem(PEER_ID_STORAGE_KEY, newId);
      setPeerId(newId);
    }
  }, []);
  return [peerId, setPeerId];
};

const formatSize = (bytes) => {
if (bytes === 0) return '0 B';
const k = 1024;
const sizes = ['B', 'KB', 'MB', 'GB'];
const i = Math.floor(Math.log(bytes) / Math.log(k));
return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
};

const Whiteboard = ({ lang, connectionsRef, selectedContact, onClose }) => { // FIX O-1 V21: era connections (prop stale em onMouseMove) → connectionsRef
  const canvasRef = useRef(null);
  const contextRef = useRef(null);
  const [isDrawing, setIsDrawing] = useState(false);
  const [color, setColor] = useState('#000000');
  const [lineWidth, setLineWidth] = useState(3);
  const [tool, setTool] = useState('pen'); // pen, eraser

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    
    // Set internal resolution
    canvas.width = canvas.offsetWidth * 2;
    canvas.height = canvas.offsetHeight * 2;
    
    const context = canvas.getContext("2d");
    context.scale(2, 2);
    context.lineCap = "round";
    context.strokeStyle = color;
    context.lineWidth = lineWidth;
    contextRef.current = context;

    const handleDrawingData = (e) => {
      if (e.detail.action === 'draw') {
        const { x, y, prevX, prevY, color: remoteColor, width: remoteWidth, tool: remoteTool } = e.detail;
        drawOnCanvas(prevX, prevY, x, y, remoteColor, remoteWidth, remoteTool, false);
      } else if (e.detail.action === 'clear') {
        clearCanvas(false);
      }
    };

    window.addEventListener('whiteboard-event', handleDrawingData);
    return () => window.removeEventListener('whiteboard-event', handleDrawingData);
  }, []);

  useEffect(() => {
    if (contextRef.current) {
      // FIX C-11: detecta dark mode dinamicamente — #f8fafc era visível como traço branco em dark mode
      const eraserColor = document.body.classList.contains('dark-mode') ? '#0f172a' : '#f8fafc';
      contextRef.current.strokeStyle = tool === 'eraser' ? eraserColor : color;
      contextRef.current.lineWidth = lineWidth;
    }
  }, [color, lineWidth, tool]);

  const drawOnCanvas = (x1, y1, x2, y2, drawColor, drawWidth, drawTool, emit = true) => {
    const ctx = contextRef.current;
    if (!ctx) return;
    
    ctx.beginPath();
    // FIX C-11: detecta dark mode para a borracha — cor estática #f8fafc é visível como traço branco em dark mode
    const eraserColor = document.body.classList.contains('dark-mode') ? '#0f172a' : '#f8fafc';
    ctx.strokeStyle = drawTool === 'eraser' ? eraserColor : drawColor;
    ctx.lineWidth = drawWidth;
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.closePath();

    if (emit) {
      const payload = {
        type: 'whiteboard',
        action: 'draw',
        x: x2,
        y: y2,
        prevX: x1,
        prevY: y1,
        color: drawColor,
        width: drawWidth,
        tool: drawTool
      };
      if (selectedContact) {
        const conn = connectionsRef.current.find(c => c.peer === selectedContact);
        if (conn && conn.open) {
          conn.send(payload);
        }
      } else {
        connectionsRef.current.forEach(conn => {
          if (conn.open) {
            try { conn.send(payload); } catch(e) {}
          }
        });
      }
    }
  };

  const clearCanvas = (emit = true) => {
    const canvas = canvasRef.current;
    const ctx = contextRef.current;
    if (!ctx || !canvas) return;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (emit) {
      const payload = { type: 'whiteboard', action: 'clear' };
      if (selectedContact) {
        const conn = connectionsRef.current.find(c => c.peer === selectedContact);
        if (conn && conn.open) {
          conn.send(payload);
        }
      } else {
        connectionsRef.current.forEach(conn => {
          if (conn.open) {
            try { conn.send(payload); } catch(e) {}
          }
        });
      }
    }
  };

  const startDrawing = ({ nativeEvent }) => {
    const { offsetX, offsetY } = nativeEvent;
    contextRef.current.lastX = offsetX;
    contextRef.current.lastY = offsetY;
    setIsDrawing(true);
  };

  const finishDrawing = () => {
    setIsDrawing(false);
  };

  const draw = ({ nativeEvent }) => {
    if (!isDrawing) return;
    const { offsetX, offsetY } = nativeEvent;
    const prevX = contextRef.current.lastX;
    const prevY = contextRef.current.lastY;
    
    drawOnCanvas(prevX, prevY, offsetX, offsetY, color, lineWidth, tool);
    
    contextRef.current.lastX = offsetX;
    contextRef.current.lastY = offsetY;
  };

  const handleTouchStart = (e) => {
    // FIX C-12: preventDefault evita que a página role ao desenhar no mobile
    e.preventDefault();
    const touch = e.touches[0];
    const rect = canvasRef.current.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;
    contextRef.current.lastX = x;
    contextRef.current.lastY = y;
    setIsDrawing(true);
  };

  const handleTouchMove = (e) => {
    // FIX C-12: preventDefault evita scroll da página ao desenhar no mobile
    e.preventDefault();
    if (!isDrawing) return;
    const touch = e.touches[0];
    const rect = canvasRef.current.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;
    drawOnCanvas(contextRef.current.lastX, contextRef.current.lastY, x, y, color, lineWidth, tool);
    contextRef.current.lastX = x;
    contextRef.current.lastY = y;
  };

  return (
    <div className="whiteboard-overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="whiteboard-container">
        <div className="whiteboard-header">
          <h3 style={{ margin: 0, fontSize: '16px' }}><i className="fas fa-chalkboard"></i> Whiteboard</h3>
          <button className="tutorial-close" onClick={onClose}><i className="fas fa-times"></i></button>
        </div>
        <div className="whiteboard-body" 
             onMouseDown={startDrawing}
             onMouseUp={finishDrawing}
             onMouseMove={draw}
             onMouseLeave={finishDrawing}
             onTouchStart={handleTouchStart}
             onTouchMove={handleTouchMove}
             onTouchEnd={finishDrawing}>
          <canvas ref={canvasRef} className="whiteboard-canvas" />
        </div>
        <div className="whiteboard-tools">
          <button className={`wb-tool-btn ${tool === 'pen' ? 'active' : ''}`} onClick={() => setTool('pen')}>
            <i className="fas fa-pen"></i> Pen
          </button>
          <button className={`wb-tool-btn ${tool === 'eraser' ? 'active' : ''}`} onClick={() => setTool('eraser')}>
            <i className="fas fa-eraser"></i> Eraser
          </button>
          <div style={{ width: '1px', height: '24px', background: '#cbd5e1', margin: '0 8px' }}></div>
          {['#000000', '#ef4444', '#22c55e', '#3b82f6', '#f59e0b', '#8b5cf6'].map(c => (
            <div key={c} className={`wb-color-picker ${color === c && tool === 'pen' ? 'active' : ''}`} 
                 style={{ background: c }} onClick={() => { setColor(c); setTool('pen'); }}></div>
          ))}
          <div style={{ width: '1px', height: '24px', background: '#cbd5e1', margin: '0 8px' }}></div>
          <select value={lineWidth} onChange={(e) => setLineWidth(parseInt(e.target.value))} className="wb-tool-btn" style={{ outline: 'none' }}>
            <option value="2">Thin</option>
            <option value="5">Medium</option>
            <option value="10">Thick</option>
          </select>
          <button className="wb-tool-btn" onClick={() => clearCanvas()} style={{ marginLeft: 'auto', color: '#ef4444' }}>
            <i className="fas fa-trash"></i> Clear
          </button>
        </div>
      </div>
    </div>
  );
};


const PollCreator = ({ onClose, onCreated }) => {
  const [question, setQuestion] = useState('');
  const [options, setOptions] = useState(['', '']);

  const addOption = () => setOptions([...options, '']);
  const removeOption = (index) => setOptions(options.filter((_, i) => i !== index));
  const updateOption = (index, val) => {
    const newOptions = [...options];
    newOptions[index] = val;
    setOptions(newOptions);
  };

  const handleCreate = () => {
    const validOptions = options.filter(o => o.trim() !== '');
    if (question.trim() && validOptions.length >= 2) {
      onCreated(question.trim(), validOptions);
    }
  };

  return (
    <div className="poll-creator-overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="poll-creator-modal">
        <h3 style={{ margin: '0 0 16px 0' }}>Create Poll</h3>
        <input 
          className="poll-creator-input" 
          placeholder="Question (e.g. What's your favorite color?)" 
          value={question} 
          onChange={e => setQuestion(e.target.value)}
        />
        <div style={{ maxHeight: '200px', overflowY: 'auto', marginBottom: '12px' }}>
          {options.map((opt, i) => (
            <div key={i} className="poll-option-input-row">
              <input 
                className="poll-creator-input" 
                style={{ marginBottom: 0 }}
                placeholder={`Option ${i + 1}`} 
                value={opt} 
                onChange={e => updateOption(i, e.target.value)}
              />
              {options.length > 2 && (
                <button className="wb-tool-btn" onClick={() => removeOption(i)} style={{ color: '#ef4444' }}>
                  <i className="fas fa-times"></i>
                </button>
              )}
            </div>
          ))}
        </div>
        <button className="wb-tool-btn" onClick={addOption} style={{ width: '100%', justifyContent: 'center', marginBottom: '12px' }}>
          <i className="fas fa-plus"></i> Add Option
        </button>
        <div style={{ display: 'flex', gap: '10px' }}>
          <button className="wb-tool-btn" onClick={onClose} style={{ flex: 1, justifyContent: 'center' }}>Cancel</button>
          <button 
            className="poll-creator-btn" 
            style={{ flex: 1, marginTop: 0 }}
            onClick={handleCreate}
            disabled={!question.trim() || options.filter(o => o.trim() !== '').length < 2}
          >
            Create
          </button>
        </div>
      </div>
    </div>
  );
};

const Poll = ({ msg, peerId, onVote }) => {
  const totalVotes = Object.values(msg.pollVotes || {}).length;
  const voteCounts = msg.pollOptions.map((_, i) => 
    Object.values(msg.pollVotes || {}).filter(v => v === i).length
  );
  const myVote = msg.pollVotes ? msg.pollVotes[peerId] : null;

  return (
    <div className="poll-container">
      <div className="poll-question">{msg.pollQuestion}</div>
      <div className="poll-options">
        {msg.pollOptions.map((opt, i) => {
          const count = voteCounts[i];
          const percent = totalVotes > 0 ? (count / totalVotes) * 100 : 0;
          return (
            <div 
              key={i} 
              className={`poll-option ${myVote === i ? 'voted' : ''}`}
              onClick={() => onVote(msg.pollId, i)}
            >
              <div className="poll-option-progress" style={{ width: `${percent}%` }}></div>
              <div className="poll-option-text">
                <span>{opt}</span>
                <span className="poll-option-count">{count} ({Math.round(percent)}%)</span>
              </div>
            </div>
          );
        })}
      </div>
      <div className="poll-total-votes">{totalVotes} votes total</div>
    </div>
  );
};

const QuizQuestion = ({ msg, peerId, onAnswer }) => {
  const L = ['A','B','C','D','E','F'];
  // myAnswer: index the local user clicked (null = not answered yet)
  const [myAnswer, setMyAnswer] = useState(null);

  const revealed = msg.quizRevealed === true;
  const votes = msg.quizVotes || {};
  const totalVotes = Object.values(votes).length;
  const voteCounts = (msg.quizOptions || []).map((_, i) =>
    Object.values(votes).filter(v => v === i).length
  );

  const handleClick = (i) => {
    if (myAnswer !== null || revealed) return; // apenas UMA tentativa
    setMyAnswer(i);
    onAnswer(msg.quizId, i);
    // Sem feedback visual se errou — nada acontece para os outros verem
  };

  // ── Classes das alternativas ─────────────────────────────────────
  // DURANTE a questão:
  //   - Clicada e CORRETA → verde (só quem clicou vê)
  //   - Clicada e ERRADA  → nada (botão apenas fica desabilitado, aparência normal)
  //   - Não clicada       → aparência padrão
  //
  // APÓS o reveal (tempo esgotado):
  //   - Correta           → verde  ✓
  //   - Outras            → acinzentado
  const getOptionClass = (i) => {
    if (revealed) {
      return i === msg.quizCorrect ? 'revealed-correct' : 'revealed-other';
    }
    // Antes do reveal — só mostra acerto privado, sem feedback de erro
    if (myAnswer !== null && i === myAnswer && myAnswer === msg.quizCorrect) {
      return 'correct';
    }
    return '';
  };

  const displayQuestion = (msg.translatedText) || msg.quizQuestion;
  const getOptText = (i) => (msg.translatedOpts && msg.translatedOpts[i]) ? msg.translatedOpts[i] : (msg.quizOptions || [])[i];

  return (
    <div className="quiz-container">
      {/* Cabeçalho */}
      <div className="quiz-header">
        <span className="quiz-badge">🤖 Quiz</span>
        {msg.quizSubject && <span className="quiz-subject">{msg.quizSubject}</span>}
        {msg.quizStage && <span className="quiz-stage-badge">{msg.quizStage === 1 ? '🌍 ETAPA 1' : '🗺️ ETAPA 2'}</span>}
      </div>

      {/* Imagem do Lugar (World Quiz) */}
      {msg.quizImage && (
        <div className="quiz-world-image-wrap">

const VoiceRecorder = ({ lang, onRecordingComplete, disabled, selectedContact }) => {
const [isRecording, setIsRecording] = useState(false);
const mediaRecorderRef = useRef(null);
const audioChunksRef = useRef([]);
const recordingTimeoutRef = useRef(null);

const startRecording = async () => {
try {
const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
mediaRecorderRef.current = new MediaRecorder(stream);
mediaRecorderRef.current.ondataavailable = (event) => { if (event.data.size > 0) audioChunksRef.current.push(event.data); };
mediaRecorderRef.current.onstop = () => {
if (audioChunksRef.current.length === 0) return;
const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
onRecordingComplete(audioBlob, selectedContact);
audioChunksRef.current = [];
stream.getTracks().forEach(tr => tr.stop());
if (recordingTimeoutRef.current) {
clearTimeout(recordingTimeoutRef.current);
recordingTimeoutRef.current = null;
}
};
audioChunksRef.current = [];
mediaRecorderRef.current.start(200);
setIsRecording(true);

// Limit recording to 1 minute (60000 ms)
recordingTimeoutRef.current = setTimeout(() => {
stopRecording();
}, 60000);

} catch (err) { alert(t(lang, 'micError') + err.message); }
};

const stopRecording = () => {
if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') {
try { mediaRecorderRef.current.stop(); } catch (e) {}
setIsRecording(false);
if (recordingTimeoutRef.current) {
clearTimeout(recordingTimeoutRef.current);
recordingTimeoutRef.current = null;
}
}
};

useEffect(() => {
return () => {
if (recordingTimeoutRef.current) {
clearTimeout(recordingTimeoutRef.current);
}
if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') {
mediaRecorderRef.current.stop();
}
};
}, []);

return (
<button className={`voice-button ${isRecording ? 'recording' : ''}`}
onClick={() => isRecording ? stopRecording() : startRecording()}
disabled={disabled} title={t(lang, 'recordAudio')}>
<i className="fas fa-microphone"></i>
</button>
);
};

    return _gtCache[quizCacheKey] || null;
  });
  const [quizTranslating, setQuizTranslating] = useState(false);

  useEffect(() => {
    if (!isQuizBot || !msg.text) { setQuizTranslated(null); return; }
    if (lang === 'pt') { setQuizTranslated(msg.text); return; }
    // Caso 1: já traduzido — usa direto, zero fetch
    if (msg.translatedText) { setQuizTranslated(msg.translatedText); return; }
    // Caso 2: cache sessionStorage disponível — usa direto, zero fetch
    if (_gtCache[quizCacheKey]) { setQuizTranslated(_gtCache[quizCacheKey]); return; }
    // Caso 3: fallback (mensagem antiga sem pré-tradução) — fetch com deduplicação
    let cancelled = false;
    setQuizTranslating(true);
    translateQuizText(msg.text, lang)
      .then(result => { if (!cancelled) setQuizTranslated(result); })
      .catch(() => { if (!cancelled) setQuizTranslated(msg.text); })
      .finally(() => { if (!cancelled) setQuizTranslating(false); });
    return () => { cancelled = true; };
  }, [isQuizBot, msg.text, lang, msg.translatedText, quizCacheKey]);
  // ──────────────────────────────────────────────────────────────

  const cacheKey = `${msg.timestamp}-${msg.text}`;
  const [display, setDisplay] = useState(() => {
    if (!isE2EE && !isGroup) return { plain: msg.text, encrypted: false };
    if (decryptionCache.current.has(cacheKey)) return decryptionCache.current.get(cacheKey);
    return null;
  });

  useEffect(() => {
    if (onContentChange) onContentChange();
  }, [display, onContentChange]);

  useEffect(() => {
    if (display && (display.noKey || display.error)) {
      if (onHide) onHide(msg.timestamp);
    }
  }, [display, msg.timestamp, onHide]);

  useEffect(() => {
    if (!isE2EE && !isGroup) return;
    if (decryptionCache.current.has(cacheKey)) {
      setDisplay(decryptionCache.current.get(cacheKey));
      return;
    }

    let isMounted = true;
    const runDecryption = async () => {
      if (isGroup) {
        const b64 = msg.text.slice(GROUP_E2EE_PREFIX.length);
        const serverSecrets = Object.values(serverE2EE).filter(s => s.groupSecret).map(s => s.groupSecret);
        if (serverSecrets.length === 0) {
          if (isMounted) setDisplay({ plain: null, encrypted: true, noKey: true, isGroup: true });
          return;
        }
        for (const secret of serverSecrets) {
          try {
            const plain = await decryptMsg(b64, secret);
            const result = { plain, encrypted: true, isGroup: true };
            decryptionCache.current.set(cacheKey, result);
            if (isMounted) setDisplay(result);
            return;
          } catch(e) {}
        }
        if (isMounted) setDisplay({ plain: null, encrypted: true, error: true, isGroup: true });
      } else {
        const b64 = msg.text.slice(E2EE_PREFIX.length);
        const isMine = msg.sender === 'you';
        const secret = isMine ? e2eeState[contactPeer]?.mySecret : e2eeState[contactPeer]?.contactSecret;
        if (!secret) {
          if (isMounted) setDisplay({ plain: null, encrypted: true, noKey: true });
          return;
        }
        try {
          const plain = await decryptMsg(b64, secret);
          const result = { plain, encrypted: true };
          decryptionCache.current.set(cacheKey, result);
          if (isMounted) setDisplay(result);
        } catch(e) {
          if (isMounted) setDisplay({ plain: null, encrypted: true, error: true });
        }
      }
    };

    runDecryption();
    return () => { isMounted = false; };
  }, [msg.text, contactPeer, e2eeState[contactPeer]?.mySecret, e2eeState[contactPeer]?.contactSecret, JSON.stringify(serverE2EE)]);

  const renderMarkdown = (text) => {
    if (!text) return null;
    if (window.marked && window.DOMPurify) {
      const rawHtml = marked.parse(text);
      const cleanHtml = DOMPurify.sanitize(rawHtml);
      return <div className="md-editor-preview" style={{ padding: 0, background: 'transparent' }} dangerouslySetInnerHTML={{ __html: sanitizeHTML(cleanHtml) }} />;
    }
    return text;
  };

  const isInvite = msg.isInvite;

  const handleAcceptInvite = () => {
    if (msg.inviteData) {
      setServerE2EE(prev => ({ ...prev, [msg.inviteData.serverId]: { active: true, groupSecret: msg.inviteData.groupSecret } }));
      connectToPeer(msg.inviteData.serverId);
      setMessages(prev => prev.map(m => m.timestamp === msg.timestamp ? { ...m, isInvite: false, text: t(lang, 'joinedGroup', { id: msg.inviteData.serverId }) } : m));
    }
  };

  const handleDeclineInvite = () => {
    setMessages(prev => prev.map(m => m.timestamp === msg.timestamp ? { ...m, isInvite: false, text: t(lang, 'declinedGroup', { id: msg.inviteData.serverId }) } : m));
  };

  if (isInvite) {
    return (
      <div className="invite-container" style={{ marginTop: '8px', padding: '10px', background: '#f0f9ff', borderRadius: '8px', border: '1px solid #bae6fd' }}>
        <div style={{ fontSize: '13px', marginBottom: '8px', color: '#0369a1', fontWeight: '500' }}>{msg.text}</div>
        <div style={{ display: 'flex', gap: '8px' }}>
          <button onClick={handleAcceptInvite} style={{ background: '#10b981', color: 'white', border: 'none', padding: '5px 12px', borderRadius: '6px', cursor: 'pointer', fontSize: '12px', fontWeight: '600' }}>{t(lang, 'accept')}</button>
          <button onClick={handleDeclineInvite} style={{ background: '#ef4444', color: 'white', border: 'none', padding: '5px 12px', borderRadius: '6px', cursor: 'pointer', fontSize: '12px', fontWeight: '600' }}>{t(lang, 'decline')}</button>
        </div>
      </div>
    );
  }

  if (display === null) return null;
  if (!display.encrypted) {
    if (isQuizBot) {
      const displayTxt = quizTranslated !== null ? quizTranslated : (quizTranslating ? '⏳ ...' : display.plain);
      const langName = getLangName(lang);
      return (
        <div>
          {lang !== 'pt' && (
            <div style={{ fontSize: '10px', color: '#64748b', marginBottom: '3px', fontStyle: 'italic' }}>
              🌐 {langName}
            </div>
          )}
          <div style={{ whiteSpace: 'pre-wrap' }}>{displayTxt}</div>
        </div>
      );
    }
    // For regular text messages: show translated text when available (from auto-translate)
    const isSentByMe = msg.sender === 'you';
    if (!isSentByMe && msg.translatedText && msg.translatedText !== display.plain) {
      return (
        <div>
          <div>{renderMarkdown(msg.translatedText)}</div>
          <div style={{ fontSize: '10px', color: '#94a3b8', marginTop: '3px', fontStyle: 'italic', display: 'flex', alignItems: 'center', gap: '4px' }}>
            🌐 <span style={{ textDecoration: 'line-through', opacity: 0.6 }}>{display.plain.slice(0, 50)}{display.plain.length > 50 ? '…' : ''}</span>
          </div>
        </div>
      );
    }
    return <div>{renderMarkdown(display.plain)}</div>;
  }
  if (display.noKey || display.error) return null;
  const decryptedText = display.plain;
  // Show translated version of decrypted text when available
  if (msg.sender !== 'you' && msg.translatedText && msg.translatedText !== decryptedText) {
    return (
      <div>
        <div className={`msg-encrypted-badge${display.isGroup ? ' group' : ''}`}>{display.isGroup ? '🛡️ GROUP' : '🔒 PRIVATE'}</div>
        <div>{renderMarkdown(msg.translatedText)}</div>
        <div style={{ fontSize: '10px', color: '#94a3b8', marginTop: '3px', fontStyle: 'italic' }}>🌐 {decryptedText.slice(0, 40)}{decryptedText.length > 40 ? '…' : ''}</div>
      </div>
    );
  }
  return (
    <div>
      <div className={`msg-encrypted-badge${display.isGroup ? ' group' : ''}`}>{display.isGroup ? '🛡️ GROUP' : '🔒 PRIVATE'}</div>
      <div>{renderMarkdown(decryptedText)}</div>
    </div>
  );
};


const sendDirectMessage = async () => {
if (!userName.trim()) { alert(t(lang, 'pleaseSetName')); return; }
if (!newMessage.trim() || cooldownRemaining > 0 || isSending) return;
if (newMessage.length > 2000) { alert(t(lang, 'msgTooLong')); return; }


if (selectedContact) {
// FIX N-8 V20: era connections.find (stale closure) → connectionsRef.current.find
const conn = connectionsRef.current.find(c => c.peer === selectedContact);
if (!conn || !conn.open) { alert(t(lang, 'contactOffline', { name: getContactName(selectedContact) })); return; }
} else if (connectionsRef.current.length === 0) {
return;
}


setIsSending(true);
const currentCooldown = Math.max(1, Math.floor(networkSize / 1000));
setCooldownRemaining(currentCooldown);


try {
const timestamp = new Date();
const msgId = Date.now() + Math.random().toString(36).substring(2);
if (registerSentMessage) registerSentMessage(msgId);
let textToSend = newMessage;


if (selectedContact) {
if (selectedIsServer && serverGroupActive) {
textToSend = GROUP_E2EE_PREFIX + await encryptMsg(newMessage, serverE2EE[selectedContact].groupSecret);
} else if (!selectedIsServer && canSendPrivate) {
textToSend = E2EE_PREFIX + await encryptMsg(newMessage, e2eeState[selectedContact].mySecret);
}
const conn = connectionsRef.current.find(c => c.peer === selectedContact); // FIX N-8 V20: era connections.find (stale pós-await encryptMsg)
if (!conn || !conn.open) throw new Error('Connection lost during encryption. Please try again.');
conn.send({ type: 'message', id: msgId, ttl: 15, text: textToSend, sender: peerId, senderName: userName, recipient: selectedContact, direct: true, time: formatTime(timestamp) });
const newMsgObj = { text: textToSend, sender: 'you', recipient: selectedContact, senderName: userName, time: formatTime(timestamp), type: 'text', direct: true, timestamp: timestamp.getTime() };
setMessages(prev => {
const updated = [...prev, newMsgObj].slice(-500);
return updated;
});
} else {
const msgData = { type: 'message', id: msgId, ttl: 15, text: textToSend, sender: peerId, senderName: userName, direct: false, time: formatTime(timestamp) }; // FIX C-15: sender: peerId ausente → relay tracking e spam guard não funcionavam para mensagens próprias
connectionsRef.current.forEach(c => { if (c.open) try { c.send(msgData); } catch(e){} }); // FIX BUG-L2: era connections (stale state)
const newMsgObj = { text: textToSend, sender: 'you', recipient: 'general', senderName: userName, time: formatTime(timestamp), type: 'text', direct: false, timestamp: timestamp.getTime() };
setMessages(prev => {
const updated = [...prev, newMsgObj].slice(-500);
return updated;
});
}
setNewMessage('');
} catch (err) { alert(t(lang, 'sendError') + err.message); }
finally { setIsSending(false); }
};


const handleSecretSent = (targetPeer, mySecret) => {
setE2eeState(prev => ({ ...prev, [targetPeer]: { ...prev[targetPeer], mySecret } }));
};
const handleServerE2EEActivate = (srvId, groupSecret) => {
setServerE2EE(prev => ({ ...prev, [srvId]: { active: true, groupSecret } }));
};
const handleServerE2EEDeactivate = (srvId) => {
setServerE2EE(prev => { const u = { ...prev }; delete u[srvId]; return u; });
};
const deleteMessage = (ts) => {
setMessages(prev => { const u = prev.filter(m => m.timestamp !== ts); return u; });
};
const deleteMessagesByContact = (pId) => {
setMessages(prev => { const u = prev.filter(m => !((m.sender === pId && m.recipient === 'you') || (m.sender === 'you' && m.recipient === pId) || m.systemFor === pId)); return u; });
};


const scrollToBottom = (behavior = "smooth", force = false) => {
if (messagesContainerRef.current) {
const container = messagesContainerRef.current;
const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 150;


if (force || isAtBottom) {
// Use a small timeout to ensure DOM is fully updated
setTimeout(() => {
container.scrollTo({
top: container.scrollHeight,
behavior
});
}, 50);
}
}
};

return { placeholder: t(lang, 'groupMsg', { name: getContactName(selectedContact) }), style: { borderColor: '#3b82f6', boxShadow: '0 0 0 2px rgba(59,130,246,0.2)' } };
if (canSendPrivate && !selectedIsServer)
return { placeholder: t(lang, 'privateMsg', { name: getContactName(selectedContact) }), style: { borderColor: '#10b981', boxShadow: '0 0 0 2px rgba(16,185,129,0.2)' } };
return { placeholder: t(lang, 'regularMsg', { name: getContactName(selectedContact) }), style: {} };
};

                <button onClick={(e) => { e.stopPropagation(); setPendingTorrentRequests(prev => { const u = {...prev}; delete u[conn.peer]; return u; }); }} style={{ flex: 1, background: '#ef4444', color: 'white', border: 'none', padding: '4px', borderRadius: '4px', cursor: 'pointer', fontWeight: '600' }}>RECUSAR</button>
              </div>
            </div>
          )}
        </div>
      );
    });
  })()}

const FloatingWindow = ({ title, onClose, children, initialPosition, initialSize, onNextCamera }) => {
const [pos, setPos] = useState(initialPosition || { x: 50, y: 50 });
const [size, setSize] = useState(initialSize || { width: 320, height: 240 });
const [isDragging, setIsDragging] = useState(false);
const [isResizing, setIsResizing] = useState(false);
const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
const [resizeStart, setResizeStart] = useState({ x: 0, y: 0, w: 0, h: 0 });
const [showSettings, setShowSettings] = useState(false);
const [opacity, setOpacity] = useState(1);
const [headerColor, setHeaderColor] = useState('#2563eb');


const handleMouseDown = (e) => {
if (e.target.closest('.window-controls')) return;
setIsDragging(true);
setDragOffset({
x: e.clientX - pos.x,
y: e.clientY - pos.y
});
};


const handleResizeDown = (e) => {
e.preventDefault();
e.stopPropagation();
setIsResizing(true);
setResizeStart({
x: e.clientX,
y: e.clientY,
w: size.width,
h: size.height
});
};


const handleMouseMove = (e) => {
if (isDragging) {
setPos({
x: e.clientX - dragOffset.x,
y: e.clientY - dragOffset.y
});
}
if (isResizing) {
const dw = e.clientX - resizeStart.x;
const dh = e.clientY - resizeStart.y;
setSize({
width: Math.max(200, resizeStart.w + dw),
height: Math.max(150, resizeStart.h + dh)
});
}
};


const handleMouseUp = () => {
setIsDragging(false);
setIsResizing(false);
};


useEffect(() => {
if (isDragging || isResizing) {
window.addEventListener('mousemove', handleMouseMove);
window.addEventListener('mouseup', handleMouseUp);
} else {
window.removeEventListener('mousemove', handleMouseMove);
window.removeEventListener('mouseup', handleMouseUp);
}
return () => {
window.removeEventListener('mousemove', handleMouseMove);
window.removeEventListener('mouseup', handleMouseUp);
};
}, [isDragging, isResizing, dragOffset, resizeStart]);


return (
<div className="floating-window" style={{
position: 'fixed',
left: pos.x,
top: pos.y,
width: size.width + 'px',
height: size.height + 'px',
backgroundColor: 'var(--surface)',
border: '1px solid var(--border)',
borderRadius: '10px',
boxShadow: '0 12px 30px rgba(0,0,0,0.3)',
zIndex: 1000,
display: 'flex',
flexDirection: 'column',
overflow: 'hidden',
opacity: opacity,
transition: 'opacity 0.2s'
}}>
<div
onMouseDown={handleMouseDown}
style={{
padding: '10px 14px',
backgroundColor: headerColor,
color: '#fff',
cursor: 'move',
display: 'flex',
justifyContent: 'space-between',
alignItems: 'center',
userSelect: 'none',
flexShrink: 0
}}
>
<span style={{ fontSize: '13px', fontWeight: '700', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', flex: 1 }}>{title}</span>
<div className="window-controls" style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
{onNextCamera && (
<button
onClick={onNextCamera}
style={{ background: 'none', border: 'none', color: '#fff', cursor: 'pointer', padding: '4px', fontSize: '14px', opacity: 0.8 }}
title="Próxima Câmera"
>
<i className="fas fa-sync-alt"></i>
</button>
)}
<button
onClick={() => setShowSettings(!showSettings)}
style={{ background: 'none', border: 'none', color: '#fff', cursor: 'pointer', padding: '4px', fontSize: '14px', opacity: 0.8 }}
title="Configurações"
>
<i className="fas fa-cog"></i>
</button>
{onClose && (
<button
onClick={onClose}
style={{ background: 'none', border: 'none', color: '#fff', cursor: 'pointer', padding: '4px', fontSize: '14px' }}
title="Fechar"
>
<i className="fas fa-times"></i>
</button>
)}
</div>
</div>


<div style={{ flex: 1, position: 'relative', backgroundColor: '#000', overflow: 'hidden' }}>
{children}


{showSettings && (
<div style={{
position: 'absolute',
top: 0,
left: 0,
right: 0,
bottom: 0,
backgroundColor: 'rgba(15, 23, 42, 0.95)',
color: '#fff',
padding: '15px',
zIndex: 10,
fontSize: '12px',
display: 'flex',
flexDirection: 'column',
gap: '12px'
}}>
<div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid rgba(255,255,255,0.1)', paddingBottom: '8px' }}>
<span style={{ fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Configurações da Janela</span>
<button onClick={() => setShowSettings(false)} style={{ background: 'none', border: 'none', color: '#fff', cursor: 'pointer' }}>
<i className="fas fa-times"></i>
</button>
</div>


<div style={{ display: 'flex', flexDirection: 'column', gap: '5px' }}>
<label style={{ opacity: 0.7 }}>Opacidade: {Math.round(opacity * 100)}%</label>
<input
type="range"
min="0.2"
max="1"
step="0.1"
value={opacity}
onChange={(e) => setOpacity(parseFloat(e.target.value))}
style={{ width: '100%', cursor: 'pointer' }}
/>
</div>


<div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
<label style={{ opacity: 0.7 }}>Cor do Cabeçalho:</label>
<div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
{['#2563eb', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6', '#1e293b'].map(color => (
<div
key={color}
onClick={() => setHeaderColor(color)}
style={{
width: '24px',
height: '24px',
borderRadius: '50%',
backgroundColor: color,
cursor: 'pointer',
border: headerColor === color ? '2px solid #fff' : '1px solid rgba(255,255,255,0.2)',
boxShadow: headerColor === color ? '0 0 5px rgba(255,255,255,0.5)' : 'none'
}}
/>
))}
</div>
</div>


<div style={{ marginTop: 'auto', textAlign: 'center', opacity: 0.5, fontSize: '10px' }}>
Arraste o canto inferior direito para redimensionar
</div>
</div>
)}
</div>


{/* Resize handle */}
<div
onMouseDown={handleResizeDown}
style={{
position: 'absolute',
bottom: 0,
right: 0,
width: '15px',
height: '15px',
cursor: 'nwse-resize',
zIndex: 1001,
background: 'linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.3) 50%)',
borderBottomRightRadius: '10px'
}}
/>
</div>
);
};

const WorldRadiosModal = ({ lang, onClose, onBroadcast }) => {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [previewUrl, setPreviewUrl] = useState(null);
  const audioRef = useRef(null);

  const searchRadios = async () => {
    if (!query.trim()) return;
    setLoading(true);
    try {
      const res = await fetch(`https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(query)}&limit=20`);
      const data = await res.json();
      setResults(data);
    } catch (e) {
      console.error(e);
      alert('Error searching radios');
    }
    setLoading(false);
  };

  const togglePreview = (url) => {
    if (previewUrl === url) {
      setPreviewUrl(null);
      if (audioRef.current) {
        audioRef.current.pause();
        audioRef.current.src = '';
      }
    } else {
      setPreviewUrl(url);
      if (audioRef.current) {
        audioRef.current.src = url;
        audioRef.current.play().catch(e => console.error("Preview play error:", e));
      }
    }
  };

  return (
    <div className="media-controls-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="media-controls-modal" style={{ maxWidth: '600px', maxHeight: '80vh', display: 'flex', flexDirection: 'column' }}>
        <div className="media-controls-header">
          <h2><i className="fas fa-globe"></i> World Radios</h2>
          <button className="tutorial-close" onClick={onClose}>×</button>
        </div>
        
        <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', padding: '0 20px' }}>
          <input 
            type="text" 
            value={query} 
            onChange={e => setQuery(e.target.value)} 
            placeholder="Search by name or country..." 
            style={{ flex: 1, padding: '10px', borderRadius: '8px', border: '1px solid #334155', background: '#1e293b', color: 'white' }}
            onKeyDown={e => e.key === 'Enter' && searchRadios()}
          />
          <button onClick={searchRadios} style={{ padding: '10px 16px', background: '#2563eb', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer', fontWeight: 'bold' }}>
            {loading ? '...' : 'Search'}
          </button>
        </div>

        <div style={{ overflowY: 'auto', flex: 1, display: 'flex', flexDirection: 'column', gap: '8px', padding: '0 20px 20px 20px' }}>
          {results.map((r, i) => (
            <div key={i} style={{ background: '#1e293b', padding: '12px', borderRadius: '8px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ overflow: 'hidden', marginRight: '10px' }}>
                <div style={{ fontWeight: 'bold', fontSize: '14px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.name}</div>
                <div style={{ fontSize: '12px', color: '#94a3b8' }}>{r.country} • {(r.tags || '').split(',').slice(0,3).join(', ')}</div>
              </div>
              <div style={{ display: 'flex', gap: '8px', flexShrink: 0 }}>
                <button 
                  onClick={() => togglePreview(r.url_resolved)}
                  style={{ background: previewUrl === r.url_resolved ? '#ef4444' : '#10b981', color: 'white', border: 'none', padding: '6px 12px', borderRadius: '6px', cursor: 'pointer', fontSize: '12px', fontWeight: 'bold' }}
                >
                  <i className={`fas ${previewUrl === r.url_resolved ? 'fa-stop' : 'fa-play'}`}></i> {previewUrl === r.url_resolved ? 'Stop' : 'Preview'}
                </button>
                <button 
                  onClick={() => {
                    if (audioRef.current) { audioRef.current.pause(); audioRef.current.src = ''; }
                    onBroadcast(r);
                  }}
                  style={{ background: '#8b5cf6', color: 'white', border: 'none', padding: '6px 12px', borderRadius: '6px', cursor: 'pointer', fontSize: '12px', fontWeight: 'bold' }}
                >
                  <i className="fas fa-broadcast-tower"></i> Broadcast
                </button>
              </div>
            </div>
          ))}
          {results.length === 0 && !loading && (
            <div style={{ textAlign: 'center', color: '#64748b', padding: '20px' }}>No radios found.</div>
          )}
        </div>
        <audio ref={audioRef} style={{ display: 'none' }} />
      </div>
    </div>
  );
};

// Cache de imagens: query -> URL  (evita chamar API repetidamente)
// Cache de rodada: guarda SÓ a URL escolhida para etapa 2 reusar a mesma foto
// Limpo a cada nova rodada — nunca acumula no computador do usuário
const _worldImgCache = {};
const _worldImgLocks = {};

async function fetchWorldImage(query, usedImagesSet, syncCallback) {
  if (!Array.isArray(_worldImgCache[query])) {
    _worldImgCache[query] = [];
  }

  if (_worldImgCache[query].length === 0) {
    if (!_worldImgLocks[query]) {
      _worldImgLocks[query] = (async () => {
        const key = getPixabayKey();
        try {
          const url = `https://pixabay.com/api/?key=${key}&q=${encodeURIComponent(query)}&image_type=photo&safesearch=true&per_page=200&orientation=horizontal`;
          const res = await fetch(url);
          const data = await res.json();
          if (data.hits && data.hits.length > 0) {
            let hitsArr = [...data.hits];
            // Fisher-Yates shuffle
            for (let i = hitsArr.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [hitsArr[i], hitsArr[j]] = [hitsArr[j], hitsArr[i]];
            }
            _worldImgCache[query] = hitsArr;
            
            // ── SOLUÇÃO 2: Limpeza LRU Simples (Prevenção Memory Leak) ──
            const keys = Object.keys(_worldImgCache);
            if (keys.length > 20) {
              const oldKey = keys.find(k => k !== query);
              if (oldKey) delete _worldImgCache[oldKey];
            }
            
            if (syncCallback) syncCallback(hitsArr);
          }
        } catch(e) { console.warn('Pixabay fetch error', e); } finally {
          _worldImgLocks[query] = null;
        }
      })();
    }
    await _worldImgLocks[query];
  }

  while (_worldImgCache[query].length > 0) {
    const pick = _worldImgCache[query].shift();
    if (usedImagesSet && !usedImagesSet.has(pick.id)) {
       usedImagesSet.add(pick.id);
       return pick; // Retorna todo o objeto 'hit' (incluindo .id e .webformatURL/.largeImageURL)
    }
  }
  return null;
}
