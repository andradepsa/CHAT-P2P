           seenMessagesRef.current.add(data.id); pruneSeenSrv(); // FIX BUG-I
           if (data.type === 'youtube-chat-start') {
             if (youtubeChatIdRef.current) return;
             // FIX-AUDIT-SRV5: valida formato do youtubeId — previne injeção de string maliciosa
             const ytId = String(data.youtubeId || '');
             const validYtId = /^[a-zA-Z0-9_-]{6,50}$/.test(ytId) || /^playlist:[a-zA-Z0-9_-]{6,50}$/.test(ytId);
             if (!validYtId) return;
             setYoutubeChatId(ytId);
           }
           if (data.type === 'radio-youtube-start') {
             setYoutubeBroadcasts(prev => ({ ...prev, [data.sender || sourceConn.peer]: { videoId: data.youtubeId, senderName: data.senderName } }));
           }
           if (data.type === 'radio-youtube-stop') {
             setYoutubeBroadcasts(prev => {
               const next = { ...prev };
               delete next[data.sender || sourceConn.peer];
               return next;
             });
           }
           distributeMessage(data, sourceConn.peer);
        }
        else if (data.type === 'youtube-chat-stop') {
           // FIX BUG-G: garante ID para dedup
           if (!data.id) data = { ...data, id: sourceConn.peer + '_yt_stop_' + Date.now() };
           if (seenMessagesRef.current.has(data.id)) return;
           seenMessagesRef.current.add(data.id); pruneSeenSrv(); // FIX BUG-I
           setYoutubeChatId(null);
           // FIX S-7: relay para todos os outros peers — sem isso, clientes ficavam com aba YT presa
           // porque apenas o servidor limpava o estado, mas nenhum cliente recebia o stop.
           distributeMessage(data, sourceConn.peer);
        }
      };

      const distributeMessage = (data, sourceId) => {
        let distributionCount = 0;
        
        // FIX-AUDIT-SRV1: TTL clampado [0..15] — impede relay amplificado por TTL injetado
        const rawTtl = data.ttl !== undefined ? data.ttl : 8;
        let currentTtl = Math.min(Math.max(0, parseInt(rawTtl) || 0), 15);
        if (currentTtl <= 0) {
          return; // descarta silenciosamente — não loga para não vazar metadados
        }
        
        const relayData = { ...data, ttl: currentTtl - 1 };

        // FIX-DIRECT-ROUTING: mensagens diretas (direct:true + recipient) são
        // entregues APENAS ao destinatário — previne vazamento de dados E2EE
        // e reduz tráfego desnecessário para todos os outros peers.
        if (data.direct && data.recipient && typeof data.recipient === 'string') {
          const recipConn = activeConnectionsRef.current.get(data.recipient);
          if (recipConn && recipConn.open && data.recipient !== sourceId) {
            try {
              recipConn.send(relayData);
              distributionCount++;
            } catch (err) {
              // silencioso — não expõe dados
            }
          }
          setStats(prev => ({
            ...prev,
            messagesDistributed: prev.messagesDistributed + distributionCount
          }));
          return;
        }
        
        activeConnectionsRef.current.forEach((conn, connPeerId) => {
          // BUG S-2 FIX: checa conn.open antes de enviar para evitar erros desnecessários
          if (connPeerId !== sourceId && conn.open) {
            try {
              conn.send(relayData);
              distributionCount++;
            } catch (err) {
              // silencioso — não expõe IDs de peers no console
            }
          }
        });
        
        setStats(prev => ({
          ...prev,
          messagesDistributed: prev.messagesDistributed + distributionCount
        }));
      };

      const setupConnection = (conn) => {
        conn.on('open', () => {
          addAudit(`🔗 Conexão aberta: ${conn.peer}`, 'ok');
          
          if (isHydraModeRef.current) {
            // MODO HYDRA: Apenas envia a lista de peers e desconecta (servidor cheio)
            if (!recentPeersRef.current.includes(conn.peer)) {
              recentPeersRef.current.push(conn.peer);
              // FASE-1/M1: cap expandido 1.000→5.000; remoção aleatória evita viés temporal
              if (recentPeersRef.current.length > 5000) {
                const idx = Math.floor(Math.random() * recentPeersRef.current.length);
                recentPeersRef.current.splice(idx, 1);
              }
              
              setStats(prev => ({
                ...prev,
                hydraNodes: recentPeersRef.current.length
              }));
            }
            
            // FIX V36-CSPRNG-HYDRA: substituído Math.random() por srvSecureShuffle (CSPRNG)
            // para que a seleção de peers no modo Hydra não seja previsível por observadores externos.
            const filtered = recentPeersRef.current.filter(p => p !== conn.peer);
            const peersToSend = srvSecureShuffle([...filtered]).slice(0, 50);
            
            try {
              conn.send({
                type: 'migrate-to-p2p',
                peers: peersToSend,
                message: t(langRef.current, 'hydraModeMessage') // FIX S1
              });
            } catch (err) {}
            
            // Desconecta após enviar a lista para não pesar o servidor
            setTimeout(() => {
              try { conn.close(); } catch(e) {}
            }, 2000);
            return;
          }

          activeConnectionsRef.current.set(conn.peer, conn);
          
          // Informa ao novo peer se já há um Quiz Bot ativo no servidor
          if (quizBotPeerRef.current) {
            try { conn.send({ type: 'quiz-bot-status', active: true, owner: quizBotPeerRef.current }); } catch(e) {}
          }
          
          setConnections(Array.from(activeConnectionsRef.current.keys()));
          
          setStats(prev => ({
            ...prev,
            activeConnections: activeConnectionsRef.current.size,
            hydraNodes: recentPeersRef.current.length
          }));

          // VERIFICA SE ATINGIU O LIMITE PARA VIRAR HYDRA AUTOMATICAMENTE
          if (activeConnectionsRef.current.size >= HYDRA_THRESHOLD && !isHydraModeRef.current) {
            isHydraModeRef.current = true;
            addAudit(`🌊 Modo Hydra ativado — ${activeConnectionsRef.current.size} conexões`, 'warn');
            
            const allPeers = Array.from(activeConnectionsRef.current.keys());
            recentPeersRef.current = [...allPeers]; // Salva os peers atuais no cache do Hydra
            
            // Avisa todos os conectados para formarem a rede P2P
            activeConnectionsRef.current.forEach(c => {
              try {
                c.send({
                  type: 'migrate-to-p2p',
                  peers: allPeers,
                  message: t(langRef.current, 'serverFullMigration') // FIX S1
                });
              } catch (err) {}
            });
            
            // Opcional: O servidor pode fechar as conexões depois de um tempo, 
            // mas os próprios clientes vão se conectar entre si.
            // Para garantir que o servidor fique leve, vamos desconectar todos após 5 segundos.
            setTimeout(() => {
              activeConnectionsRef.current.forEach(c => {
                try { c.close(); } catch(e) {}
              });
              activeConnectionsRef.current.clear();
              setConnections([]);
              setStats(prev => ({ ...prev, activeConnections: 0 }));
            }, 5000);
          }
          
          // ── K10 V29: GRUPO 0 sempre ativo — aguarda 'group0-request' do cliente ──
          // O grupo0 NÃO é mais um toggle. Está permanentemente integrado ao servidor.
          // O servidor NÃO dispara no open — aguarda o cliente se identificar com
          // { type: 'group0-request' }. Clientes normais nunca enviam essa mensagem
          // e portanto recebem o fluxo normal abaixo (handshake, peer-list, etc.)
          // Sem toggle, sem localStorage, sem flooding — veja handler em conn.on('data')
          // ── FIM K10 V29: GRUPO 0 always-on ─────────────────────────────────────

          // FIX S-8 V20: cada send em try-catch individual — falha em handshake não descarta peer-list
          // Always send handshake from server so clients know it's a central server
          try { conn.send({ type: 'handshake', peerId: peerIdRef.current }); } catch(e) {}
          if (youtubeChatIdRef.current) {
            try { conn.send({ type: 'youtube-chat-start', id: Date.now() + Math.random().toString(), youtubeId: youtubeChatIdRef.current, ttl: 0 }); } catch(e) {}
          }

          // ── S-12 V25: Atribuição de GID + sufixo (sistema K10 Posicional) ──
          // Seleciona o grupo com vagas (<1800); se todos cheios, cria filho derivado
          const groups = Object.entries(activeGroupsRef.current);
          let assignedGid = null;

          // V36: detecta se o peer entrante é um servidor externo (-CENTRAL)
          const isExternalServer = conn.peer.endsWith('-CENTRAL');

          if (isExternalServer) {
            // Servidores seguem a mesma regra de grupos, mas com cap de 10 por grupo
            const available = groups.filter(([, g]) =>
              (g.positions || []).length < K10_MAX_GROUP &&
              (g.serverCount || 0) < K10_MAX_SERVERS_PER_GROUP
            );
            if (available.length > 0) {
              // Prefere grupo mais populoso (menos fragmentação)
              assignedGid = available.reduce((a, b) =>
                (a[1].positions||[]).length > (b[1].positions||[]).length ? a : b
              )[0];
            } else {
              // Todos os grupos atingiram o cap de servidores — deriva novo grupo
              const allGids = Object.keys(activeGroupsRef.current);
              const largestGid = allGids.reduce((best, g) =>
                (activeGroupsRef.current[g]?.positions?.length || 0) > (activeGroupsRef.current[best]?.positions?.length || 0) ? g : best
              , allGids[0]);
              assignedGid = generateChildGid(largestGid);
              activeGroupsRef.current[assignedGid] = { size: 0, reservados: [], members: new Set(), positions: [], serverCount: 0, serverPeers: [] };
              k10bin.registerGid(assignedGid);
              addAudit(`[K10-V36] Novo grupo filho ${assignedGid} para servidor externo (cap atingido)`, 'info');
            }
          } else {
            // Procura grupo com vagas; prefere o mais populoso (agrupa em vez de fragmentar)
            const available = groups.filter(([, g]) => (g.positions || []).length < K10_MAX_GROUP);
            if (available.length > 0) {
              assignedGid = available.reduce((a, b) =>
                (a[1].positions||[]).length > (b[1].positions||[]).length ? a : b
              )[0];
            } else {
              // Todos cheios — deriva novo GID do grupo mais populoso (herança hierárquica)
              const allGids = Object.keys(activeGroupsRef.current);
              const largestGid = allGids.reduce((best, g) =>
                (activeGroupsRef.current[g]?.positions?.length || 0) > (activeGroupsRef.current[best]?.positions?.length || 0) ? g : best
              , allGids[0]);
              assignedGid = generateChildGid(largestGid);
              activeGroupsRef.current[assignedGid] = { size: 0, reservados: [], members: new Set(), positions: [], serverCount: 0, serverPeers: [] };
              k10bin.registerGid(assignedGid);
              addAudit(`[K10-V25] Novo grupo filho ${assignedGid} derivado de ${largestGid}`, 'info');
            }
          }

          // Garante que o grupo existe com positions[]
          if (!activeGroupsRef.current[assignedGid]) {
            activeGroupsRef.current[assignedGid] = { size: 0, reservados: [], members: new Set(), positions: [], serverCount: 0, serverPeers: [] };
          }
          if (!activeGroupsRef.current[assignedGid].positions) {
            activeGroupsRef.current[assignedGid].positions = [];
          }
          // V36: garante campos de servidor existem em grupos antigos
          if (typeof activeGroupsRef.current[assignedGid].serverCount !== 'number') {
            activeGroupsRef.current[assignedGid].serverCount = 0;
          }
          if (!Array.isArray(activeGroupsRef.current[assignedGid].serverPeers)) {
            activeGroupsRef.current[assignedGid].serverPeers = [];
          }

          const assignedGroup = activeGroupsRef.current[assignedGid];
          const posIdx = assignedGroup.positions.length; // próxima posição disponível
          let assignedSuffix = K10_POSITION_LIST[posIdx];

          // Fallback: posIdx fora da lista (não deveria acontecer pois verificamos vagas)
          if (!assignedSuffix) {
            const fallbackGid = generateChildGid(assignedGid);
            activeGroupsRef.current[fallbackGid] = { size: 0, reservados: [], members: new Set(), positions: [], serverCount: 0, serverPeers: [] };
            k10bin.registerGid(fallbackGid); // V26
            assignedGid = fallbackGid;
            assignedSuffix = K10_POSITION_LIST[0];
            addAudit(`[K10-V25] Fallback hierárquico: novo grupo ${fallbackGid}`, 'warn');
          }

          // Registra o peer no grupo
          activeGroupsRef.current[assignedGid].positions.push(conn.peer);
          activeGroupsRef.current[assignedGid].members.add(conn.peer);
          activeGroupsRef.current[assignedGid].size = activeGroupsRef.current[assignedGid].positions.length;
          peerGroupMapRef.current.set(conn.peer, assignedGid);
          peerPositionMapRef.current.set(conn.peer, { gid: assignedGid, posIdx });

          // V36: se é servidor externo, registra em serverPeers do grupo
          if (isExternalServer) {
            activeGroupsRef.current[assignedGid].serverCount = (activeGroupsRef.current[assignedGid].serverCount || 0) + 1;
            activeGroupsRef.current[assignedGid].serverPeers.push(conn.peer);
            addAudit(`[K10-V36] Servidor ${conn.peer} → grupo ${assignedGid} (${activeGroupsRef.current[assignedGid].serverCount}/${K10_MAX_SERVERS_PER_GROUP} servidores)`, 'ok');
          }

          // V33: peer-list agora inclui peers[] com IDs PeerJS reais do grupo.
          // Bug V25: cliente reconstruía IDs K10 (K10AAAAAA) mas esses não são
          // peer IDs PeerJS reais (IDs reais são aleatórios ex: QYTPF8YAM).
          // Fix V33: enviamos positions[] filtrado por conexões ativas, cap 20.
          // V25: 'user'/'count' mantidos para compatibilidade e UI.
          const groupCount = activeGroupsRef.current[assignedGid].positions.length;
          const gidIdx = k10bin.getIdx(assignedGid); // V26: índice uint16 do GID
          // FIX V33: IDs reais dos peers do grupo (vivos, excluindo o novo peer)
          const realPeers = activeGroupsRef.current[assignedGid].positions
            .filter(p => p !== conn.peer && activeConnectionsRef.current.has(p))
            .slice(0, 20);
          try {
            conn.send({
              type: 'peer-list',
              gid: assignedGid,            // 4 chars — ID do grupo (texto, para UI)
              gidIdx,                      // V26: índice binário do GID (uint16)
              user: assignedSuffix,         // V25: sufixo atribuído (posição do novo peer)
              count: groupCount,            // V25: total de membros
              suffix: assignedSuffix,       // compat V24 mínima (scalar, sem custo)
              peers: realPeers,             // FIX V33: IDs PeerJS reais dos membros do grupo
              groupServers: (activeGroupsRef.current[assignedGid].serverPeers || []).filter(s => s !== conn.peer), // V36: servidores externos do grupo (máx 10)
              routerMode: routerModeRef.current || false, // V48: sinaliza ao cliente que este servidor é um roteador (não reconectar)
            });
          } catch(e) { console.warn('[K10-V33] Erro ao enviar peer-list:', e); }

          addAudit(`[K10-V25] Peer ${conn.peer} → grupo ${assignedGid} posição ${posIdx+1}/${groupCount}`, 'ok');

          // V24: se o grupo faz parte de uma família, envia pex-family comprimido
          // para todos os peers da família (informam novos membros uns aos outros)
          try {
            const familyPex = buildFamilyPex(assignedGid);
            if (familyPex) {
              const familyGids = new Set(findGroupFamily(assignedGid));
              activeConnectionsRef.current.forEach((c, pid) => {
                const peerGid = peerGroupMapRef.current.get(pid);
                if (peerGid && familyGids.has(peerGid) && c.open && pid !== conn.peer) {
                  try { c.send(familyPex); } catch(e) {}
                }
              });
              // Envia também para o novo peer (ele precisa conhecer a família)
              try { conn.send(familyPex); } catch(e) {}
            }
          } catch(e) { console.warn('[K10-V24] Erro ao enviar pex-family:', e); }

          // V24: verifica dominância entre grupos irmãos após nova entrada
          try {
            const siblings = findGroupFamily(assignedGid).filter(g => g !== assignedGid);
            siblings.forEach(sibGid => {
              setTimeout(() => checkAndPromote(assignedGid, sibGid), 4000);
            });
          } catch(e) {}

          // Here is the critical change to ensure we operate in pure server mode:
          // We'll send a special message to mark this as a server connection
          // when pure server mode is enabled
          if (pureServerModeRef.current) {
            try {
              conn.send({
                type: 'server-info',
                isServer: true,
                message: t(langRef.current, 'pureServerModeConnected') // FIX S1
              });
            } catch (err) {
              console.error(`Erro ao enviar informação de servidor para ${conn.peer}:`, err);
            }
          }

          // Se a rádio estiver tocando, avisa o novato imediatamente
          if (radioStateRef.current.status === 'playing') {
            const now = Date.now();
            if (radioStateRef.current.radioType === 'stream') {
              // FIX S-11 V22: cada send em try-catch individual — se radio-sync falha, '#$%' não era enviado
              try {
                conn.send({
                  type: 'radio-sync',
                  radioType: 'stream',
                  startTime: radioStateRef.current.startTime,
                  streamUrl: radioStateRef.current.streamUrl,
                  fileName: radioStateRef.current.fileName || t(langRef.current, 'globalRadio'), // FIX S1
                  senderName: radioStateRef.current.senderName || t(langRef.current, 'k10Server') // FIX S1
                });
              } catch (e) {}
              try {
                conn.send({
                  type: 'message',
                  text: '#$%',
                  senderName: t(langRef.current, 'k10Server'), // FIX S1
                  id: 'radio_block_' + Date.now()
                });
              } catch (e) {}
            } else {
              const endTime = radioStateRef.current.startTime + radioStateRef.current.duration * 1000;
              if (now < endTime) {
                // FIX S-12 V22: cada send em try-catch individual — se radio-sync falha, '#$%' não era enviado
                try {
                  conn.send({
                    type: 'radio-sync',
                    radioType: 'file',
                    startTime: radioStateRef.current.startTime,
                    duration: radioStateRef.current.duration,
                    fileName: radioStateRef.current.fileName || t(langRef.current, 'globalRadio'), // FIX S1
                    senderName: radioStateRef.current.senderName || t(langRef.current, 'k10Server') // FIX S1
                  });
                } catch (e) {}
                try {
                  conn.send({
                    type: 'message',
                    text: '#$%',
                    senderName: t(langRef.current, 'k10Server'), // FIX S1
                    id: 'radio_block_' + Date.now()
                  });
                } catch (e) {}
              } else {
                radioStateRef.current.status = 'idle';
              }
            }
          }

          // ── RIGOROUS ROUTER MODE FIX ──
          // If router mode is active, we have already assigned a group (above).
          // We now schedule a disconnect to maintain zero persistent users.
          if (routerModeRef.current) {
            addAudit(`☄️ Router Mode: Desconectando ${conn.peer} após direcionamento`, 'info');
            setTimeout(() => {
              try {
                if (conn.open) conn.close();
              } catch (e) {}
            }, 3000); // 3 seconds to ensure client processes the peer-list
          }
        });

        conn.on('data', (data) => {
          // ══ K10 V29: GRUPO 0 ALWAYS-ON ════════════════════════════════════════
          // Todos os servidores respondem a 'group0-request' — sempre, sem toggle.
          // PROTOCOLO:
          //   1. Cliente Modo Zero conecta ao servidor (qualquer um)
          //   2. Cliente envia { type:'group0-request' } como 1ª mensagem
          //   3. Servidor responde UMA vez com group0-welcome e fecha
          //   4. Clientes normais NUNCA enviam group0-request → fluxo normal abaixo
          //
          // ANTI-FLOOD GARANTIDO:
          //   - O cliente conecta a UM servidor por vez
          //   - Apenas ESSE servidor recebe e responde ao group0-request
          //   - Os outros N servidores nunca tomam ciência deste cliente específico
          //   - Mesmo com 1.000.000 de servidores ativos: o cliente recebe exatamente 1 resposta
          //
          // RESPONSABILIDADE COLETIVA SEM FLOOD:
          //   - "Todos administram" = QUALQUER servidor pode responder (redundância)
          //   - Os servidores já sincronizam totalUsers via heartbeats + directory-announce
          //   - Portanto qualquer servidor representa o estado GLOBAL da rede com precisão
          // ══════════════════════════════════════════════════════════════════════
          if (data && data.type === 'group0-request') {
            // Guard: só responde se ainda está registrado (evita dupla resposta)
            if (!activeConnectionsRef.current.has(conn.peer)) return;

            // Marca como peer grupo0 para evitar que handleIncomingData o processe depois
            conn._isGroup0Peer = true;

            // ── FIX V32-GHOST: remove peer de positions[] imediatamente ──────────
            // O conn.on('open') já atribuiu uma posição antes de sabermos que era
            // um peer group0. Precisamos removê-lo agora para evitar ghost na lista
            // que seria enviada como peers[] no group0-welcome.
            const g0Gid = peerGroupMapRef.current.get(conn.peer);
            if (g0Gid && activeGroupsRef.current[g0Gid]) {
              const g0Group = activeGroupsRef.current[g0Gid];
              const g0PosIdx = g0Group.positions ? g0Group.positions.indexOf(conn.peer) : -1;
              if (g0PosIdx !== -1) {
                // swap-on-remove: troca com o último e faz pop (mantém lista contígua)
                const lastPeer = g0Group.positions[g0Group.positions.length - 1];
                g0Group.positions[g0PosIdx] = lastPeer;
                g0Group.positions.pop();
                g0Group.size = g0Group.positions.length;
                // atualiza posIdx do peer que foi movido
                if (lastPeer && lastPeer !== conn.peer && peerPositionMapRef.current.has(lastPeer)) {
                  const lastEntry = peerPositionMapRef.current.get(lastPeer);
                  peerPositionMapRef.current.set(lastPeer, { ...lastEntry, posIdx: g0PosIdx });
                }
              }
              if (g0Group.members) g0Group.members.delete(conn.peer);
            }
            // ── FIM FIX V32-GHOST ─────────────────────────────────────────────────

            // totalUsers = max(soma posições de todos os grupos, heartbeats ativos)
            // Usando o maior valor disponível garante estimativa mais conservadora (segura)
            const totalFromGroups = Object.values(activeGroupsRef.current)
              .reduce((sum, g) => sum + (g.positions?.length || g.size || 0), 0);
            const totalUsers = Math.max(totalFromGroups, heartbeatsRef.current.size);

            // Lista de grupos conhecidos: GID + tamanho atual (cliente saberá qual grupo escolher)
            // Enviados em ordem crescente de ocupação — cliente prefere o mais cheio (agrupa)
            const groupsList = Object.entries(activeGroupsRef.current)
              .map(([gid, g]) => ({ gid, size: g.positions?.length || g.size || 0 }))
              .sort((a, b) => b.size - a.size)
              .slice(0, 50); // máx 50 grupos — evita pacote enorme

            addAudit(`[Grupo 0] ▶ group0-request de ${conn.peer} → totalUsers=${totalUsers} grupos=${groupsList.length}`, 'info');

            // ── V30: peers[] — apenas peers ATIVOS (FIX V32: exclui ghosts) ──
            // Combina peers locais do grupo mais populoso + peers do mesh (outros servidores)
            // FIX V32-GHOST: filtra por activeConnectionsRef.current — só envia peers vivos
            const allLocalPeers = Object.values(activeGroupsRef.current)
              .flatMap(g => Array.isArray(g.positions) ? g.positions : [])
              .filter(p => p && p !== conn.peer && activeConnectionsRef.current.has(p));
            const localSample = srvSecureShuffle([...allLocalPeers])
              .slice(0, 15);
            const meshSample = srvSecureShuffle(
              meshPeersRef.current.filter(p => p !== conn.peer && !localSample.includes(p))
            ).slice(0, 10);
            const peersForClient = [...new Set([...localSample, ...meshSample])].slice(0, 20);
            // ── FIM V30: peers[] ──────────────────────────────────────────────

            try {
              conn.send({
                type: 'group0-welcome',
                totalUsers,
                groups: groupsList,   // V29: lista de grupos com tamanhos
                peers: peersForClient, // V30: peers reais para Modo Geral imediato
                servers: knownServersRef.current
                  .filter(s => s !== peerIdRef.current)
                  .slice(0, 10)       // máx 10 servidores vizinhos
              });
            } catch(e) {
              addAudit(`[Grupo 0] ❌ Erro ao enviar welcome: ${e.message}`, 'err');
            }

            // Remove do mapa de conexões ativas (este peer não é membro do grupo)
            activeConnectionsRef.current.delete(conn.peer);
            peerGroupMapRef.current.delete(conn.peer);
            peerPositionMapRef.current.delete(conn.peer);
            setConnections(Array.from(activeConnectionsRef.current.keys()));
            setStats(prev => ({ ...prev, activeConnections: activeConnectionsRef.current.size }));

            // Fecha conexão após 1.5s — tempo suficiente para o send chegar
            setTimeout(() => {
              try { conn.close(); } catch(e) {}
              addAudit(`[Grupo 0] ✓ Peer ${conn.peer} atendido e desconectado`, 'ok');
            }, 1500);

            return; // ← Não passa para handleIncomingData
          }
          // ══ FIM K10 V29: GRUPO 0 ALWAYS-ON ═══════════════════════════════════

          // Guard extra: ignora mensagens de peer que já foi classificado como grupo0
          if (conn._isGroup0Peer) return;

          // ── VIGILÂNCIA DE SEGURANÇA (FIX-AUDIT-SRV): XSS, OOM, TTL ────────────
          if (data && typeof data === 'object') {
            if (typeof data.senderName === 'string') {
              data.senderName = data.senderName.replace(/[<>]/g, '').slice(0, 60);
            }
            if (data.ttl !== undefined) {
              let parsedTtl = parseInt(data.ttl);
              data.ttl = isNaN(parsedTtl) ? 15 : Math.min(Math.max(0, parsedTtl), 15);
            }
          }
          // ──────────────────────────────────────────────────────────────────────

          handleIncomingData(data, conn);
        });

        conn.on('close', () => {
          addAudit(`🔌 Conexão encerrada: ${conn.peer}`, 'warn');
          
          // Libera slot do Quiz Bot se era o dono
          if (quizBotPeerRef.current === conn.peer) {
            quizBotPeerRef.current = null;
            activeConnectionsRef.current.forEach((c) => {
              try { c.send({ type: 'quiz-bot-status', active: false }); } catch(e) {}
            });
          }
          
          // V25: swap-on-leave — mantém positions[] sempre contíguo
          // Quando peer P sai de um grupo de N:
          //   1. Internamente: último (posição N) ocupa buraco de P
          //   2. Broadcast: anuncia que a ÚLTIMA posição (sufixo N) saiu
          //   → Todos entendem: grupo tinha N, agora tem N-1, sem buracos
          const posInfo = peerPositionMapRef.current.get(conn.peer);
          if (posInfo) {
            const { gid: peerGid, posIdx } = posInfo;
            const group = activeGroupsRef.current[peerGid];
            if (group && group.positions) {
              const oldLen = group.positions.length;
              if (oldLen > 0 && posIdx < oldLen) {
                // O sufixo da última posição será o que anunciamos como "saiu"
                const lastSuffix = K10_POSITION_LIST[oldLen - 1];
                
                if (posIdx < oldLen - 1) {
                  // Peer saiu do MEIO — move o último para o buraco
                  const lastPeer = group.positions[oldLen - 1];
                  group.positions[posIdx] = lastPeer;
                  peerPositionMapRef.current.set(lastPeer, { gid: peerGid, posIdx });
                  // FIX V25-BUG1 / V26: notifica peer movido — position-update BINÁRIO
                  const movedConn = activeConnectionsRef.current.get(lastPeer);
                  if (movedConn && movedConn.open) {
                    const binPosUpd = k10bin.encodePositionUpdate(peerGid, posIdx);
                    const jsonPosUpd = { type: 'position-update', gid: peerGid, user: K10_POSITION_LIST[posIdx] };
                    k10Send(movedConn, binPosUpd, jsonPosUpd);
                  }
                  addAudit(`[K10-V26] Swap: pos${oldLen}(${lastPeer.slice(-2)})→pos${posIdx+1} grupo ${peerGid} [binário]`, 'info');
                }
                group.positions.pop();
                group.members.delete(conn.peer);
                group.size = group.positions.length;

                // V26: pex-update BINÁRIO (7 bytes) — substitui ~65 bytes JSON
                // newCount = group.positions.length (após pop)
                const newCount = group.positions.length;
                const binPexUpd = k10bin.encodePexUpdate(peerGid, newCount, 6);
                const jsonPexUpd = {
                  type: 'pex-update', gid: peerGid, user: lastSuffix, ttl: 6,
                  msgId: Date.now().toString(36) + Math.random().toString(36).slice(2)
                };
                k10BroadcastBinary(binPexUpd, jsonPexUpd, conn.peer);
                addAudit(`[K10-V26] pex-update binário: grupo ${peerGid} → ${newCount} usuários`, 'ok');
              }
            }
            peerPositionMapRef.current.delete(conn.peer);
          } else {
            // Fallback: peer sem posição rastreada (conexão antiga/legada)
            const peerGroupId = peerGroupMapRef.current.get(conn.peer);
            if (peerGroupId && activeGroupsRef.current[peerGroupId]) {
              activeGroupsRef.current[peerGroupId].size = Math.max(0, activeGroupsRef.current[peerGroupId].size - 1);
              activeGroupsRef.current[peerGroupId].members.delete(conn.peer);
            }
          }
          peerGroupMapRef.current.delete(conn.peer);

          // V36: se era servidor externo, remove de serverPeers do grupo
          if (conn.peer.endsWith('-CENTRAL')) {
            for (const gid in activeGroupsRef.current) {
              const g = activeGroupsRef.current[gid];
              if (Array.isArray(g.serverPeers) && g.serverPeers.includes(conn.peer)) {
                g.serverPeers = g.serverPeers.filter(s => s !== conn.peer);
                g.serverCount = Math.max(0, (g.serverCount || 1) - 1);
                addAudit(`[K10-V36] Servidor ${conn.peer} saiu do grupo ${gid} (${g.serverCount}/${K10_MAX_SERVERS_PER_GROUP})`, 'info');
                break;
              }
            }
          }
          
          activeConnectionsRef.current.delete(conn.peer);
          
          setConnections(Array.from(activeConnectionsRef.current.keys()));
          
          setStats(prev => ({
            ...prev,
            activeConnections: activeConnectionsRef.current.size,
            hydraNodes: recentPeersRef.current.length
          }));
        });

        conn.on('error', (err) => {
          addAudit(`⚠️ Erro na conexão ${conn.peer}: ${err?.message || err?.type || 'desconhecido'}`, 'warn');
        });
      };

      
      // ════════════════════════════════════════════════════════════════════
      // SERVIDOR — transmissão do Quiz após handoff (mesmo wire-format)
      // ════════════════════════════════════════════════════════════════════
      const srvSendQuizQuestion = (quizData) => {
        const ts = new Date();
        srvLastQuizTimeRef.current = ts.getTime();
        const wireMsg = {
          type: 'message',
          id: Date.now() + Math.random().toString(36).substring(2),
          ttl: 15,
          // FIX BUG-4: campo sender presente para que o filtro de vigilância
          // identifique corretamente a fonte e não aplique spam ao peerId do servidor
          sender: 'server-self',
          senderName: '🤖 Quiz Bot',
          direct: false,
          time: ts.toLocaleTimeString('en-US'),
          timestamp: ts.getTime(),
          text: '__QUIZ__',
          quizPayload: quizData
        };
        activeConnectionsRef.current.forEach(c => { try { c.send(wireMsg); } catch(e) {} });
      };
      const srvSendQuizReveal = (quizId, votes) => {
        const ts = new Date();
        const wireMsg = {
          type: 'message',
          id: Date.now() + Math.random().toString(36).substring(2),
          ttl: 15,
          // FIX BUG-4: idem — sender explícito
          sender: 'server-self',
          senderName: '🤖 Quiz Bot',
          direct: false,
          time: ts.toLocaleTimeString('en-US'),
          text: '__QUIZ_REVEAL__',
          quizRevealPayload: { quizId, votes: votes || {} }
        };
        activeConnectionsRef.current.forEach(c => { try { c.send(wireMsg); } catch(e) {} });
      };

      const srvNextWorldPlace = () => {
        const i = srvWorldPlaceIdxRef.current % WORLD_PLACES.length;
        srvWorldPlaceIdxRef.current = (srvWorldPlaceIdxRef.current + 1) % WORLD_PLACES.length;
        return WORLD_PLACES[i];
      };

      const srvAskWorldQuestion = async () => {
        if (!serverQuizActiveRef.current) return;
        if (srvQuizTimerRef.current) clearTimeout(srvQuizTimerRef.current);

        const place = srvNextWorldPlace();
        const hit = await srvFetchWorldImage(place.query, srvQuizUsedImagesRef.current);
        const imgUrl = hit ? (hit.largeImageURL || hit.webformatURL) : null;
        const imgId = hit ? hit.id : null;

        const [countryOpts, countryCorrectIdx] = srvBuildAlternatives(ALL_COUNTRIES, place.country);
        const quizId1 = 'quiz-srv-w1-' + Date.now() + '-' + Math.random().toString(36).substring(2);
        const quizData1 = {
          quizId: quizId1,
          quizQuestion: '🌍 Em qual PAÍS fica este lugar famoso?',
          quizOptions: countryOpts,
          quizCorrect: countryCorrectIdx,
          quizSubject: '📸 Lugares do Mundo',
          quizStage: 1,
          quizImage: imgUrl || undefined,
          quizImageId: imgId || undefined,
          nonce: Math.random().toString(36).substring(2, 10)
        };
        srvCurrentQuizRef.current = { ...quizData1, votes: {} };
        srvSendQuizQuestion(quizData1);

        srvQuizTimerRef.current = setTimeout(() => {
          if (!serverQuizActiveRef.current) return;
          srvSendQuizReveal(quizId1, {});
          srvCurrentQuizRef.current = null;

          setTimeout(() => {
            if (!serverQuizActiveRef.current) return;
            const statePool = place.statePool || ALL_COUNTRIES;
            const [stateOpts, stateCorrectIdx] = srvBuildAlternatives(statePool, place.state);
            const quizId2 = 'quiz-srv-w2-' + Date.now() + '-' + Math.random().toString(36).substring(2);
            const quizData2 = {
              quizId: quizId2,
              quizQuestion: '🗺️ Em qual ESTADO ou CIDADE fica este lugar?',
              quizOptions: stateOpts,
              quizCorrect: stateCorrectIdx,
              quizSubject: '📸 Lugares do Mundo',
              quizStage: 2,
              quizImage: imgUrl || undefined,
              nonce: Math.random().toString(36).substring(2, 10)
            };
            srvCurrentQuizRef.current = { ...quizData2, votes: {} };
            srvSendQuizQuestion(quizData2);

            srvQuizTimerRef.current = setTimeout(() => {
              if (!serverQuizActiveRef.current) return;
              srvSendQuizReveal(quizId2, {});
              srvCurrentQuizRef.current = null;
              setTimeout(() => { if (serverQuizActiveRef.current) srvAskNextQuestion(); }, 10000);
            }, srvQuizIntervalRef.current * 1000);
          }, 5000);
        }, srvQuizIntervalRef.current * 1000);
      };

      const srvAskDisciplineQuestion = async () => {
        if (!serverQuizActiveRef.current) return;
        if (srvQuizTimerRef.current) clearTimeout(srvQuizTimerRef.current);

        const ALL_POOL = QUIZ_SUBJECTS.filter(s => s.id !== 'world');
        let subj;
        if (srvQuizDisciplineRef.current === 'all') {
          subj = ALL_POOL[srvQuizAllIdxRef.current % ALL_POOL.length];
          srvQuizAllIdxRef.current = (srvQuizAllIdxRef.current + 1) % ALL_POOL.length;
        } else {
          subj = QUIZ_SUBJECTS.find(s => s.id === srvQuizDisciplineRef.current) || ALL_POOL[0];
        }
        if (!subj || !subj.url) subj = ALL_POOL[0];

        let questions = [];
        try {
          const res = await fetch(subj.url);
          const data = await res.json();
          const arr = Array.isArray(data) ? data : (Object.values(data).find(v => Array.isArray(v)) || []);
          questions = arr.filter(p => p.pergunta && Array.isArray(p.opcoes) && typeof p.correta === 'number');
        } catch(e) { console.warn('Server quiz fetch err', e); }
        if (!questions.length) {
          questions = [
            { pergunta:'Qual a capital do Brasil?', opcoes:['São Paulo','Rio de Janeiro','Brasília','Salvador'], correta:2 }
          ];
        }
        const q = questions[Math.floor(Math.random() * questions.length)];
        const cleanOpts = q.opcoes.map(s => s.replace(/^[A-Fa-f]\)\s*/, '').trim());
        const quizId = 'quiz-srv-' + Date.now() + '-' + Math.random().toString(36).substring(2);
        const quizData = {
          quizId,
          quizQuestion: q.pergunta,
          quizOptions: cleanOpts,
          quizCorrect: q.correta,
          quizSubject: `${subj.emoji} ${subj.name}`,
          quizStage: 0,
          nonce: Math.random().toString(36).substring(2, 10)
        };
        srvCurrentQuizRef.current = { ...quizData, votes: {} };
        srvSendQuizQuestion(quizData);

        srvQuizTimerRef.current = setTimeout(() => {
          if (!serverQuizActiveRef.current) return;
          srvSendQuizReveal(quizId, {});
          srvCurrentQuizRef.current = null;
          setTimeout(() => { if (serverQuizActiveRef.current) srvAskNextQuestion(); }, 15000);
        }, srvQuizIntervalRef.current * 1000);
      };

      const srvAskNextQuestion = async () => {
        if (!serverQuizActiveRef.current) return;
        
        // FIX: Respeita o cooldown global antes de disparar próxima pergunta
        const now = Date.now();
        const elapsed = now - srvLastQuizTimeRef.current;
        const minIntervalMs = SRV_MIN_QUIZ_INTERVAL * 1000;
        
        if (elapsed < minIntervalMs) {
          const wait = minIntervalMs - elapsed + 1000;
          addAudit(`[Quiz] Cooldown ativo: aguardando ${Math.round(wait/1000)}s`, 'info');
          srvQuizTimerRef.current = setTimeout(srvAskNextQuestion, wait);
          return;
        }

        if (srvQuizDisciplineRef.current === 'world') return srvAskWorldQuestion();
        return srvAskDisciplineQuestion();
      };

      // ── Receber HANDOFF: o usuário desligou e entregou o controle ──
      const handleQuizHandoff = (data, fromPeer) => {
        if (serverQuizActiveRef.current) {
          addAudit('[Quiz] Handoff ignorado: servidor já transmite', 'warn');
          return;
        }
        // FIX BUG-3a: se outro peer (não quem enviou) ainda é dono do bot, ignora
        if (quizBotPeerRef.current && quizBotPeerRef.current !== fromPeer && quizBotPeerRef.current !== 'server-self') {
          addAudit(`[Quiz] Handoff ignorado: outro peer (${fromPeer}) já é dono`, 'warn');
          return;
        }
        // Hidrata estado a partir do handoff (URL+ID, sem binário)
        srvQuizDisciplineRef.current = data.quizDiscipline || 'world';
        srvQuizIntervalRef.current = Math.max(SRV_MIN_QUIZ_INTERVAL, data.quizInterval || SRV_MIN_QUIZ_INTERVAL);
        srvQuizUsedImagesRef.current = new Set(data.usedImageIds || []);
        if (data.lastQuizTime) srvLastQuizTimeRef.current = data.lastQuizTime;
        // Hidrata cache de hits Pixabay (já buscados pelo cliente — evita refetch)
        if (data.bufferedHits && typeof data.bufferedHits === 'object') {
          for (const q in data.bufferedHits) {
            if (Array.isArray(data.bufferedHits[q])) {
              _srvImgCache[q] = data.bufferedHits[q].slice(0);
            }
          }
        }
        // Toma posse do slot único (igual quiz-bot-start)
        quizBotPeerRef.current = 'server-self';
        activeConnectionsRef.current.forEach(c => {
          try { c.send({ type: 'quiz-bot-status', active: true, owner: 'server-self' }); } catch(e) {}
        });
        serverQuizActiveRef.current = true;
        setServerQuizActive(true);
        addAudit(`[Quiz] Servidor assumiu Quiz via handoff de ${fromPeer}`, 'ok');

        // FIX BUG-3b: jitter inteligente — espera o cooldown restante + 3s de segurança,
        // evitando que o servidor envie pergunta antes do MIN_QUIZ_INTERVAL do cliente (120s)
        // expirar. Jitter fixo de 1500ms era insuficiente e causava violação de spam.
        const now = Date.now();
        const elapsed = now - srvLastQuizTimeRef.current;
        const minMs = SRV_MIN_QUIZ_INTERVAL * 1000;
        const cooldownRemaining = Math.max(0, minMs - elapsed);
        const jitter = cooldownRemaining + 3000; // 3s extra de folga para mensagens em trânsito
        addAudit(`[Quiz] Handoff jitter: ${Math.round(jitter/1000)}s (cooldown: ${Math.round(cooldownRemaining/1000)}s)`, 'info');
        srvQuizTimerRef.current = setTimeout(() => { if (serverQuizActiveRef.current) srvAskNextQuestion(); }, jitter);
      };

      // ── Botão "Parar Quiz" — só funciona se o servidor está transmitindo ──
      const stopServerQuiz = () => {
        if (!serverQuizActiveRef.current) return;
        serverQuizActiveRef.current = false;
        setServerQuizActive(false);
        if (srvQuizTimerRef.current) { clearTimeout(srvQuizTimerRef.current); srvQuizTimerRef.current = null; }
        srvCurrentQuizRef.current = null;
        if (quizBotPeerRef.current === 'server-self') {
          quizBotPeerRef.current = null;
          activeConnectionsRef.current.forEach(c => {
            try { c.send({ type: 'quiz-bot-status', active: false }); } catch(e) {}
          });
        }
        addAudit('[Quiz] Quiz parado manualmente pelo servidor', 'warn');
      };

      const broadcastYoutubeChat = () => {
        if (youtubeChatId) { alert(t(lang, 'chatAlreadyActive')); return; }
        const url = prompt(t(lang, 'enterYoutubeUrl'));
        if (!url) return;
        let yId = null;
        try {
          let parsedUrl = url;
          if (!parsedUrl.startsWith('http')) parsedUrl = 'https://' + parsedUrl;
          if (parsedUrl.includes('youtu.be/')) yId = parsedUrl.split('youtu.be/')[1].split('?')[0];
          else if (parsedUrl.includes('youtube.com/watch')) yId = new URL(parsedUrl).searchParams.get('v');
          else if (parsedUrl.includes('youtube.com/live/')) yId = parsedUrl.split('youtube.com/live/')[1].split('?')[0];
        } catch (e) {}
        if (!yId) { alert(t(lang, 'invalidYoutubeUrl')); return; }
        
        setYoutubeChatId(yId);
        const msgId = Date.now() + Math.random().toString(36).substring(2);
        // BUG S-4 FIX: adiciona ao seenMessages antes de broadcast para evitar loop de relay
        seenMessagesRef.current.add(msgId);
        pruneSeenSrv();
        const msgData = { type: 'youtube-chat-start', id: msgId, youtubeId: yId, ttl: 15 };
        // BUG S-5 FIX: checa conn.open antes de enviar
        activeConnectionsRef.current.forEach((c) => { if (c.open) try { c.send(msgData); } catch(e){} });
      };

      const stopYoutubeChat = () => {
        setYoutubeChatId(null);
        // BUG S-3 FIX: faltava broadcast do stop para que os clientes
        // saibam que o chat foi encerrado e limpem o tab YouTube.
        const msgId = Date.now() + Math.random().toString(36).substring(2);
        seenMessagesRef.current.add(msgId);
        pruneSeenSrv();
        const msgData = { type: 'youtube-chat-stop', id: msgId, ttl: 8 };
        activeConnectionsRef.current.forEach((c) => { if (c.open) try { c.send(msgData); } catch(e){} });
      };

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
            <h1 style={{ margin: 0 }}>{t(lang, 'serverTitle')}</h1>
            <div style={{ display: 'flex', gap: '10px' }}>
              <button
                onClick={() => setDarkMode(d => !d)}
                title={t(lang, 'darkMode')}
                style={{
                  padding: '5px 10px',
                  fontSize: '14px',
                  borderRadius: '4px',
                  border: '1px solid #334155',
                  background: darkMode ? '#1e293b' : '#f1f5f9',
                  color: darkMode ? '#e2e8f0' : '#1e293b',
                  cursor: 'pointer'
                }}
              >
                {darkMode ? '☀️' : '🌙'}
              </button>
              <a 
                href="https://andradepsa.github.io/MATEMATICO10/chat/manual.html"
                target="_blank"
                rel="noopener noreferrer"
                style={{
                  padding: '5px 10px',
                  fontSize: '12px',
                  borderRadius: '4px',
                  border: '1px solid #1e3a5f',
                  background: '#1e40af',
                  color: 'white',
                  cursor: 'pointer',
                  fontWeight: 'bold',
                  textDecoration: 'none',
                  display: 'inline-flex',
                  alignItems: 'center'
                }}
              >
                📖 Manual
              </a>
              <button 
                onClick={() => setLang(lang === 'en' ? 'pt' : 'en')}
                style={{
                  padding: '5px 10px',
                  fontSize: '12px',
                  borderRadius: '4px',
                  border: '1px solid #0369a1',
                  background: '#0ea5e9',
                  color: 'white',
                  cursor: 'pointer',
                  fontWeight: 'bold'
                }}
              >
                {t(lang, 'language')}
              </button>
            </div>
          </div>

          <p>{t(lang, 'idDescription1')}</p>
          <p>{t(lang, 'idDescription2')}</p>
          <p>{t(lang, 'idDescription3')}</p>
          <p>{t(lang, 'idDescription4')}</p>
          <div style={{ background: '#f0f9ff', border: '1px solid #bae6fd', padding: '10px', borderRadius: '8px', marginBottom: '15px', fontSize: '13px', color: '#0369a1' }}>
            <i className="fas fa-info-circle"></i> {t(lang, 'ytChatExplanation')}
          </div>
          <div className="peer-id-container">
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flexWrap: 'wrap' }}>
              <span className={`connection-badge ${
                connectionStatus === 'connected' ? 'connected' :
                (connectionStatus === 'connecting' || connectionStatus.startsWith('reconnecting')) ? 'connecting' :
                (connectionStatus.startsWith('error') && connectionStatus !== 'errorFatal') ? 'connecting' :
                'disconnected'
              }`}>
                <span className={`status-indicator status-${
                  connectionStatus === 'connected' ? 'online' :
                  (connectionStatus === 'connecting' || connectionStatus.startsWith('reconnecting')) ? 'connecting' : 'offline'
                }`}></span>
                {t(lang, 'status')} {t(lang, connectionStatus.split(' ')[0])} {connectionStatus.includes('(') ? connectionStatus.substring(connectionStatus.indexOf('(')) : ''}
              </span>
              <button onClick={toggleConnection} style={{ background: (connectionStatus === 'connected' || connectionStatus.startsWith('reconnecting')) ? '#ef4444' : '#4CAF50' }}>
                {connectionStatus === 'connected' || connectionStatus === 'connecting' || connectionStatus.startsWith('reconnecting') ? t(lang, 'disconnect') : t(lang, 'connect')}
              </button>
              {connectionStatus === 'errorFatal' && (
                <button onClick={() => { reconnectAttemptsRef.current = 0; isManualDisconnectRef.current = false; setupPeer(); }} style={{ background: '#ef4444', marginLeft: 8 }}>
                  {t(lang, 'forceReconnect')}
                </button>
              )}
            </div>
          </div>
          
          <IdBackupTools 
            peerId={peerId} 
            setPeerId={setPeerId} 
            onSaveId={handleIdChange} 
            isConnected={connectionStatus === 'connected' || connectionStatus === 'connecting' || connectionStatus.startsWith('reconnecting')}
            lang={lang}
          />
          
          {/* New component for controlling server mode */}
          <div className="server-mode-container">
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flex: 1 }}>
              <strong>{t(lang, 'pureServerMode')}</strong>
              <input 
                type="checkbox" 
                checked={pureServerMode} 
                onChange={(e) => {
                  setPureServerMode(e.target.checked);
                  if (connectionStatus === 'connected') {
                    disconnectPeer();
                    setTimeout(setupPeer, 500);
                  }
                }} 
                id="serverModeCheckbox"
              />
              <label htmlFor="serverModeCheckbox">
                {t(lang, 'activatePureServer')}
              </label>
            </div>
            <div style={{ display: 'flex', gap: '10px' }}>
              <button onClick={broadcastYoutubeChat} disabled={Boolean(youtubeChatId)} style={{ backgroundColor: youtubeChatId ? '#cccccc' : '#eab308', cursor: youtubeChatId ? 'not-allowed' : 'pointer', color: youtubeChatId ? '#666666' : 'black' }}>
                <i className="fab fa-youtube"></i> {t(lang, 'startYoutubeChat')}
              </button>
              {youtubeChatId && (
                <button onClick={stopYoutubeChat} style={{ backgroundColor: '#ef4444' }}>
                  <i className="fas fa-times"></i> {t(lang, 'stopYoutubeChat')}
                </button>
              )}
              {serverQuizActive && (
                <button onClick={stopServerQuiz} style={{ backgroundColor: '#dc2626', color: 'white', fontWeight: 'bold' }} title={t(lang, 'quizActiveOnServer')}>
                  <i className="fas fa-robot"></i> {t(lang, 'stopQuiz')}
                </button>
              )}
            </div>
          </div>

          <div className="server-mode-container">
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flex: 1 }}>
              <strong>{t(lang, 'maxConnections')}</strong>
              <input 
                type="number" 
                min="1"
                value={maxConn} 
                onChange={(e) => setMaxConn(parseInt(e.target.value) || 1)} 
                style={{ width: '80px', padding: '4px', border: '1px solid #ccc', borderRadius: '4px' }}
              />
            </div>
          </div>

          <div className="server-mode-container">
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flex: 1 }}>
              <strong>{t(lang, 'connectToOtherServer')}</strong>
              <input 
                type="text" 
                value={newServerId} 
                onChange={(e) => setNewServerId(e.target.value)} 
                placeholder={t(lang, 'serverIdPlaceholder')}
              />
              <button onClick={() => {
                if (newServerId && newServerId !== peerId) {
                  setKnownServers(prev => {
                    const updated = [...new Set([...prev, newServerId])];
                    localStorage.setItem('knownServers', JSON.stringify(updated));
                    return updated;
                  });
                  if (peerInstance.current) {
                    const conn = peerInstance.current.connect(newServerId);
                    setupConnection(conn);
                  }
                  setNewServerId('');
                } else if (newServerId === peerId) {
                  alert(t(lang, 'serverSelfAdd'));
                }
              }}>{t(lang, 'connect')}</button>
            </div>
          </div>
          
          {/* ── K10 V29: GRUPO 0 — Always-On (sem toggle) ── */}
          <div className="server-mode-container group0-status" style={{ background: '#d1fae5', border: '2px solid #10b981' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flex: 1 }}>
              <strong style={{ color: '#065f46' }}>
                🚪 MODO GRUPO 0 — Portal de Entrada
              </strong>
              <span style={{ background: '#10b981', color: '#fff', borderRadius: '12px', padding: '2px 10px', fontSize: '12px', fontWeight: 'bold' }}>
                ✅ SEMPRE ATIVO
              </span>
              <span style={{ fontSize: '11px', color: '#065f46', fontStyle: 'italic' }}>
                Responde a group0-request — não pode ser desativado
              </span>
            </div>
          </div>

          <div className="server-mode-container">
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flex: 1 }}>
              <strong>{t(lang, 'routerMode')}</strong>
              <input 
                type="checkbox" 
                checked={routerMode} 
                onChange={(e) => setRouterMode(e.target.checked)} 
                id="routerModeCheckbox"
              />
              <label htmlFor="routerModeCheckbox" style={{ fontSize: '11px', color: '#64748b' }}>
                {t(lang, 'activateRouterMode')}
              </label>
            </div>
            <div style={{ fontSize: '10px', fontStyle: 'italic', color: '#94a3b8', marginTop: '4px' }}>
              {t(lang, 'routerModeHint')}
            </div>
          </div>

          <div className="server-mode-container">
            <strong>{t(lang, 'knownServers')}</strong>
            {knownServers.map(id => (
              <span key={id} className="known-server-badge">
                {id} <button 
                  style={{ padding: '0 4px', fontSize: '10px', background: '#94a3b8', color: 'white', marginLeft: '4px' }}
                  onClick={() => {
                  setKnownServers(prev => {
                    const updated = prev.filter(s => s !== id);
                    localStorage.setItem('knownServers', JSON.stringify(updated));
                    return updated;
                  });
                }}>x</button>
              </span>
            ))}
          </div>
          
          <div className="distribution-stats">
            <h3>{t(lang, 'distributionStats')}</h3>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '10px' }}>
              <div className="stat-box">
                <div className="stat-label">{t(lang, 'messagesReceived')}</div>
                <div className="stat-value">{stats.messagesReceived}</div>
              </div>
              <div className="stat-box">
                <div className="stat-label">{t(lang, 'messagesDistributed')}</div>
                <div className="stat-value">{stats.messagesDistributed}</div>
              </div>
              <div className="stat-box">
                <div className="stat-label">{t(lang, 'activeConnections')}</div>
                <div className="stat-value" style={{ color: '#3b82f6' }}>{stats.activeConnections}</div>
              </div>
              <div className="stat-box hydra">
                <div className="stat-label">{t(lang, 'hydraWebSize')}</div>
                <div className="stat-value">{stats.hydraNodes}</div>
                <div style={{ fontSize: '9px' }}>{t(lang, 'estimatedP2PNodes')}</div>
              </div>
            </div>
          </div>
          
          <div className="connected-peers">
            <h3>{t(lang, 'activeConnections')} ({connections.length})</h3>
            {connections.length === 0 ? (
              <p>{t(lang, 'noActiveConnections')}</p>
            ) : (
              <div>
                {connections.map((connPeerId, index) => (
                 <div key={index} className="peer-item">
                    <span className="status-indicator status-online"></span>
                    {connPeerId}
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{ marginTop: '20px' }}>
            <h3>{t(lang, 'messages')}</h3>
            <div style={{ maxHeight: '300px', overflowY: 'auto', border: '1px solid #ddd', padding: '10px' }}>
              {messages.length === 0 ? (
                <p>{t(lang, 'noMessagesReceived')}</p>
              ) : (
                <div>
                  {messages.map((msg, index) => (
                    <div key={index} className={`message other`}>
                      <div>{msg.text}</div>
                      <div className="message-source">
                        {t(lang, 'origin')} {msg.source} | {new Date(msg.timestamp).toLocaleTimeString()}
                      </div>
                    </div>
                  ))}
                  <div ref={messagesEndRef} />
                </div>
              )}
            </div>
          </div>

          {/* ── AUDIT LOG ── */}
          <div style={{ marginTop: '20px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' }}>
              <h3 style={{ margin: 0, fontSize: '13px' }}>📋 Audit Log</h3>
              <button onClick={() => { auditLogRef.current = []; setAuditLog([]); }} style={{ fontSize: '11px', padding: '3px 8px', background: '#ef4444', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer' }}>
                {t(lang, 'clearAuditLog')}
              </button>
            </div>
            <div className="audit-log">
              {auditLog.length === 0
                ? <span style={{ color: '#94a3b8', fontSize: '11px' }}>{t(lang, 'noAuditEvents')}</span>
                : auditLog.map((e, i) => (
                  <div key={i} className="audit-entry">
                    <span className="audit-ts">{e.ts}</span>
                    <span className={`audit-msg ${e.type}`}>{e.msg}</span>
                  </div>
                ))
              }
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<DistributorApp />);
  </script>
  <script>
    (async () => {
      try {
        await esbuild.initialize({ wasmURL: 'https://cdn.jsdelivr.net/npm/esbuild-wasm@0.20.1/esbuild.wasm' });
        const script = document.getElementById('esbuild-main').textContent;
        const { code } = await esbuild.transform(script, { loader: 'tsx', target: 'esnext' });
        const s = document.createElement('script');
        s.textContent = code;
        document.body.appendChild(s);
      } catch (e) {
        console.error('Esbuild error:', e);
        document.getElementById('k10-loading').innerHTML = '<p style="color:red;text-align:center;margin-top:20px">Erro ao carregar o servidor. Por favor, recarregue a página.</p>';
      }
    })();
  </script>
</body>
</html>
