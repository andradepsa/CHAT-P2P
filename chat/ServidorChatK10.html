<!-- ═══ ServidorChatK10 V37 — Bancada Fix (23/abr/2026) ═══
     NOVO V36 — 7 CORREÇÕES DA BANCADA DE TESTES
     ══════════════════════════════════════════════════════════════════════
     FIX V36-TITLE: título HTML corrigido V34→V35 (agora V36)
     FIX V36-LOG: console.error em distributeMessage removido — expunha
          connPeerId no DevTools mesmo com FIX-AUDIT-SRV-LOG aplicado.
          Agora silencioso, espelhando o tratamento do bloco direct.
     FIX V36-IDVALIDATE: IdBackupTools.saveId() valida formato antes de
          aceitar ID customizado. Aceita raw (6 chars A–Z 2–9) ou com
          sufixo -CENTRAL. IDs inválidos exibem alerta e não prosseguem.
          Previne loop de erro 'invalid-id' no PeerJS sem feedback claro.
          NOTA (bancada 23/abr): validação foi declarada no changelog mas
          NÃO estava implementada no código — apenas o sufixo -CENTRAL era
          adicionado, sem checar o formato do ID base. Corrigido com regex
          /^[A-Z2-9]{6}$/ que bloqueia IDs inválidos antes de setPeerId().
     FIX V36-MESH-CSPRNG: server-mesh-update usava Math.random() para
          amostrar peers — substituído por srvSecureShuffle (CSPRNG já
          disponível no código). Seleção de peers não mais previsível.
          NOTA (bancada 23/abr): fix declarado no changelog mas NÃO estava
          aplicado em handleIncomingData (linha do merged.sort). Corrigido.
     FIX V36-STUN: pool STUN reduzido de ~150 para 12 entradas verificadas.
          A lista anterior continha ~90 domínios corporativos genéricos
          (stun:stun.IBM.com, etc.) que não são servidores STUN reais,
          causando até 5–15s de latência extra por timeouts ICE.
          Mantidos: 5 Google + 7 alternativos verificados como ativos.
     FIX V36-COMMENT: comentário em findFreeSuffix corrigido: dizia
          "grupo cheio (3844 usuários)" mas o limite real é K10_MAX_GROUP=1800.
     ══════════════════════════════════════════════════════════════════════
     Correções anteriores V35 mantidas integralmente.
     ══════════════════════════════════════════════════════════════════════
     ══════════════════════════════════════════════════════════════════════
     FIX V35-TTL-PRECHECK: mensagens com TTL=0 descartadas na entrada,
          ANTES de serem registradas em seenMessages e ANTES de chegarem
          a distributeMessage.
          - Bug V34: a mensagem TTL=0 passava pelo bloco 'message' inteiro
            (dedup, setMessages, setStats) antes de distributeMessage a
            bloquear. Isso permitia que a mensagem fosse armazenada no
            histórico local do servidor e que o msgId ocupasse um slot em
            seenMessages — abrindo brecha para bypass de dedup em cenários
            com múltiplos servidores mesh.
          - Fix: guard `if (msgTtl <= 0) return;` inserido como PRIMEIRA
            instrução no bloco type==='message', antes de qualquer acesso
            a seenMessages ou setMessages.
          - Impacto: TTL=0 é descartado silenciosamente em todos os
            caminhos — servidor não armazena, não debita slot de dedup,
            não distribui. Broadcasts com TTL normal continuam inalterados.
     ══════════════════════════════════════════════════════════════════════
     Correções anteriores V34 mantidas integralmente.
     ══════════════════════════════════════════════════════════════════════
     NOVO V34 — FIX CRÍTICO: ROTEAMENTO DE MENSAGENS DIRETAS
     ══════════════════════════════════════════════════════════════════════
     FIX V34-DIRECT-ROUTING: distributeMessage agora roteia mensagens
          diretas (direct:true + recipient) APENAS ao destinatário.
          - Bug V33: distributeMessage fazia broadcast de TUDO para todos os
            peers conectados, incluindo mensagens com direct:true e recipient.
          - Resultado: mensagens E2EE vazavam para peers não destinatários;
            teste de carga direta, ordem, concorrência e carga sustentada
            falhavam porque qualquer peer recebia mensagens alheias —
            tornando impossível validar entrega seletiva.
          - Fix: se data.direct && data.recipient existem, envia SOMENTE
            para activeConnectionsRef.current.get(data.recipient).
          - Impacto: mensagens diretas são privadas; broadcasts continuam
            funcionando normalmente (sem direct/recipient = comportamento
            anterior inalterado).
     ══════════════════════════════════════════════════════════════════════
     Correções anteriores V33 mantidas integralmente.
     ══════════════════════════════════════════════════════════════════════
     ══════════════════════════════════════════════════════════════════════
     NOVO V32 — CORREÇÕES CRÍTICAS GROUP 0
     ══════════════════════════════════════════════════════════════════════
     FIX V32-GHOST-1: Remove peer de positions[] ao receber group0-request
          - Bug: conn.on('open') atribuía posição ANTES de saber que era peer group0
          - Resultado: ghost ficava em g.positions por até 30s (até o GC rodar)
          - Fix: ao identificar group0-request, executa swap-on-remove imediatamente
          - Impacto: peers[] em group0-welcome nunca mais inclui IDs de fantasmas

     FIX V32-GHOST-2: peers[] filtrado por activeConnectionsRef (só peers vivos)
          - Bug: allLocalPeers usava g.positions sem checar se peer ainda estava ativo
          - Resultado: clientes recebiam IDs mortos → connectToPeer falha → sem Modo Geral
          - Fix: .filter(p => activeConnectionsRef.current.has(p))
          - Impacto: todo ID em peers[] é garantidamente uma conexão aberta agora
     ══════════════════════════════════════════════════════════════════════
     Correções anteriores V30 mantidas integralmente.
     ══════════════════════════════════════════════════════════════════════
     S-17 K10 V30: Grupo 0 Mesh — Modo Geral Ativo na Entrada
          - group0-welcome agora inclui peers[] (até 20 peer IDs reais)
          - meshPeersRef: cache de peers aprendidos de servidores vizinhos
          - server-mesh-update: protocolo de troca de peers entre servidores
            Cada servidor envia lista de peers ao vizinho a cada 30s
          - Clientes recebem peers[] e conectam direto → Modo Geral ativo ao entrar
          - group0-welcome = portal de entrada + rede P2P unificada em 1 passo
     ══════════════════════════════════════════════════════════════════════
     S-16 K10 V29: Grupo 0 Always-On — Anti-Flood Protocol
          - Grupo 0 SEMPRE ATIVO: sem toggle, sem localStorage, sem checkbox
          - Servidor aguarda { type:'group0-request' } do cliente no conn.on('data')
          - Clientes normais nunca enviam group0-request -> fluxo normal inalterado
          - ANTI-FLOOD: cada cliente fala com 1 servidor; so esse responde
            Com 1.000.000 de servidores: cliente recebe exatamente 1 resposta
          - REDUNDANCIA: qualquer servidor pode responder (todos sincronizados)
          - V29+: group0-welcome inclui groups:[] com GIDs + tamanhos atuais
          - conn._isGroup0Peer guard: peer G0 nao entra em handleIncomingData

     LOGICA CLIENTE (Chat_Desktop_V29):
          - Flag module-level group0WelcomeReceived (anti-loop garantido)
          - conn.on('open'): envia group0-request SE !flag E !myGroupId
          - Apos group0-welcome: flag=true, directoryGlobal atualizado
          - Conexao ao servidor real: flag true -> handshake normal, sem loop
     ══════════════════════════════════════════════════════════════════════

     Correções aplicadas:
     S-1  peerId stale no closure → peerIdRef.current
     S-2  distributeMessage: guard conn.open antes de send
     S-3  stopYoutubeChat: broadcast youtube-chat-stop adicionado
     S-4  broadcastYoutubeChat: msgId adicionado ao seenMessages
     S-5  broadcastYoutubeChat: guard conn.open
     S-6  pureServerModeRef: inicializado com valor real do localStorage (IIFE)
     S-7  youtube-chat-stop de cliente agora é relay para todos os peers ← NOVO V19
     S-8  setupConnection: cada send em try-catch individual
     S-9  startKeepalive: linha p.socket._socket removida (API privada inexistente PeerJS 1.5+) ← NOVO V19
     S-10 Sistema K10 ID: prefixo K10(3) + GID(4) + sufixo(2) = 9 chars ← NOVO V23
          - GID dinâmico: cresce de 1→2→3→4 chars conforme a rede (cap 4)
          - PEX comprimido: transmite {gid, users:[sufixo2chars]} — K10 implícito
          - generateGid: 62 chars case-sensitive (A-Z a-z 0-9)
          - assignUserSuffix: auto-busca sufixo livre na lista do grupo
          - peer-list envia {gid, users} ao invés de peers com IDs completos
     S-11 K10 V24: GID Hierárquico + Lista Delta + Dominância Dinâmica ← NOVO V24
          - generateChildGid: novo grupo deriva GID do pai (prefixo 3 chars herdado)
          - findGroupFamily: localiza todos os GIDs irmãos (mesmo prefixo)
          - buildFamilyPex: comprime listas de grupos irmãos em pex-family com base+deltas
          - checkAndPromote: troca GIDs quando filho supera pai em >20% de usuários
          - Relay de gid-promote e pex-family adicionados ao handleIncomingData
     S-13 K10 V26: Protocolo Binário — pex-update, position-update, gid-promote ← NOVO V26
          - K10BinaryProtocol: instância global k10bin (registry GID↔idx, encode/decode)
          - registerGid: chamado ao criar grupo → atribui índice uint16 sequencial
          - peer-list JSON: campo gidIdx adicionado → cliente aprende o índice do GID
          - pex-update: enviado como Uint8Array(7) via binary protocol (−89% vs JSON)
          - position-update: enviado como Uint8Array(7) via binary protocol (−86%)
          - gid-promote: enviado como Uint8Array(7) via binary protocol (−91%)
          - Relay binário: reencodeWithDecrementedTtl() → sem JSON.stringify/parse
          - Fallback: se conn não suportar binário → JSON V25 mantido como fallback
     S-12 K10 V25: Lista de Posições Fixa + Swap-on-Leave + pex-update ← NOVO V25
          - K10_MAX_GROUP: limite de 1800 usuários por grupo
          - K10_POSITION_LIST: lista fixa de 1800 sufixos (AA..dB) — idêntica em todos os nós
          - positions[]: array contíguo por grupo; positions[i] = peerId na posição i+1
          - peerPositionMapRef: mapeia peerId → {gid, posIdx}
          - Entrada: peer recebe {gid, user, count} — conecta às posições 0..count-1
          - Saída: peer sai → último ocupa buraco → broadcast {type:'pex-update',gid,user}
          - pex-update relay: servidor repassa para toda a rede com TTL decrementado
          - GC atualizado: limpa peerPositionMapRef + reconstrói positions[] correto
     S-13 K10 V25 — FIXES DE BANCADA (19/abr/2026) ← NOVO
          - FIX V25-BUG1: position-update enviado ao peer movido após swap-on-leave
            Sem isso, o peer movido ficava com sufixo errado e mensagens diretas falhavam
            Aplicado em conn.on('close') E no GhostGC
          - FIX V25-BANDA: removido users:[] do peer-list
            Reduz peer-list de ~565 bytes para ~65 bytes (−88%) para grupo de 100 peers
     S-15 AUDITORIA BANCADA V25-FINAL (20/abr/2026) — 8 fixes adicionais ← NOVO
          - FIX-AUDIT-SRV-TITLE: título corrigido V23→V25
          - FIX-AUDIT-SRV-HYDRA 🔴: cap de conexões aplicado também no modo Hydra
            Sem este guard, Hydra aceitava conexões ilimitadas → DoS por RAM
            MAX_HYDRA_CONNECTIONS=500 (fecha em 2s, suporta mais tráfego)
          - FIX-AUDIT-SRV-LOG 🟠: console.log removidos de distributeMessage,
            setupConnection, handleIncomingData, setupPeer, monitoramento
            Previne exposição de IDs de peers, política de bloqueio e metadados
          - FIX-AUDIT-SRV-HYDRA2 🟠: console.log de ativação do modo Hydra
            substituído por addAudit (visível apenas no painel de auditoria)
          - FIX-AUDIT-SRV-AUDIO: descarte silencioso de áudio longo e ficheiros
          - FIX-AUDIT-SRV-CONN-ERR: conn.on error agora registra no audit log
          - FIX-AUDIT-SRV1 🔴: TTL clampado [0..15] em distributeMessage
            Previne relay amplificado por peer malicioso injetando TTL=999999
          - FIX-AUDIT-SRV2 🔴: console.log(data) removido (linha 1455)
            Dados de chat não mais expostos no DevTools do servidor
          - FIX-AUDIT-SRV3 🔴: positions:[] adicionado em directory-announce, group-split, group-merge
            GC periódico não mais falha silenciosamente com peerPositionMap inconsistente
          - FIX-AUDIT-SRV4 🔴: GC periódico agora faz broadcast pex-update quando remove fantasmas
            Clientes corrigem groupSize imediatamente, não esperando 30s
          - FIX-AUDIT-SRV5a 🟠: senderName limitado a 60 chars (previne OOM)
          - FIX-AUDIT-SRV5b 🟠: youtubeId validado com regex [a-zA-Z0-9_-]{6,50}

  <!-- HYDRA V7 server --><title>Servidor K10 - V36</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f5f5f5;
    }
    #root {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;

    }
    .peer-id-container {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      padding: 10px;

      border-radius: 5px;
    }
    .message {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 5px;
    }
    .message.you {
      background-color: #e3f2fd;
      margin-left: 20%;
    }
    .message.other {
      background-color: #f1f1f1;
      margin-right: 20%;
    }

      color: #1976d2;
      text-decoration: none;
      font-weight: bold;
    }

    }
    .progress-bar {
      height: 5px;

      border-radius: 3px;

    }
    .progress {

      width: 0%;

      margin-top: 10px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 4px;
    }
    .peer-item {
      margin: 5px 0;
      padding: 5px;
      background: #e3f2fd;
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 10px;
    }
    button:disabled {
      background: #cccccc;
      cursor: not-allowed;
    }
    .file-input-container {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .audio-player {

  <script>
    (function(){


      function hideLoader(){ var el=document.getElementById('k10-loading'); if(el){el.style.opacity='0';el.style.transition='opacity 0.3s';setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},320);} }
      setTimeout(hideLoader,12000);
      var obs=new MutationObserver(function(){ var r=document.getElementById('root'); if(r&&r.children.length>0){obs.disconnect();hideLoader();} });
      document.addEventListener('DOMContentLoaded',function(){ var r=document.getElementById('root'); if(r)obs.observe(r,{childList:true}); });

      async function srvFetchWorldImage(query, usedImagesSet) {
        if (!Array.isArray(_srvImgCache[query])) _srvImgCache[query] = [];
        if (_srvImgCache[query].length === 0) {
          if (!_srvImgLocks[query]) {
            _srvImgLocks[query] = (async () => {

                const url = `https://pixabay.com/api/?key=${_srvPixKey()}&q=${encodeURIComponent(query)}&image_type=photo&safesearch=true&per_page=200&orientation=horizontal`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.hits && data.hits.length > 0) {
                  const arr = [...data.hits];
                  for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));

                  }
                  _srvImgCache[query] = arr;
                  const keys = Object.keys(_srvImgCache);

                }
              } catch(e) { console.warn('Server Pixabay fetch error', e); }
              finally { _srvImgLocks[query] = null; }
            })();
          }
          await _srvImgLocks[query];
        }
        while (_srvImgCache[query].length > 0) {
          const pick = _srvImgCache[query].shift();
          if (usedImagesSet && !usedImagesSet.has(pick.id)) { usedImagesSet.add(pick.id); return pick; }

      // S-10 V23: Sistema K10 ID
      // Estrutura: K10(3) + GID(4) + sufixo(2) = 9 chars total
      // K10 = prefixo implícito — NUNCA transmitido na rede
      // GID = identificador do grupo — 4 chars, transmitido 1× por lista
      // sufixo = identificador do usuário no grupo — 2 chars
      // Charset: 62 chars case-sensitive (A-Z a-z 0-9)
      // ═══════════════════════════════════════════════════════════════
      const K10_PREFIX = 'K10';
      const K10_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      const K10_GID_LEN = 4;
      const K10_SUFFIX_LEN = 2;

      // ── V25: Lista de 1800 posições fixas — idêntica em TODOS os nós ──────
      // Posição 1→'AA', Posição 2→'AB', ..., Posição 1800→'dB'
      // Gravada no código: ninguém precisa transmitir a lista, só o índice/sufixo
      const K10_MAX_GROUP = 1800;
      const K10_MAX_SERVERS_PER_GROUP = 10; // V36: máx de servidores externos por grupo
      const K10_POSITION_LIST = (() => {
        const list = [];
        for (let i = 0; i < K10_CHARS.length; i++) {
          for (let j = 0; j < K10_CHARS.length; j++) {
            if (list.length >= K10_MAX_GROUP) break;
            list.push(K10_CHARS[i] + K10_CHARS[j]);
          }
          if (list.length >= K10_MAX_GROUP) break;
        }
        return list; // ['AA','AB','AC',...,'dB'] — exatamente 1800 entradas
      })();

      // ── V26: Protocolo Binário K10 ─────────────────────────────────────────
      // K10BinaryProtocol: registry GID↔idx + encode/decode de 7 bytes
      // MAGIC=0xB1 | TYPE(1B) | PARAM_A uint16LE | PARAM_B uint16LE | AUX(TTL+SEQ)
      const K10B_MAGIC   = 0xB1;
      const K10B_SIZE    = 7;
      const K10B_TYPE    = { PEX_UPDATE:0x01, POSITION_UPDATE:0x02, GID_PROMOTE:0x03, JOIN_UPDATE:0x04 };
      const K10B_SEQ_MASK  = 0x1F;
      const K10B_TTL_SHIFT = 5;
      const K10B_TTL_MAX   = 6;

      class K10BinaryProtocol {
        constructor() {
          this._gidToIdx = new Map();
          this._idxToGid = new Map();
          this._nextIdx  = 0;
          this._seqCounters = new Map();
          this._dedupCache  = new Set();
          this._dedupOrder  = [];
        }
        registerGid(gid) {
          if (this._gidToIdx.has(gid)) return this._gidToIdx.get(gid);
          const idx = this._nextIdx++;
          this._gidToIdx.set(gid, idx);
          this._idxToGid.set(idx, gid);
          return idx;
        }
        getIdx(gid)  { return this._gidToIdx.has(gid) ? this._gidToIdx.get(gid) : -1; }
        getGid(idx)  { return this._idxToGid.get(idx) || null; }
        learnGid(gid, idx) {
          if (typeof idx !== 'number' || idx < 0) return;
          this._gidToIdx.set(gid, idx); this._idxToGid.set(idx, gid);
          if (idx >= this._nextIdx) this._nextIdx = idx + 1;
        }
        nextSeq(gidIdx) {
          const next = ((this._seqCounters.get(gidIdx) || 0) + 1) & K10B_SEQ_MASK;
          this._seqCounters.set(gidIdx, next); return next;
        }
        isDuplicate(gidIdx, type, seq) {
          const key = `${gidIdx}:${type}:${seq}`;
          if (this._dedupCache.has(key)) return true;
          this._dedupCache.add(key); this._dedupOrder.push(key);
          if (this._dedupOrder.length > 128) this._dedupCache.delete(this._dedupOrder.shift());
          return false;
        }
        encode(type, gidIdxA, paramB, ttl = K10B_TTL_MAX, seq = -1) {
          if (gidIdxA < 0) return null;
          const safeGidA  = gidIdxA & 0xFFFF;
          const safeParamB = paramB   & 0xFFFF;
          const safeTtl   = Math.min(Math.max(0, ttl), K10B_TTL_MAX) & 0x07;
          const safeSeq   = seq < 0 ? this.nextSeq(safeGidA) : (seq & K10B_SEQ_MASK);
          const buf = new Uint8Array(K10B_SIZE);
          const view = new DataView(buf.buffer);
          buf[0] = K10B_MAGIC; buf[1] = type;
          view.setUint16(2, safeGidA, true);
          view.setUint16(4, safeParamB, true);
          buf[6] = (safeTtl << K10B_TTL_SHIFT) | safeSeq;
          return buf;
        }
        decode(buffer) {
          const buf = buffer instanceof Uint8Array ? buffer : new Uint8Array(buffer);
          if (buf.length < K10B_SIZE || buf[0] !== K10B_MAGIC) return null;
          const view = new DataView(buf.buffer, buf.byteOffset);
          const type   = buf[1];
          const paramA = view.getUint16(2, true);
          const paramB = view.getUint16(4, true);
          const aux    = buf[6];
          return { type, paramA, paramB, ttl:(aux >> K10B_TTL_SHIFT) & 0x07, seq:aux & K10B_SEQ_MASK };
        }
        static isBinaryPacket(data) {
          if (data instanceof ArrayBuffer) return data.byteLength >= K10B_SIZE && new Uint8Array(data)[0] === K10B_MAGIC;
          if (data instanceof Uint8Array)  return data.length   >= K10B_SIZE && data[0]                  === K10B_MAGIC;
          return false;
        }
        // Alto nível — servidor
        encodePexUpdate(gid, newCount, ttl = K10B_TTL_MAX) {
          return this.encode(K10B_TYPE.PEX_UPDATE, this.getIdx(gid), newCount, ttl);
        }
        encodePositionUpdate(gid, newPosIdx) {
          return this.encode(K10B_TYPE.POSITION_UPDATE, this.getIdx(gid), newPosIdx, 0);
        }
        encodeGidPromote(gidA, gidB, ttl = K10B_TTL_MAX) {
          const ia = this.getIdx(gidA), ib = this.getIdx(gidB);
          if (ia < 0 || ib < 0) return null;
          return this.encode(K10B_TYPE.GID_PROMOTE, ia, ib, ttl);
        }
        // Alto nível — relay
        reencodeWithDecrementedTtl(buffer) {
          const pkt = this.decode(buffer);
          if (!pkt || pkt.ttl === 0) return null;
          return this.encode(pkt.type, pkt.paramA, pkt.paramB, pkt.ttl - 1, pkt.seq);
        }
      }

      // Instância global do protocolo binário (compartilhada por todas as funções do servidor)
      const k10bin = new K10BinaryProtocol();

      // Wrapper de envio: tenta binário primeiro, cai em JSON se necessário
      const k10Send = (conn, binaryBuf, jsonFallback) => {
        if (!conn || !conn.open) return;
        try {
          if (binaryBuf) {
            conn.send(binaryBuf.buffer); // PeerJS suporta ArrayBuffer
            return;
          }
        } catch(e) { /* fallthrough para JSON */ }
        try { conn.send(jsonFallback); } catch(e2) {}
      };

      // Wrapper de broadcast binário para todos os peers conectados
      const k10BroadcastBinary = (binaryBuf, jsonFallback, excludePeer = null) => {
        if (!binaryBuf && !jsonFallback) return;
        activeConnectionsRef.current.forEach((c, pid) => {
          if (pid === excludePeer || !c.open) return;
          k10Send(c, binaryBuf, jsonFallback);
        });
      };
      // ── Fim V26 Protocolo Binário ──────────────────────────────────────────

      // Gera um GID aleatório de 4 chars
      const generateGid = () => {
        const buf = new Uint8Array(K10_GID_LEN);
        crypto.getRandomValues(buf);
        return Array.from(buf).map(b => K10_CHARS[b % K10_CHARS.length]).join('');
      };

      // Contador global de GIDs gerados — usado para GID sequencial quando necessário
      const gidCounterRef = useRef(0);

      // Gera próximo GID sequencial (para grupos novos criados pelo servidor)
      const nextSequentialGid = () => {
        let n = gidCounterRef.current++;
        let gid = '';
        for (let i = 0; i < K10_GID_LEN; i++) {
          gid = K10_CHARS[n % K10_CHARS.length] + gid;
          n = Math.floor(n / K10_CHARS.length);
        }
        return gid;
      };

      // Extrai sufixo (2 chars) de um peerId completo K10GGGGXX
      const extractSuffix = (peerId) => {
        if (!peerId || peerId.length < K10_PREFIX.length + K10_GID_LEN + K10_SUFFIX_LEN) return null;
        return peerId.slice(K10_PREFIX.length + K10_GID_LEN);
      };

      // Extrai GID (4 chars) de um peerId completo K10GGGGXX
      const extractGid = (peerId) => {
        if (!peerId || peerId.length < K10_PREFIX.length + K10_GID_LEN) return null;
        return peerId.slice(K10_PREFIX.length, K10_PREFIX.length + K10_GID_LEN);
      };

      // Reconstrói peerId completo a partir de GID + sufixo
      const buildPeerId = (gid, suffix) => K10_PREFIX + gid + suffix;

      // Encontra o próximo sufixo livre para um grupo (varredura sequencial)
      const findFreeSuffix = (gid) => {
        const group = activeGroupsRef.current[gid];
        const usedSuffixes = new Set();
        if (group && group.members) {
          group.members.forEach(pid => {
            const s = extractSuffix(pid);
            if (s) usedSuffixes.add(s);
          });
        }
        // Varredura sequencial: AA, AB, AC ... zz
        for (let i = 0; i < K10_CHARS.length; i++) {
          for (let j = 0; j < K10_CHARS.length; j++) {
            const candidate = K10_CHARS[i] + K10_CHARS[j];
            if (!usedSuffixes.has(candidate)) return candidate;
          }
        }
        return null; // grupo cheio — K10_MAX_GROUP (1800) atingido
      };

      // ═══════════════════════════════════════════════════════════════
      // K10 V24: GID Hierárquico + Lista Delta + Dominância Dinâmica
      // ═══════════════════════════════════════════════════════════════

      // Gera GID filho derivado do pai (herança do prefixo de 3 chars)
      // Pai "AbCd" → filho "AbCe", "AbCf" ... até esgotar → fallback sequencial
      const generateChildGid = (parentGid) => {
        if (!parentGid || parentGid.length < K10_GID_LEN) return nextSequentialGid();
        const prefix = parentGid.slice(0, K10_GID_LEN - 1);
        const siblings = new Set(
          Object.keys(activeGroupsRef.current)
            .filter(g => g.startsWith(prefix) && g.length === K10_GID_LEN)
            .map(g => g[K10_GID_LEN - 1])
        );
        for (const c of K10_CHARS) {
          if (!siblings.has(c)) return prefix + c;
        }
        return nextSequentialGid(); // todos 62 slots do prefixo ocupados
      };

      // Retorna todos os GIDs da mesma família (prefixo dos 3 primeiros chars)
      const findGroupFamily = (gid) => {
        const prefix = gid.slice(0, K10_GID_LEN - 1);
        return Object.keys(activeGroupsRef.current)
          .filter(g => g.startsWith(prefix) && g.length === K10_GID_LEN);
      };

      // Monta pex-family comprimido: base = sufixos em TODOS, branches = deltas por grupo
      // Retorna null se a família tiver só 1 membro (sem ganho de compressão)
      const buildFamilyPex = (referenceGid) => {
        const family = findGroupFamily(referenceGid);
        if (family.length < 2) return null;
        const memberSets = family.map(gid =>
          new Set(
            Array.from(activeGroupsRef.current[gid]?.members || new Set())
              .map(pid => extractSuffix(pid)).filter(Boolean)
          )
        );
        const base = [...memberSets[0]].filter(s => memberSets.every(set => set.has(s)));
        const branches = family.map((gid, i) => ({
          ext: gid[K10_GID_LEN - 1],
          delta: [...memberSets[i]].filter(s => !base.includes(s))
        }));
        return { type: 'pex-family', prefix: referenceGid.slice(0, K10_GID_LEN - 1), base, branches, ttl: 6 };
      };

      // FASE-2: diretório global de grupos no servidor
      // { [gid]: { size: number, reservados: string[], members: Set<peerId> } }
      // V23: GID inicial gerado dinamicamente (4 chars, 62-charset)
      const _initialGid = nextSequentialGid(); // 'AAAA' na primeira execução
      k10bin.registerGid(_initialGid); // V26: registra GID inicial no registry binário
      const activeGroupsRef = useRef({ [_initialGid]: { size: 0, reservados: [], members: new Set(), positions: [], serverCount: 0, serverPeers: [] } }); // V36: serverCount/serverPeers rastreiam servidores externos por grupo
      // FASE-2: mapeia peerId → groupId para decrementar ao desconectar
      const peerGroupMapRef = useRef(new Map());
      // V25: mapeia peerId → {gid, posIdx} para swap-on-leave eficiente
      const peerPositionMapRef = useRef(new Map());

      // V24: Verifica e executa troca de GID quando filho domina o pai em tamanho
      // Chamado após cada split e periodicamente pelo GC
      const checkAndPromote = (gidA, gidB) => {
        const ga = activeGroupsRef.current[gidA];
        const gb = activeGroupsRef.current[gidB];
        if (!ga || !gb) return;
        const sA = ga.members.size, sB = gb.members.size;
        if (sA === sB || Math.min(sA, sB) === 0) return;
        // Só troca se diferença for >20% para evitar flip-flop contínuo
        if (Math.abs(sA - sB) / Math.min(sA, sB) < 0.2) return;
        // Só troca entre grupos da mesma família (prefixo de 3 chars igual)
        if (gidA.slice(0, K10_GID_LEN - 1) !== gidB.slice(0, K10_GID_LEN - 1)) return;
        const [dominant, recessive] = sA > sB ? [gidA, gidB] : [gidB, gidA];
        // Swap no diretório
        const tmp = activeGroupsRef.current[dominant];
        activeGroupsRef.current[dominant] = activeGroupsRef.current[recessive];
        activeGroupsRef.current[recessive] = tmp;
        // Atualiza peerGroupMap
        peerGroupMapRef.current.forEach((gid, peer) => {
          if (gid === dominant) peerGroupMapRef.current.set(peer, recessive);
          else if (gid === recessive) peerGroupMapRef.current.set(peer, dominant);
        });
        // V26: gid-promote BINÁRIO (7 bytes vs ~80 bytes JSON)
        const binPromote = k10bin.encodeGidPromote(dominant, recessive, 8);
        const jsonPromote = {
          type: 'gid-promote',
          msgId: Date.now().toString(36) + Math.random().toString(36).slice(2),
          formerDominantGid: dominant,
          formerRecessiveGid: recessive,
          ttl: 8
        };
        k10BroadcastBinary(binPromote, jsonPromote);
        addAudit(`[K10-V26] Promoção GID binária: ${dominant} ↔ ${recessive} (${Math.max(sA,sB)} vs ${Math.min(sA,sB)} users)`, 'info');
      };

      // FIX BUG-I: seenMessagesRef crescia sem limite → memory leak grave no servidor
      // Mantém no máximo 2 000 entradas; ao ultrapassar, descarta a metade mais antiga (FIFO)
      const pruneSeenSrv = () => {
        const s = seenMessagesRef.current;
        if (s.size > 2000) {
          const keep = [...s].slice(-1000);
          seenMessagesRef.current = new Set(keep);
        }
      };

      
      // ── Estado do Quiz quando o SERVIDOR assume a transmissão ──
      const [serverQuizActive, setServerQuizActive] = useState(false);
      const serverQuizActiveRef = useRef(false);
      const srvQuizDisciplineRef = useRef('world');
      const srvQuizIntervalRef = useRef(SRV_MIN_QUIZ_INTERVAL);
      const srvLastQuizTimeRef = useRef(0);
      const srvQuizUsedImagesRef = useRef(new Set());
      const srvQuizTimerRef = useRef(null);
      const srvCurrentQuizRef = useRef(null);
      const srvWorldPlaceIdxRef = useRef(0);

      // V9: Garbage Collector para conexões WebRTC fantasmas (onde o evento on('close') não dispara)
      useEffect(() => {
        const ghostGcIv = setInterval(() => {
          activeConnectionsRef.current.forEach((conn, peerId) => {
            if (!conn.peerConnection) return;
            const state = conn.peerConnection.connectionState;
            if (state === 'failed' || state === 'closed' || state === 'disconnected') {
              addAudit(`[GhostGC] Peer fantasma [${peerId}] detectado e removido (${state})`, 'warn');
              try { conn.close(); } catch(e){}
              
              // Limpeza manual já que o evento close pode não disparar
              if (quizBotPeerRef.current === peerId) {
                quizBotPeerRef.current = null;
                activeConnectionsRef.current.forEach((c) => {
                  try { c.send({ type: 'quiz-bot-status', active: false }); } catch(e) {}
                });
              }
              
              // V25: swap-on-leave para manter positions[] contíguo
              const ghostPosInfo = peerPositionMapRef.current.get(peerId);
              if (ghostPosInfo) {
                const { gid: ghostGid, posIdx: ghostPosIdx } = ghostPosInfo;
                const ghostGroup = activeGroupsRef.current[ghostGid];
                if (ghostGroup && ghostGroup.positions) {
                  const oldLen = ghostGroup.positions.length;
                  if (oldLen > 0 && ghostPosIdx < oldLen) {
                    if (ghostPosIdx < oldLen - 1) {
                      // Move o último para o buraco
                      const lastPeer = ghostGroup.positions[oldLen - 1];
                      ghostGroup.positions[ghostPosIdx] = lastPeer;
                      peerPositionMapRef.current.set(lastPeer, { gid: ghostGid, posIdx: ghostPosIdx });
                      // FIX V25-BUG1 / V26: notifica peer movido — position-update BINÁRIO
                      const movedConn = activeConnectionsRef.current.get(lastPeer);
                      if (movedConn && movedConn.open) {
                        const binPosUpd = k10bin.encodePositionUpdate(ghostGid, ghostPosIdx);
                        const jsonPosUpd = { type: 'position-update', gid: ghostGid, user: K10_POSITION_LIST[ghostPosIdx] };
                        k10Send(movedConn, binPosUpd, jsonPosUpd);
                      }
                    }
                    ghostGroup.positions.pop();
                    // V26: broadcast pex-update BINÁRIO (7 bytes vs ~65 bytes JSON)
                    const newCount = ghostGroup.positions.length;
                    const binPexUpd = k10bin.encodePexUpdate(ghostGid, newCount, 6);
                    const jsonPexUpd = {
                      type: 'pex-update', gid: ghostGid,
                      user: K10_POSITION_LIST[oldLen - 1], ttl: 6,
                      msgId: Date.now().toString(36) + Math.random().toString(36).slice(2)
                    };
                    k10BroadcastBinary(binPexUpd, jsonPexUpd);
                  }
                  ghostGroup.members.delete(peerId);
                  ghostGroup.size = ghostGroup.positions.length;
                }
                peerPositionMapRef.current.delete(peerId);
              } else {
                // Fallback: remoção antiga (sem posição rastreada)
                const peerGroupId = peerGroupMapRef.current.get(peerId);
                if (peerGroupId && activeGroupsRef.current[peerGroupId]) {
                  activeGroupsRef.current[peerGroupId].size = Math.max(0, activeGroupsRef.current[peerGroupId].size - 1);
                  activeGroupsRef.current[peerGroupId].members.delete(peerId);
                }
              }
              
              peerGroupMapRef.current.delete(peerId);
              activeConnectionsRef.current.delete(peerId);
              
              setConnections(Array.from(activeConnectionsRef.current.keys()));
              setStats(prev => ({
                ...prev,
                activeConnections: activeConnectionsRef.current.size,
                hydraNodes: recentPeersRef.current.length
              }));
            }
          });
        }, 5000);
        return () => clearInterval(ghostGcIv);
      }, []);
      const srvQuizAllIdxRef = useRef(0);
      const HYDRA_THRESHOLD = 150;
      const CHUNK_SIZE = 16 * 1024;

      // ── Reconexão robusta ──────────────────────────────────────────────
      const reconnectAttemptsRef = useRef(0);
      const reconnectTimerRef    = useRef(null);
      const keepaliveTimerRef    = useRef(null);
      const isManualDisconnectRef = useRef(false); // distingue desconexão manual
      // FIX V36-ID-LOOP: bloqueia reconexão quando o ID está ocupado/inválido.
      // Sem esta flag, peer.on('close') — disparado pelo destroy() interno do
      // PeerJS após o abort — chama scheduleReconnect() com o MESMO ID tomado,
      // criando loop infinito. Resetada apenas ao alterar o ID.
      const isIdUnavailableRef = useRef(false);
      const MAX_RECONNECT_ATTEMPTS = 20; // circuit-breaker

      // ═══ V8-F10: GC periódico de members fantasmas em activeGroupsRef ═══
      useEffect(() => {
        const gc = setInterval(() => {
          try {
            const livePeers = new Set(activeConnectionsRef.current.keys());
            for (const gid in activeGroupsRef.current) {
              const g = activeGroupsRef.current[gid];
              if (!g || !g.members) continue;
              let removed = 0;
              for (const p of Array.from(g.members)) {
                if (!livePeers.has(p)) { g.members.delete(p); removed++; }
              }
              // V25: reconstrói positions[] com base nos membros vivos, mantendo ordem original
              if (Array.isArray(g.positions)) {
                const oldLen = g.positions.length;
                g.positions = g.positions.filter(p => livePeers.has(p));
                // Atualiza posIdx para cada peer restante
                g.positions.forEach((p, idx) => {
                  peerPositionMapRef.current.set(p, { gid, posIdx: idx });
                });
                // Remove do peerPositionMapRef os peers que foram removidos
                for (const p of Array.from(peerPositionMapRef.current.keys())) {
                  if (peerPositionMapRef.current.get(p)?.gid === gid && !g.positions.includes(p)) {
                    peerPositionMapRef.current.delete(p);
                  }
                }
                if (oldLen !== g.positions.length) {
                  addAudit(`[V25-GC] posições grupo ${gid}: ${oldLen}→${g.positions.length}`, 'info');
                  // FIX-AUDIT-SRV4 / V26: broadcast pex-update BINÁRIO para clientes corrigirem groupSize
                  const newLen = g.positions.length;
                  const gcBinPex = k10bin.encodePexUpdate(gid, newLen, 4);
                  const gcPexUpd = {
                    type: 'pex-update', gid,
                    user: K10_POSITION_LIST[newLen] || 'AA', ttl: 4,
                    msgId: 'gc_' + gid + '_' + Date.now().toString(36)
                  };
                  k10BroadcastBinary(gcBinPex, gcPexUpd);
                }
              }
              g.size = Math.max(0, g.members.size);
              g.reservados = (g.reservados || []).filter(p => livePeers.has(p)).slice(0, 10);
              if (removed > 0) addAudit(`[V8-F10] GC grupo ${gid}: -${removed} fantasmas, size=${g.size}`, 'warn');
              // V23: remove grupo vazio exceto o primeiro grupo da rede (índice 0 do gidCounter)
              const firstGid = Object.keys(activeGroupsRef.current)[0];
              if (g.members.size === 0 && gid !== firstGid) {
                delete activeGroupsRef.current[gid];
              }
            }
          } catch(e) { console.warn('[V8-F10] gc error', e); }
        }, 60000);
        return () => clearInterval(gc);
      }, []);

      const BASE_RECONNECT_DELAY   = 2000; // 2s inicial

      // ── V30: Protocolo server-mesh-update ────────────────────────────────────
      // A cada 30s, envia os peers locais para servidores vizinhos conhecidos.
      // Os vizinhos armazenam em meshPeersRef e os incluem no próximo group0-welcome.
      // Resultado: qualquer servidor pode fornecer peers de toda a rede ao novo usuário.
      useEffect(() => {
        const meshIv = setInterval(() => {
          // Coleta até 30 peers aleatórios dos grupos locais
          const allLocalPeers = Object.values(activeGroupsRef.current)
            .flatMap(g => Array.isArray(g.positions) ? g.positions : [])
            .filter(Boolean);
          if (allLocalPeers.length === 0) return;
          const sample = srvSecureShuffle([...allLocalPeers])
            .slice(0, 30);
          const meshMsg = { type: 'server-mesh-update', peers: sample };
          // Envia apenas para servidores conhecidos atualmente conectados
          knownServersRef.current.forEach(sid => {
            const sc = activeConnectionsRef.current.get(sid);
            if (sc && sc.open) {
              try { sc.send(meshMsg); } catch(e) {}
            }
          });
        }, 30000);
        return () => clearInterval(meshIv);
      }, []);
      // ── FIM V30: server-mesh-update ──────────────────────────────────────────

      // Backoff exponencial com jitter: 2s, 4s, 8s … até 60s
      const getBackoffDelay = (attempt) => {
        const exp = Math.min(BASE_RECONNECT_DELAY * Math.pow(2, attempt), 60000);
        return exp + Math.random() * 1000; // jitter de até 1s
      };

      // Cancela qualquer timer de reconexão pendente
      const clearReconnectTimer = () => {
        if (reconnectTimerRef.current) {
          clearTimeout(reconnectTimerRef.current);
          reconnectTimerRef.current = null;
        }
      };

      // Para o keepalive
      const stopKeepalive = () => {
        if (keepaliveTimerRef.current) {
          clearInterval(keepaliveTimerRef.current);
          keepaliveTimerRef.current = null;
        }
      };

      // ── K10 MONITOR: para e inicia envio de relatórios ────────────────────
      const stopMonitorReporting = () => {
        if (monitorTimerRef.current) {
          clearInterval(monitorTimerRef.current);
          monitorTimerRef.current = null;
        }
      };

      const startMonitorReporting = () => {
        stopMonitorReporting();
        const sendToMonitor = () => {
          const mid = K10_MONITOR_ID;
          const p = peerInstance.current;
          if (!p || p.destroyed) return;
          try {
            const conn = p.connect(mid, { reliable: true });
            conn.on('open', () => {
              try {
                // Heartbeat do servidor — grupos são reportados pelos próprios clientes
                conn.send({ t: 's', id: peerIdRef.current });
              } catch(e) {}
              setTimeout(() => { try { conn.close(); } catch(e) {} }, 4000);
            });
            conn.on('error', () => {});
          } catch(e) {}
        };
        sendToMonitor(); // disparo imediato
        monitorTimerRef.current = setInterval(sendToMonitor, 30000);
      };

      // Keepalive: envia um ping ao servidor PeerJS a cada 25s para evitar timeout silencioso
      const startKeepalive = () => {
        stopKeepalive(); stopMonitorReporting();
        keepaliveTimerRef.current = setInterval(() => {
          const p = peerInstance.current;
          if (p && !p.destroyed && !p.disconnected) {
            // FIX S-9: p.socket._socket era API privada inexistente no PeerJS 1.5+ → código morto + erro silencioso.
            // PeerJS 1.5+ já faz keep-alive automático via pingInterval:5000 configurado no new Peer(). Linha removida.
            // Também detecta conexões mortas e remove
            activeConnectionsRef.current.forEach((conn, id) => {
              try {
                const state = conn.peerConnection && conn.peerConnection.connectionState;
                if (state === 'failed' || state === 'closed') {
                  console.warn(`Keepalive: removendo conexão morta ${id}`);
                  activeConnectionsRef.current.delete(id);
                  setConnections(Array.from(activeConnectionsRef.current.keys()));
                }
              } catch(e) {}
            });
          } else if (p && p.disconnected && !p.destroyed) {
            // peer desconectado — scheduleReconnect será chamado
            scheduleReconnect();
          }
        }, 25000);
      };

      // Ref para sempre ter o peerId mais recente dentro dos closures dos timers
      const peerIdRef = useRef(peerId);
      useEffect(() => { peerIdRef.current = peerId; }, [peerId]);

      // Agenda reconexão com backoff – único ponto de entrada para retentativas
      const scheduleReconnect = () => {
        if (isManualDisconnectRef.current) return;
        clearReconnectTimer();

        if (reconnectAttemptsRef.current >= MAX_RECONNECT_ATTEMPTS) {
          console.error(`Circuit-breaker: ${MAX_RECONNECT_ATTEMPTS} tentativas falharam. Desistindo.`);
          setConnectionStatus('errorFatal');
          stopKeepalive(); stopMonitorReporting();
          return;
        }

        const delay = getBackoffDelay(reconnectAttemptsRef.current);
        reconnectAttemptsRef.current += 1;
        addAudit(`🔄 Reconectando em ${(delay/1000).toFixed(1)}s (tentativa ${reconnectAttemptsRef.current}/${MAX_RECONNECT_ATTEMPTS})`, 'warn');
        setConnectionStatus(`reconnecting (${reconnectAttemptsRef.current}/${MAX_RECONNECT_ATTEMPTS})`);

        reconnectTimerRef.current = setTimeout(() => {
          const p = peerInstance.current;
          if (p && !p.destroyed) {
            try {
              p.reconnect();
              return;
            } catch(e) {
              console.warn("p.reconnect() falhou, recriando peer:", e);
            }
          }
          // Se reconnect() falhar ou peer estiver destruído, recria do zero
          setupPeer();
        }, delay);
      };

      useEffect(() => {
        if (messagesEndRef.current) {
          messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
        }
      }, [messages]);

      const toggleConnection = () => {
        if (connectionStatus === 'connected' || connectionStatus.startsWith('reconnecting') || connectionStatus === 'connecting') {
          disconnectPeer();
        } else {
          isIdUnavailableRef.current = false; // FIX V36-ID-LOOP: reseta ao tentar reconectar manualmente
          isManualDisconnectRef.current = false;
          reconnectAttemptsRef.current = 0;
          setupPeer();
        }
      };

      const disconnectPeer = () => {
        isManualDisconnectRef.current = true; // impede reconexão automática
        clearReconnectTimer();
        stopKeepalive(); stopMonitorReporting();
        if (peerInstance.current) {
          try {
            // desconexão manual
            activeConnectionsRef.current.forEach((conn) => {
              try { conn.close(); } catch (e) {}
            });
            activeConnectionsRef.current.clear();
            setConnections([]);
            peerInstance.current.destroy();
            peerInstance.current = null;
            setConnectionStatus('disconnected');
            setStats({ messagesReceived: 0, messagesDistributed: 0, activeConnections: 0, hydraNodes: 0 });
            // peer destruído com sucesso
          } catch (err) {
            console.error("Erro ao desconectar peer:", err);
          }
        }
      };

      // ── K10 Elite Entropy System (CSPRNG + Anti-Bias Buffer) ──
      const SRV_ENTROPY_SIZE = 128;
      const srvEntropyBuffer = new Uint32Array(SRV_ENTROPY_SIZE);
      let srvEntropyIndex = SRV_ENTROPY_SIZE;
      const srvRefillEntropy = () => { window.crypto.getRandomValues(srvEntropyBuffer); srvEntropyIndex = 0; };
      const srvSecureRandomInt = (max) => {
        const maxUint32 = 0xFFFFFFFF;
        const limit = maxUint32 - (maxUint32 % max);
        let rand;
        do {
          if (srvEntropyIndex >= SRV_ENTROPY_SIZE) srvRefillEntropy();
          rand = srvEntropyBuffer[srvEntropyIndex++];
        } while (rand >= limit);
        return rand % max;
      };
      const srvSecureShuffle = (array) => {
        for (let i = array.length - 1; i > 0; i--) {
          const j = srvSecureRandomInt(i + 1);
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      };

      // FIX V36-STUN: pool reduzido a servidores STUN verificados e ativos.
      // A lista anterior continha ~90 entradas inválidas (domínios corporativos genéricos
      // que não são servidores STUN reais), causando até 15s de latência extra por timeouts
      // ICE desnecessários. Mantidos: 5 Google (confiabilidade máxima) + 7 alternativos
      // verificados como ativos (stunprotocol.org, ekiga.net, etc.).
      const getK10StunPool = () => {
        const pool = [
          "stun:stun.l.google.com:19302",
          "stun:stun1.l.google.com:19302",
          "stun:stun2.l.google.com:19302",
          "stun:stun3.l.google.com:19302",
          "stun:stun4.l.google.com:19302",
          "stun:stun.stunprotocol.org:3478",
          "stun:stun.ekiga.net",
          "stun:stun.voipbuster.com",
          "stun:stun.sipgate.net",
          "stun:stun.linphone.org",
          "stun:stun.gmx.de",
          "stun:stun.sip.us"
        ];
        srvSecureShuffle(pool);
        return pool.slice(0, 5).map(url => ({ urls: url }));
      };

      const setupPeer = () => {
        // BUG S-1 FIX: usamos peerIdRef.current em vez de peerId (closure) para que
        // handleIdChange funcione corretamente após setPeerId() assincrônico.
        const currentId = peerIdRef.current;
        if (!currentId) return;
        if (isManualDisconnectRef.current) return; // respeita desconexão manual

        // setupPeer: currentId carregado
        setConnectionStatus('connecting');
        stopKeepalive(); stopMonitorReporting();
        clearReconnectTimer();
        
        if (peerInstance.current) {
          try { peerInstance.current.destroy(); } catch (err) {}
          peerInstance.current = null;
        }
        
        const peer = new Peer(currentId, {
          ...window.K10_SIG,
          pingInterval: 5000, // PeerJS interno: ping a cada 5s
          config: {
            iceServers: [
              ...getK10StunPool(),
              // ⚠️ BUG-4 WARNING: These are public demo TURN credentials with no SLA.
              // Voice/video calls behind strict NAT may fail in production.
              // For reliability, replace with your own credentials:
              // Free tier: https://dashboard.metered.ca/  (sign up → create app → copy credentials)
              { urls: 'turn:openrelay.metered.ca:80',                username: 'openrelayproject', credential: 'openrelayproject' },
              { urls: 'turn:openrelay.metered.ca:443',               username: 'openrelayproject', credential: 'openrelayproject' },
              { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
              { urls: 'turn:openrelay.metered.ca:80?transport=tcp',  username: 'openrelayproject', credential: 'openrelayproject' }
            ]
          },
          debug: 1
        });

        peer.on('open', (id) => {
          reconnectAttemptsRef.current = 0; // reset do circuit-breaker ao conectar
          setConnectionStatus('connected');
          addAudit(`✅ Servidor online: ${id}`, 'ok');
          startKeepalive();
          startMonitorReporting();
          
          // FIX: usa ref para evitar stale closure – knownServers pode estar desatualizado
          knownServersRef.current.forEach(serverId => {
            if (serverId !== id) {
              addAudit(`🔗 Auto-conectando a: ${serverId}`, 'info');
              const conn = peer.connect(serverId);
              setupConnection(conn);
            }
          });
        });

        peer.on('connection', (conn) => {
          // FIX-AUDIT-SRV-HYDRA: cap de conexões também no modo Hydra
          // Sem este guard, modo Hydra aceitava conexões ilimitadas → DoS por esgotamento de memória
          const MAX_HYDRA_CONNECTIONS = 5000; // Aumentado para suportar fluxo massivo no modo Roteador
          
          if (isHydraModeRef.current || routerModeRef.current) {
            if (recentPeersRef.current.length >= MAX_HYDRA_CONNECTIONS) {
              setTimeout(() => { try { conn.close(); } catch (e) {} }, 200);
              return;
            }
            setupConnection(conn);
            return;
          }

          if (activeConnectionsRef.current.size >= maxConnRef.current) {
            setTimeout(() => { try { conn.close(); } catch (e) {} }, 500);
            return;
          }
          
          setupConnection(conn);
        });

        // ── Tratamento robusto de erros ──────────────────────────────────
        peer.on('error', (err) => {
          console.error("Erro no peer:", err.type, err);
          addAudit(`❌ Erro PeerJS: ${err.type}`, 'err');

          // Erros FATAIS: não adianta reconectar com o mesmo ID
          if (err.type === 'unavailable-id' || err.type === 'invalid-id') {
            isIdUnavailableRef.current = true; // FIX V36-ID-LOOP: bloqueia peer.on('close') de reconectar
            setConnectionStatus('errorIdUnavailable');
            addAudit('⛔ ID indisponível ou inválido — altere o ID', 'err');
            stopKeepalive(); stopMonitorReporting();
            return;
          }

          // Erros de peer remoto não afetam o servidor em si
          if (err.type === 'peer-unavailable') {
            console.warn("Peer remoto indisponível:", err.message);
            addAudit(`⚠️ Peer remoto indisponível: ${err.message}`, 'warn');
            return; // não reconecta – o servidor continua de pé
          }

          // Erros de REDE / SERVIDOR – reconecta automaticamente
          setConnectionStatus('error');
          if (!isManualDisconnectRef.current) {
            scheduleReconnect();
          }
        });

        // Sinalização desconectou (não o peer em si) – tenta reconectar
        peer.on('disconnected', () => {
          if (isManualDisconnectRef.current) return;
          // sinalização perdida — scheduleReconnect
          addAudit('⚠️ Sinalização perdida — reconectando…', 'warn');
          setConnectionStatus('reconnecting');
          scheduleReconnect();
        });

        // Peer completamente fechado (raro, mas tratado)
        peer.on('close', () => {
          if (isManualDisconnectRef.current) return;
          // FIX V36-ID-LOOP: se o close veio de um abort por ID ocupado/inválido,
          // NÃO reconecta — reconectar usaria o mesmo ID e criaria loop infinito.
          if (isIdUnavailableRef.current) {
            peerInstance.current = null;
            return;
          }
          addAudit('🔄 Peer fechou — recriando…', 'warn');
          stopKeepalive(); stopMonitorReporting();
          peerInstance.current = null;
          scheduleReconnect();
        });

        peerInstance.current = peer;
      };

      // ── Reconecta quando a internet voltar ──────────────────────────────
      useEffect(() => {
        const handleOnline = () => {
          // rede online
          if (!isManualDisconnectRef.current) {
            const p = peerInstance.current;
            const isOk = p && !p.destroyed && !p.disconnected;
            if (!isOk) {
              // reconectando após rede voltar
              reconnectAttemptsRef.current = 0;
              setupPeer();
            }
          }
        };
        window.addEventListener('online', handleOnline);
        return () => window.removeEventListener('online', handleOnline);
      }, [peerId]);

      useEffect(() => {
        // Monitora saúde da conexão a cada 15s – funciona em TODOS os estados (inclusive 'error')
        // FIX BUG-1: guards now use the same English strings that setConnectionStatus() actually writes
        if (connectionStatus === 'disconnected' || connectionStatus === 'errorFatal') return;
        
        const checkConnectionInterval = setInterval(() => {
          const p = peerInstance.current;

          // Se estiver no estado 'error' aguarda o scheduleReconnect atuar
          if (connectionStatus.startsWith('error')) return;

          if (p && p.disconnected && !p.destroyed) {
            // monitor: peer desconectado
            if (!isManualDisconnectRef.current) scheduleReconnect();
          }
          
          // Limpeza de heartbeats antigos (> 45s)
          const now = Date.now();
          let changed = false;
          heartbeatsRef.current.forEach((time, id) => {
            if (now - time > 45000) {
              heartbeatsRef.current.delete(id);
              worldQuizNodesRef.current.delete(id);
              changed = true;
            }
          });
          if (changed) setStats(prev => ({ ...prev, hydraNodes: heartbeatsRef.current.size }));
          
          // Broadcast de estatísticas para todos os conectados
          const statsMsg = {
            type: 'network-stats',
            totalOnline: heartbeatsRef.current.size,
            timestamp: now,
            worldQuizNodes: Array.from(worldQuizNodesRef.current)
          };
          activeConnectionsRef.current.forEach(conn => { try { conn.send(statsMsg); } catch(e) {} });
          
        }, 15000);

        return () => clearInterval(checkConnectionInterval);
      }, [connectionStatus]);

      const handleIdChange = (newId) => {
        disconnectPeer();
        // Após limpar, reconecta automaticamente com o novo ID
        // FIX V36-ID-LOOP: reseta a flag de ID ocupado para permitir nova tentativa
        setTimeout(() => {
          isIdUnavailableRef.current = false;
          isManualDisconnectRef.current = false;
          reconnectAttemptsRef.current = 0;
          setupPeer();
        }, 600);
      };

      const broadcastMyYoutubeVideo = () => {
        const url = prompt('Digite a URL do vídeo do YouTube para transmitir:');
        if (!url) return;
        
        let finalYoutubeId = '';
        try {
          const parsedUrl = new URL(url);
          if (parsedUrl.hostname === 'youtu.be') {
            finalYoutubeId = parsedUrl.pathname.slice(1);
          } else if (parsedUrl.hostname.includes('youtube.com')) {
            if (parsedUrl.pathname === '/playlist') {
              const list = parsedUrl.searchParams.get('list');
              if (list) finalYoutubeId = `playlist:${list}`;
            } else if (parsedUrl.pathname === '/watch') {
              const v = parsedUrl.searchParams.get('v');
              const list = parsedUrl.searchParams.get('list');
              if (list) {
                finalYoutubeId = `playlist:${list}`;
              } else if (v) {
                finalYoutubeId = v;
              }
            } else if (parsedUrl.pathname.startsWith('/embed/')) {
              finalYoutubeId = parsedUrl.pathname.split('/')[2];
            }
          }
        } catch (e) {}

        if (!finalYoutubeId) {
          const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
          const match = url.match(regExp);
          if (match && match[2].length === 11) {
            finalYoutubeId = match[2];
          }
        }

        if (!finalYoutubeId) {
          alert('URL do YouTube inválida');
          return;
        }

        const serverId = peerInstance.current ? peerInstance.current.id : 'SERVER';
        const startTime = Date.now() + 5000; // 5s delay for sync
        const duration = 300; // 5 minutes limit
        const radioId = serverId + '_yt_' + Date.now();
        const msg = { 
          type: 'radio-youtube-start', 
          id: radioId + '_start', 
          radioId,
          youtubeId: finalYoutubeId, 
          startTime,
          duration,
          sender: serverId,
          senderName: t(lang, 'serverName'),
          ttl: 15 
        };
        
        setYoutubeBroadcasts(prev => ({ ...prev, [serverId]: { videoId: finalYoutubeId, senderName: t(lang, 'serverName') } }));
        distributeMessage(msg, null);
      };

      const stopMyYoutubeVideo = () => {
        const pId = peerInstance.current ? peerInstance.current.id : 'SERVER';
        const msg = { 
          type: 'radio-youtube-stop', 
          id: pId + '_stop_yt_video_' + Date.now(), 
          sender: pId,
          senderName: t(lang, 'serverName'),
          ttl: 15 
        };
        
        setYoutubeBroadcasts(prev => {
          const next = { ...prev };
          delete next[pId];
          return next;
        });
        distributeMessage(msg, null);
      };

      const handleIncomingData = (data, sourceConn) => {
        // ── V30: server-mesh-update — recebe peers de servidor vizinho ────────
        if (data && data.type === 'server-mesh-update') {
          if (Array.isArray(data.peers)) {
            const incoming = data.peers
              .filter(p => typeof p === 'string' && p.length >= 3 && p !== peerIdRef.current)
              .slice(0, 50);
            const merged = [...new Set([...meshPeersRef.current, ...incoming])];
            // Cap: mantém no máximo 200 peers no mesh cache
            // FIX V36-MESH-CSPRNG: substituído Math.random() por srvSecureShuffle (CSPRNG)
            // para que a seleção de peers não seja previsível por observadores externos.
            meshPeersRef.current = merged.length > 200
              ? srvSecureShuffle([...merged]).slice(0, 200)
              : merged;
            addAudit(`[Mesh] +${incoming.length} peers de ${sourceConn.peer} → cache=${meshPeersRef.current.length}`, 'info');
          }
          return;
        }
        // ── FIM V30: server-mesh-update ───────────────────────────────────────

        // Handle Heartbeat from any user (even if not directly connected long-term)
        if (data && data.type === 'heartbeat') {
          heartbeatsRef.current.set(sourceConn.peer, Date.now());
          if (data.worldQuizAtivo) {
            worldQuizNodesRef.current.add(sourceConn.peer);
          } else {
            worldQuizNodesRef.current.delete(sourceConn.peer);
          }
          setStats(prev => ({
            ...prev,
            hydraNodes: heartbeatsRef.current.size
          }));
          
          // Responde com as estatísticas para que o nó saiba quem são os distribuidores
          try {
            sourceConn.send({
              type: 'network-stats',
              totalOnline: heartbeatsRef.current.size,
              timestamp: Date.now(),
              worldQuizNodes: Array.from(worldQuizNodesRef.current)
            });
          } catch(e) {}
          
          // If it's just a heartbeat and we are in Hydra Mode, we can close the connection to save resources
          if (isHydraModeRef.current) {
            setTimeout(() => {
              try { sourceConn.close(); } catch(e) {}
            }, 1000);
          }
          return;
        }

        // Se estiver no modo Hydra, ignora qualquer mensagem de chat/dados
        if (isHydraModeRef.current) return;

        // FIX-AUDIT-SRV2: log mínimo — não loga conteúdo de mensagens (privacidade)
        // console.log(`[SRV] tipo:${data.type} de:${sourceConn.peer}`);
        
        if (data.type === 'pex') {
          // V23 S-10: PEX comprimido — data.gid (4 chars) + data.users ([2 chars each])
          // Mantém compatibilidade com formato antigo (data.groupId) para transição suave
          const gid = data.gid || data.groupId;
          if (gid) {
            if (!activeGroupsRef.current[gid]) {
              activeGroupsRef.current[gid] = { size: 0, reservados: [], members: new Set(), positions: [] };
            }
            const g = activeGroupsRef.current[gid];
            if (!g.positions) g.positions = [];
            // Reconstrói peerId completo para registrar no members
            if (data.peerId) {
              g.members.add(data.peerId);
            } else if (data.suffix) {
              // V23: sender informa seu sufixo; reconstrói peerId
              g.members.add(buildPeerId(gid, data.suffix));
            }
            // V25: se veio count, atualiza size
            if (data.count !== undefined) {
              g.size = Math.max(g.size, data.count);
            } else if (Array.isArray(data.users)) {
              // Compatibilidade V24: lista comprimida de usuários
              data.users.forEach(s => {
                if (typeof s === 'string' && s.length === K10_SUFFIX_LEN) {
                  g.members.add(buildPeerId(gid, s));
                }
              });
              const reportedSize = data.groupSize !== undefined ? data.groupSize : data.users.length;
              g.size = Math.max(reportedSize, g.members.size);
            }
            if (data.isReservado && (data.peerId || data.suffix)) {
              const reservadoPid = data.peerId || buildPeerId(gid, data.suffix);
              const set = new Set(g.reservados);
              set.add(reservadoPid);
              g.reservados = [...set].slice(0, 10);
            }
          }
          return; // Servidor não precisa processar PEX de clientes além disso
        }

        // V25: pex-update — relay compacto de saída de peer
        // { type:'pex-update', gid, user, ttl, msgId }
        // 'user' = sufixo da última posição que "saiu" → K10_POSITION_LIST.indexOf(user) = nova contagem
        if (data.type === 'pex-update') {
          if (!data.id) data = { ...data, id: data.msgId || (sourceConn.peer + '_pexupd_' + Date.now()) };
          if (seenMessagesRef.current.has(data.id)) return;
          seenMessagesRef.current.add(data.id); pruneSeenSrv();
          // Atualiza contagem local do grupo
          if (data.gid && data.user) {
            const newCount = K10_POSITION_LIST.indexOf(data.user);
            if (newCount >= 0 && activeGroupsRef.current[data.gid]) {
              activeGroupsRef.current[data.gid].size = Math.min(
                activeGroupsRef.current[data.gid].size,
                newCount
              );
            }
          }
          // Relay com TTL decrementado
          if ((data.ttl || 0) > 0) {
            distributeMessage({ ...data, ttl: data.ttl - 1 }, sourceConn.peer);
          }
          return;
        }

        // ═══ V8-BUG#2: directory-announce — servidor escuta para diretório global ═══
        if (data.type === 'directory-announce') {
          if (!data.groupId || typeof data.groupId !== 'string' || data.groupId.length > 50) return;
          if (data.msgId && seenMessagesRef.current.has(data.msgId)) return;
          if (data.msgId) { seenMessagesRef.current.add(data.msgId); pruneSeenSrv(); } // FIX BUG-I
          if (!activeGroupsRef.current[data.groupId]) {
            // FIX-AUDIT-SRV3: sempre inicializa com positions:[] para evitar inconsistência no GC V25
            activeGroupsRef.current[data.groupId] = { size: 0, reservados: [], members: new Set(), positions: [] };
          }
          const g = activeGroupsRef.current[data.groupId];
          if (typeof data.groupSize === 'number' && data.groupSize >= 0 && data.groupSize <= 100000) {
            g.size = Math.max(g.size, data.groupSize, g.members.size);
          }
          if (Array.isArray(data.reservados)) {
            const set = new Set([...g.reservados, ...data.reservados.filter(x => typeof x === 'string').slice(0, 10)]);
            g.reservados = [...set].slice(0, 10);
          }
          // Re-broadcast para outros peers conectados (relay com TTL decrementado)
          const ttl = (data.ttl || 0) - 1;
          if (ttl > 0) {
            const relay = { ...data, ttl };
            activeConnectionsRef.current.forEach((c, pid) => {
              if (pid !== sourceConn.peer && c.open) try { c.send(relay); } catch(e) {}
            });
          }
          return;
        }

        // ═══ V8-BUG#2: group-split / group-merge — servidor relay + atualiza diretório ═══
        if (data.type === 'group-split') {
          addAudit(`[Hydra] Split: ${data.oldGroupId} gerou ${data.newGroupId}`, 'info');
          if (data.msgId && seenMessagesRef.current.has(data.msgId)) return;
          if (data.msgId) { seenMessagesRef.current.add(data.msgId); pruneSeenSrv(); } // FIX BUG-I
          if (data.newGroupId && !activeGroupsRef.current[data.newGroupId]) {
            // FIX-AUDIT-SRV3: positions:[] obrigatório
            activeGroupsRef.current[data.newGroupId] = { size: 0, reservados: Array.isArray(data.migratedReservados) ? data.migratedReservados.slice(0,10) : [], members: new Set(), positions: [] };
          }
          const ttl = (data.ttl || 0) - 1;
          if (ttl > 0) {
            const relay = { ...data, ttl };
            activeConnectionsRef.current.forEach((c, pid) => {
              if (pid !== sourceConn.peer && c.open) try { c.send(relay); } catch(e) {}
            });
          }
          // V24: verifica dominância entre o grupo original e o novo após split
          if (data.oldGroupId && data.newGroupId) {
            setTimeout(() => checkAndPromote(data.oldGroupId, data.newGroupId), 5000);
          }
          return;
        }
        if (data.type === 'group-merge') {
          addAudit(`[Hydra] Merge: ${data.absorbedGroupId} absorvido por ${data.survivingGroupId}`, 'info');
          if (data.msgId && seenMessagesRef.current.has(data.msgId)) return;
          if (data.msgId) { seenMessagesRef.current.add(data.msgId); pruneSeenSrv(); } // FIX BUG-I
          const { survivingGroupId, absorbedGroupId } = data;
          if (survivingGroupId && absorbedGroupId && activeGroupsRef.current[absorbedGroupId]) {
            // FIX-AUDIT-SRV3: positions:[] obrigatório em criação via merge
            const surv = activeGroupsRef.current[survivingGroupId] || (activeGroupsRef.current[survivingGroupId] = { size: 0, reservados: [], members: new Set(), positions: [] });
            const abs = activeGroupsRef.current[absorbedGroupId];
            // merge members
            abs.members.forEach(p => surv.members.add(p));
            const mergedR = new Set([...surv.reservados, ...abs.reservados]);
            surv.reservados = [...mergedR].slice(0, 10);
            // V8: groupSize = MAX (idempotente)
            surv.size = Math.max(surv.size, surv.members.size, (surv.size || 0) + (abs.size || 0));
            // remap peerGroupMap
            abs.members.forEach(p => peerGroupMapRef.current.set(p, survivingGroupId));
            delete activeGroupsRef.current[absorbedGroupId];
          }
          const ttl = (data.ttl || 0) - 1;
          if (ttl > 0) {
            const relay = { ...data, ttl };
            activeConnectionsRef.current.forEach((c, pid) => {
              if (pid !== sourceConn.peer && c.open) try { c.send(relay); } catch(e) {}
            });
          }
          return;
        }

        // V24: gid-promote — relay do servidor para todos os peers
        if (data.type === 'gid-promote') {
          if (data.msgId && seenMessagesRef.current.has(data.msgId)) return;
          if (data.msgId) { seenMessagesRef.current.add(data.msgId); pruneSeenSrv(); }
          addAudit(`[K10-V24] Relay gid-promote: ${data.formerDominantGid} ↔ ${data.formerRecessiveGid}`, 'info');
          const ttlP = (data.ttl || 0) - 1;
          if (ttlP > 0) {
            const relay = { ...data, ttl: ttlP };
            activeConnectionsRef.current.forEach((c, pid) => {
              if (pid !== sourceConn.peer && c.open) try { c.send(relay); } catch(e) {}
            });
          }
          return;
        }

        // V24: pex-family — relay do servidor para peers da família
        if (data.type === 'pex-family') {
          if (!data.prefix || typeof data.prefix !== 'string') return;
          const ttlF = (data.ttl || 0) - 1;
          if (ttlF > 0) {
            const relay = { ...data, ttl: ttlF };
            activeConnectionsRef.current.forEach((c, pid) => {
              if (pid !== sourceConn.peer && c.open) {
                const peerGid = peerGroupMapRef.current.get(pid);
                if (peerGid && peerGid.startsWith(data.prefix)) {
                  try { c.send(relay); } catch(e) {}
                }
              }
            });
          }
          return;
        }

        // ── Quiz Bot: controle de slot único por servidor ────────────────
        if (data.type === 'subscribe-world-quiz') {
          addAudit(`[Quiz] Usuário ${sourceConn.peer} inscrito no Quiz Mundial`, 'info');
          // O servidor apenas repassa essa mensagem para o distribuidor correto
          const distributorConn = activeConnectionsRef.current.get(data.distributorId);
          if (distributorConn) {
            try { distributorConn.send(data); } catch(e) {}
          }
          return;
        }

        if (data.type === 'quiz-bot-start') {
          // Se o SERVIDOR estava transmitindo: cede o controle ao usuário
          // (para timer, limpa estado, mas NÃO anuncia status:false — o owner muda direto)
          if (serverQuizActiveRef.current) {
            serverQuizActiveRef.current = false;
            setServerQuizActive(false);
            if (srvQuizTimerRef.current) { clearTimeout(srvQuizTimerRef.current); srvQuizTimerRef.current = null; }
            srvCurrentQuizRef.current = null;
            // FIX BUG-2: marca timestamp agora para cooldown ficar correto
            // quando/se o servidor retomar depois
            srvLastQuizTimeRef.current = Date.now();
          }
          quizBotPeerRef.current = sourceConn.peer;
          // Notifica TODOS os conectados que o bot está ativo
          activeConnectionsRef.current.forEach((c, id) => {
            try { c.send({ type: 'quiz-bot-status', active: true, owner: sourceConn.peer }); } catch(e) {}
          });
          return;
        }
        if (data.type === 'quiz-bot-stop') {
          if (quizBotPeerRef.current === sourceConn.peer) {
            quizBotPeerRef.current = null;
            activeConnectionsRef.current.forEach((c) => {
              try { c.send({ type: 'quiz-bot-status', active: false }); } catch(e) {}
            });
          }
          return;
        }
        // ── HANDOFF: usuário desligou bot e nos passa o estado pra continuar ──
        if (data.type === 'quiz-handoff') {
          handleQuizHandoff(data, sourceConn.peer);
          return;
        }

        if (data.type === 'message' || data.type === 'torrent-request') {
          // FIX V35-TTL-PRECHECK: descartar TTL=0 ANTES de qualquer processamento.
          // Impede que a mensagem ocupe slot em seenMessages, entre no histórico
          // local ou chegue a distributeMessage por qualquer caminho (incluindo mesh).
          if (data.type === 'message') {
            const _preTtl = data.ttl !== undefined ? parseInt(data.ttl) || 0 : 8;
            if (_preTtl <= 0) return; // descarte silencioso — não loga, não armazena
          }

          if (data.id) {
            if (seenMessagesRef.current.has(data.id)) {
              return; // FIX-AUDIT-SRV: não logar anti-loop, evita spam de log
            }
            seenMessagesRef.current.add(data.id);
            pruneSeenSrv(); // FIX BUG-I: substitui purga manual por pruneSeenSrv() consistente
          }

          if (data.type === 'message') {
            // Role Tracking Global: se é um quiz de um usuário, atualiza cooldown do servidor
            if (data.text === '__QUIZ__' && data.quizPayload) {
              srvLastQuizTimeRef.current = Date.now();
            }
            
            if (data.text && data.text.length > 2000) {
              return; // FIX-AUDIT-SRV: descartar silenciosamente — não logar conteúdo
            }
            setStats(prev => ({
              ...prev,
              messagesReceived: prev.messagesReceived + 1
            }));

            // FIX-AUDIT-SRV5: limitar senderName a 60 chars — previne OOM por string gigante
            const senderName = String(data.senderName || sourceConn.peer).slice(0, 60);
            
            const newMessage = {
              id: data.id || (Date.now() + Math.random().toString(36).substring(2)),
              text: data.text,
              sender: senderName,
              timestamp: new Date().toISOString(),
              source: sourceConn.peer
            };
            
            setMessages(prev => [...prev, newMessage].slice(-100));
          }
          
          distributeMessage(data, sourceConn.peer);
        }
        else if (data.type === 'radio-start' || data.type === 'radio-stream-start' || data.type === 'radio-chunk' || data.type === 'radio-sync' || data.type === 'radio-request-sync') {
          if (!data.id) data = { ...data, id: Date.now() + Math.random().toString(36).substring(2) };
          if (seenMessagesRef.current.has(data.id)) return;
          seenMessagesRef.current.add(data.id); pruneSeenSrv(); // FIX BUG-I
          
          if (data.type === 'radio-start' || data.type === 'radio-stream-start' || data.type === 'radio-sync') {
            radioStateRef.current = {
              status: 'playing',
              radioType: data.type === 'radio-stream-start' || data.radioType === 'stream' ? 'stream' : 'file',
              startTime: data.startTime,
              duration: data.duration,
              fileName: data.fileName,
              senderName: data.senderName,
              streamUrl: data.streamUrl
            };
          }
          
          // O Servidor também atua como um relay para a rádio
          distributeMessage(data, sourceConn.peer);
        }
        else if (data.type === 'audio-start' || data.type === 'audio-chunk') {
          if (data.type === 'audio-start' && data.audioSize > 2 * 1024 * 1024) {
            return; // áudio muito longo — descartado silenciosamente
          }
          // FIX BUG-E: garante ID para dedup sempre funcionar, mesmo em chunks sem ID
          if (!data.id) data = { ...data, id: sourceConn.peer + '_' + data.type + '_' + (data.audioId || '') + '_' + (data.offset || 0) };
          if (seenMessagesRef.current.has(data.id)) return;
          seenMessagesRef.current.add(data.id); pruneSeenSrv(); // FIX BUG-I
          distributeMessage(data, sourceConn.peer);
        }
        else if (data.type === 'file-start' || data.type === 'file-chunk') {
          return; // Servidor só repassa texto, torrents e áudio — arquivos bloqueados
        }
        else if (data.type === 'e2ee-secret' || data.type === 'server-e2ee-invite' || data.type === 'youtube-cam-start' || data.type === 'youtube-cam-stop' || data.type === 'youtube-chat-start' || data.type === 'radio-youtube-start' || data.type === 'radio-youtube-stop' || data.type === 'radio-world-start' || data.type === 'radio-world-stop') {
           // Relay para segredos E2EE, YouTube Cam, YouTube Chat e Radio YouTube
           // FIX BUG-G: garante ID para dedup sempre funcionar
           if (!data.id) data = { ...data, id: sourceConn.peer + '_' + data.type + '_' + Date.now() };
           if (seenMessagesRef.current.has(data.id)) return;
