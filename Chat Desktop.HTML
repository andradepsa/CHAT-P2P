<div className="emoji-panel-header">{t(lang, 'emojis')}</div>
<div className="emoji-panel-content">{emojis.map((e, i) => <span key={i} className="emoji-item" onClick={() => setNewMessage(prev => prev + e)}>{e}</span>)}</div>
<div className="emoji-panel-footer">{t(lang, 'scrollMore')}</div>
</div>
);
};


const generateInviteLink = () => {
if (!peerId) return;
const activePeers = connections.filter(c => c.open && c.peer !== peerId).map(c => c.peer);
const allIds = [peerId, ...activePeers].slice(0, 196);
const url = new URL(window.location.href);
url.searchParams.set('portas', allIds.join(','));
const finalUrl = url.toString();
navigator.clipboard.writeText(finalUrl);
prompt(t(lang, 'inviteLinkCopied'), finalUrl);
};


return (
<div>
{showTutorial && <TutorialModal lang={lang} onClose={() => setShowTutorial(false)} />}
{showWorldRadios && <WorldRadiosModal lang={lang} onClose={() => setShowWorldRadios(false)} onBroadcast={startWorldRadioBroadcast} />}
{showMediaControls && (
  <div className="media-controls-overlay" onClick={e => { if (e.target === e.currentTarget) setShowMediaControls(false); }}>
  <div className="media-controls-modal">
    <div className="media-controls-header">
      <h2>{lang === 'pt' ? 'Ferramentas' : 'Tools'}</h2>
      <button className="tutorial-close" onClick={() => setShowMediaControls(false)}>×</button>
    </div>
      <div className="media-controls-options">
        <button 
          className="media-controls-btn" 
          onClick={() => { 
            setShowMediaControls(false); 
            document.getElementById('radioInput').click(); 
          }}
          disabled={radioState.status !== 'idle' || !selectedContact || isCentralServer(selectedContact)}
          title={(!selectedContact || isCentralServer(selectedContact)) ? "DJ Radio is disabled in General/Server chat to prevent network overload." : ""}
          style={{ opacity: (radioState.status !== 'idle' || !selectedContact || isCentralServer(selectedContact)) ? 0.5 : 1, cursor: (radioState.status !== 'idle' || !selectedContact || isCentralServer(selectedContact)) ? 'not-allowed' : 'pointer' }}
        >
          <i className="fas fa-headphones"></i> {t(lang, 'djRadio')}
        </button>
        <button 
          className="media-controls-btn" 
          onClick={() => { 
            setShowMediaControls(false); 
            handleYoutubeRadio(); 
          }}
        >
          <i className="fab fa-youtube"></i> {t(lang, 'youtubeRadio')}
        </button>
        <button className="media-controls-btn" onClick={() => { setShowMediaControls(false); setShowWorldRadios(true); }}>
          <i className="fas fa-globe"></i> World Radios
        </button>
        <button className="media-controls-btn" onClick={() => { setShowMediaControls(false); setShowWhiteboard(true); }}>
          <i className="fas fa-chalkboard"></i> {lang === 'pt' ? 'Lousa Colaborativa' : 'Collaborative Whiteboard'}
        </button>
        <button className="media-controls-btn" onClick={() => { setShowMediaControls(false); setShowPollCreator(true); }}>
          <i className="fas fa-poll"></i> {lang === 'pt' ? 'Criar Enquete' : 'Create Poll'}
        </button>
        <button className="media-controls-btn" onClick={() => { setShowMediaControls(false); setShowMarkdownEditor(true); }}>
          <i className="fas fa-file-code"></i> {lang === 'pt' ? 'Editor Markdown' : 'Markdown Editor'}
        </button>
      </div>
    </div>
  </div>
)}
{showPollCreator && <PollCreator onClose={() => setShowPollCreator(false)} onCreated={handlePollCreated} />}
{showMarkdownEditor && <MarkdownEditor lang={lang} connections={connections} selectedContact={selectedContact} onClose={() => setShowMarkdownEditor(false)} />}
{showGeneralModeInfo && <GeneralModeInfoModal lang={lang} selectedContact={selectedContact} onClose={() => setShowGeneralModeInfo(false)} />}
{showTorrentManager && (
<TorrentManagerModal
lang={lang}
torrents={torrents}
onClose={() => setShowTorrentManager(false)}
onStop={stopTorrent}
onSeed={handleTorrentSeed}
onDownload={handleTorrentDownload}
/>
)}


<input type="file" ref={fileInputRef} style={{ display: 'none' }} onChange={handleFileChange} />
<input type="file" id="radioInput" accept="audio/mp3,audio/mpeg" style={{ display: 'none' }} onChange={handleRadioUpload} />
<audio ref={radioAudioRef} style={{ display: 'none' }} />


<div className="app-header">
<h1 className="app-title">
Chat K10
<span>{t(lang, 'appSubtitle')}</span>
</h1>
<div className="header-buttons">
<div className="general-mode-status" onClick={() => setShowGeneralModeInfo(true)} style={{ cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'flex-end' }}>
<span className="general-mode-text" style={{ color: !selectedContact ? '#4ade80' : '#94a3b8' }}>
{t(lang, !selectedContact ? 'generalModeActivated' : 'generalModeDeactivated')}
</span>
<span style={{ fontSize: '10px', color: '#94a3b8', marginTop: '2px', fontWeight: '600' }}>
{t(lang, !selectedContact ? 'generalModeActivatedDesc' : 'generalModeDeactivatedDesc')}
</span>
</div>
<div className="network-size-badge" title={lang === 'pt' ? 'Usuários Online na Teia Geral' : 'Users Online in General Web'}>
<i className="fas fa-users"></i> {networkSize} ONLINE
</div>
<button onClick={() => setShowTutorial(true)} className="header-button" title={t(lang, 'tutorial')}>
<i className="fas fa-book-open"></i>
</button>
<button onClick={() => setShowMediaControls(true)} className="header-button" title={lang === 'pt' ? 'Ferramentas' : 'Tools'}>
  <i className="fas fa-tools"></i>
</button>
<button onClick={() => setShowContacts(true)} className="header-button" title={t(lang, 'contacts')}>
<i className="fas fa-address-book"></i>
</button>
<button onClick={toggleDarkMode} className="header-button" title={t(lang, 'darkMode')}>🌙</button>
<button onClick={toggleLang} className="lang-btn" title="Switch Language">
🌐 {t(lang, 'language')}
</button>
</div>
</div>


{radioState.status !== 'idle' && (
<div className="radio-bar">
<div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
<div style={{ textAlign: 'left' }}>
<div style={{ fontSize: '14px', fontWeight: '700' }}>🎵 {t(lang, 'radioGlobal')}: {radioState.fileName}</div>
<div style={{ fontSize: '12px', color: '#94a3b8', marginTop: '2px' }}>{t(lang, 'djLabel')}{radioState.sender}</div>
</div>
<button onClick={stopRadio} style={{ background: '#ef4444', color: 'white', border: 'none', padding: '4px 10px', borderRadius: '6px', fontSize: '11px', fontWeight: 700, cursor: 'pointer' }}>
<i className="fas fa-stop"></i> STOP
</button>
</div>


{radioState.type === 'youtube' && (
<div style={{ marginBottom: '10px' }}>
<div style={{ display: 'flex', gap: '10px', justifyContent: 'center', marginBottom: '8px' }}>
<button
onClick={() => setRadioState(prev => ({ ...prev, showVideo: !prev.showVideo }))}
style={{ background: '#3b82f6', color: 'white', border: 'none', padding: '4px 12px', borderRadius: '6px', fontSize: '11px', fontWeight: 600, cursor: 'pointer' }}
>
{radioState.showVideo ? t(lang, 'hideVideo') : t(lang, 'showVideo')}
</button>
{radioState.showVideo && (
<div style={{ display: 'flex', alignItems: 'center', gap: '5px' }}>
<span style={{ fontSize: '11px', color: '#94a3b8' }}>{t(lang, 'videoSize')}</span>
<select
value={radioState.videoSize}
onChange={e => setRadioState(prev => ({ ...prev, videoSize: e.target.value }))}
style={{ background: '#1e293b', color: 'white', border: '1px solid #334155', borderRadius: '4px', fontSize: '11px', padding: '2px' }}
>
<option value="small">{t(lang, 'small')}</option>
<option value="medium">{t(lang, 'medium')}</option>
<option value="large">{t(lang, 'large')}</option>
</select>
</div>
)}
</div>


<div style={{
display: radioState.showVideo ? 'block' : 'none',
margin: '0 auto',
width: radioState.videoSize === 'small' ? '320px' : radioState.videoSize === 'medium' ? '560px' : '854px',
height: radioState.videoSize === 'small' ? '180px' : radioState.videoSize === 'medium' ? '315px' : '480px',
maxWidth: '100%',
aspectRatio: '16/9',
background: '#000',
borderRadius: '8px',
overflow: 'hidden'
}}>
<div ref={youtubeContainerRef} id="youtube-player"></div>
</div>
</div>
)}


{radioState.status === 'buffering'
? <div style={{ color: '#f59e0b', marginTop: '4px', fontSize: '13px', fontWeight: '600' }}>
{t(lang, 'radioStartsIn', { s: Math.max(0, Math.ceil((radioState.startTime - Date.now()) / 1000)) })}{!radioState.audioUrl && radioState.type === 'file' && t(lang, 'downloading')}
</div>
: <div style={{ color: '#10b981', marginTop: '4px', fontSize: '13px', fontWeight: '600' }}>{t(lang, 'nowPlaying')}</div>}


{(radioState.type === 'file' || radioState.type === 'stream') && (
<div style={{ marginTop: '8px' }}>
<label style={{ fontSize: '12px', color: '#94a3b8' }}>{t(lang, 'volume')} </label>
<input type="range" min="0" max="1" step="0.1" defaultValue="0.5" onChange={e => { if (radioAudioRef.current) radioAudioRef.current.volume = parseFloat(e.target.value); }} />
</div>
)}
</div>
)}


<div className="user-info-container" style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
  <div className="user-avatar-upload" onClick={() => document.getElementById('avatarInput').click()}>
    <Avatar peerId={peerId} name={userName} avatars={{ [peerId]: userAvatar }} size="large" />
    <div className="upload-overlay">
      <i className="fas fa-camera"></i>
    </div>
    <input type="file" id="avatarInput" accept="image/*" style={{ display: 'none' }} onChange={handleAvatarChange} />
  </div>
  <div style={{ flex: 1 }}>
    {editingName ? (
      <div className="user-name-form">
        <input type="text" value={userName} onChange={e => setUserName(e.target.value)} placeholder={t(lang, 'typeName')} autoFocus />
        <button onClick={saveUserName} disabled={!userName.trim()}>{t(lang, 'save')}</button>
      </div>
    ) : (
      <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
        <span style={{ fontSize: '13px', color: 'var(--text-muted)' }}>{t(lang, 'yourName')}:</span>
        <span className="username">{userName}</span>
        <button className="user-edit-button" onClick={() => setEditingName(true)}>{t(lang, 'edit')}</button>
      </div>
    )}
  </div>
</div>


<div className="peer-id-container">
<div style={{ display: 'flex', alignItems: 'center', gap: '14px', flexWrap: 'wrap' }}>
<span style={{ fontSize: '13px', color: 'var(--text-muted)' }}>{t(lang, 'yourId')}</span>
<span className="peer-id-label">{peerId}</span>
<button onClick={() => setIsSuperNode(!isSuperNode)} style={{ backgroundColor: isSuperNode ? '#fef3c7' : 'white', color: isSuperNode ? '#b45309' : '#64748b', border: `1px solid ${isSuperNode ? '#f59e0b' : 'var(--border)'}`, padding: '5px 12px', borderRadius: '6px', cursor: 'pointer', fontSize: '12px', fontWeight: '700' }}>
<i className="fas fa-bolt" style={{ color: isSuperNode ? '#d97706' : '#94a3b8' }}></i> {isSuperNode ? t(lang, 'superNodeOn') : t(lang, 'superNodeOff')}
</button>
</div>
<div style={{ display: 'flex', gap: '8px' }}>
<button onClick={() => { navigator.clipboard.writeText(peerId); alert(t(lang, 'copied')); }}>{t(lang, 'copy')}</button>
<button onClick={generateInviteLink} className="invite-btn">{t(lang, 'generateInviteLink')}</button>
</div>
</div>


{showYoutubeGrid && (
<div style={{ position: 'fixed', inset: 0, backgroundColor: 'rgba(0,0,0,0.85)', zIndex: 10000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' }}>
<div style={{ backgroundColor: '#1e1e1e', borderRadius: '12px', width: '100%', maxWidth: '500px', padding: '24px', boxShadow: '0 20px 50px rgba(0,0,0,0.8)', color: 'white', fontFamily: 'sans-serif' }}>
<div style={{ marginBottom: '16px' }}>
<div style={{ fontSize: '14px', color: '#ccc', marginBottom: '8px' }}>andradepsa.github.io diz</div>
<div style={{ fontSize: '16px', fontWeight: '500', marginBottom: '12px' }}>{t(lang, 'enterYoutubeUrl')}</div>
<input
type="text"
value={gridInput}
onChange={e => setGridInput(e.target.value)}
style={{ width: '100%', padding: '12px', borderRadius: '8px', border: '1px solid #444', backgroundColor: '#2d2d2d', color: 'white', outline: 'none', fontSize: '14px' }}
onKeyDown={e => { if (e.key === 'Enter') startYoutubeBroadcast(gridInput); }}
autoFocus
/>
</div>


<div style={{ display: 'grid', gridTemplateColumns: 'repeat(10, 1fr)', gap: '4px', marginBottom: '24px', maxHeight: '300px', overflowY: 'auto', padding: '4px' }}>
{Array.from({ length: Object.keys(YOUTUBE_LINKS_LIST).length }, (_, i) => i + 1).map(num => (
<button
key={num}
onClick={() => {
const savedUrl = youtubeLinks[num];
if (savedUrl) {
startYoutubeBroadcast(savedUrl);
} else {
const url = prompt(`${t(lang, 'enterUrlFor')} ${num}:`);
if (url) {
const newLinks = { ...youtubeLinks, [num]: url };
setYoutubeLinks(newLinks);
startYoutubeBroadcast(url);
}
}
}}
onContextMenu={(e) => {
e.preventDefault();
const url = prompt(`${t(lang, 'editUrlFor')} ${num}:`, youtubeLinks[num] || '');
if (url !== null) {
const newLinks = { ...youtubeLinks, [num]: url };
setYoutubeLinks(newLinks);
}
}}
style={{
padding: '6px 0',
borderRadius: '4px',
border: 'none',
backgroundColor: 'transparent',
color: youtubeLinks[num] ? '#38bdf8' : '#fff',
fontSize: '13px',
cursor: 'pointer',
textAlign: 'center'
}}
>
{num}
</button>
))}
</div>


<div style={{ display: 'flex', justifyContent: 'flex-end', gap: '12px' }}>
<button
onClick={() => startYoutubeBroadcast(gridInput)}
style={{ padding: '10px 30px', borderRadius: '25px', border: 'none', backgroundColor: '#93c5fd', color: '#1e3a8a', fontWeight: 'bold', cursor: 'pointer' }}
>
OK
</button>
<button
onClick={() => setShowYoutubeGrid(false)}
style={{ padding: '10px 30px', borderRadius: '25px', border: 'none', backgroundColor: '#0c4a6e', color: '#bae6fd', fontWeight: 'bold', cursor: 'pointer' }}
>
{t(lang, 'cancel') || 'Cancelar'}
</button>
</div>
</div>
</div>
)}


{/* Local Video / YouTube */}
{isLocalVideoVisible && (
<FloatingWindow
title={t(lang, 'you')}
initialPosition={{ x: 20, y: 20 }}
onClose={() => {
if (userYoutubeStreams[peerId]) handleYoutubeRadio();
setIsLocalVideoVisible(false);
}}
onNextCamera={() => {
const allPeers = [...new Set([peerId, ...remoteStreams.map(s => s.peerId), ...Object.keys(userYoutubeStreams)])];
if (allPeers.length <= 1) return;
const currIdx = allPeers.indexOf(peerId);
const nextPeer = allPeers[(currIdx + 1) % allPeers.length];
setWindowTargets(prev => ({ ...prev, [peerId]: nextPeer }));
}}
>
<StreamRenderer
targetId={windowTargets[peerId] || peerId}
peerId={peerId}
userYoutubeStreams={userYoutubeStreams}
localVideoRef={localVideoRef}
videoRefs={videoRefs}
/>
</FloatingWindow>
)}


{/* Remote Streams / YouTube Gallery */}
{(() => {
const allActivePeers = [...new Set([...remoteStreams.map(s => s.peerId), ...Object.keys(userYoutubeStreams)])].filter(id => id !== peerId);
return allActivePeers.slice(0, 10).map((pId, idx) => (
<FloatingWindow
key={pId}
title={getContactName(windowTargets[pId] || pId)}
initialPosition={{ x: 40 + (idx * 30), y: 40 + (idx * 30) }}
onClose={() => {
if (remoteStreams.some(s => s.peerId === pId)) {
endCall(pId, 'video');
} else {
setUserYoutubeStreams(prev => { const next = { ...prev }; delete next[pId]; return next; });
}
}}
onNextCamera={() => {
const allPeers = [...new Set([peerId, ...remoteStreams.map(s => s.peerId), ...Object.keys(userYoutubeStreams)])];
if (allPeers.length <= 1) return;
const currentTarget = windowTargets[pId] || pId;
const currIdx = allPeers.indexOf(currentTarget);
const nextPeer = allPeers[(currIdx + 1) % allPeers.length];
setWindowTargets(prev => ({ ...prev, [pId]: nextPeer }));
}}
>
<StreamRenderer
targetId={windowTargets[pId] || pId}
peerId={peerId}
userYoutubeStreams={userYoutubeStreams}
localVideoRef={localVideoRef}
videoRefs={videoRefs}
/>
</FloatingWindow>
));
})()}


{activeCalls.map((call, idx) => call.type === 'voice' && (
<div key={idx} className="audio-call-container">
<i className="fas fa-phone" style={{ color: '#22c55e' }}></i>
<span style={{ fontSize: '14px', fontWeight: 600 }}>{t(lang, 'voiceCallWith')} {getContactName(call.peerId)}</span>
<button className="call-end-button" onClick={() => endCall(call.peerId, 'voice')}>{t(lang, 'endCall')}</button>
<audio ref={el => audioRefs.current[call.peerId] = el} autoPlay></audio>
<div style={{ marginTop: '4px', display: 'flex', alignItems: 'center', gap: '8px' }}>
<label style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{t(lang, 'volume')}</label>
<input type="range" min="0" max="1" step="0.1" defaultValue="1" onChange={e => { if (audioRefs.current[call.peerId]) audioRefs.current[call.peerId].volume = parseFloat(e.target.value); }} />
</div>
</div>
))}


{showContacts ? (
<ContactsScreen lang={lang} contacts={contacts} setContacts={setContacts} onBack={() => setShowContacts(false)}
onSelectContact={(pId) => { connectToPeer(pId); setSelectedContact(pId); setShowContacts(false); }} avatars={avatars} />
) : (
<ChatManager
lang={lang}
connections={connections} messages={messages} setMessages={setMessages}
contacts={contacts} userName={userName} peerId={peerId}
activeCalls={activeCalls} endCall={endCall} startVoiceCall={startVoiceCall}
toggleVideoCall={toggleVideoCall} remoteStreams={remoteStreams}
audioRefs={audioRefs} videoRefs={videoRefs} handleFileChange={handleFileChange}
fileInputRef={fileInputRef} handleAudioRecording={handleAudioRecording}
newMessage={newMessage} setNewMessage={setNewMessage}
showEmojiPanel={showEmojiPanel} setShowEmojiPanel={setShowEmojiPanel}
populateEmojiPanel={populateEmojiPanel} getContactName={getContactName}
selectedContact={selectedContact} setSelectedContact={setSelectedContact}
localVideoRef={localVideoRef} registerSentMessage={(id) => seenMessagesRef.current.add(id)}
cooldownRemaining={cooldownRemaining} setCooldownRemaining={setCooldownRemaining}
networkSize={networkSize} centralServerId={centralServerId}
e2eeState={e2eeState} setE2eeState={setE2eeState}
isCentralServer={isCentralServer}
serverE2EE={serverE2EE} setServerE2EE={setServerE2EE} connectToPeer={connectToPeer}
handleTorrentSeed={handleTorrentSeed} handleTorrentDownload={handleTorrentDownload}
setShowTorrentManager={setShowTorrentManager}
pendingTorrentRequests={pendingTorrentRequests}
setPendingTorrentRequests={setPendingTorrentRequests}
handleTorrentDirectSeed={handleTorrentDirectSeed}
youtubeChatId={youtubeChatId}
disconnectPeer={disconnectPeer}
showWhiteboard={showWhiteboard}
setShowWhiteboard={setShowWhiteboard}
avatars={avatars}
/>
)}

{showWhiteboard && (
  <Whiteboard 
    lang={lang} 
    connections={connections} 
    selectedContact={selectedContact} 
    onClose={() => setShowWhiteboard(false)} 
  />
)}
</div>
);
};


ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));
</script>
</body>
</html>
